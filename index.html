function useAudio(){
  const ctx=React.useRef(null);
  const muteRef=React.useRef(false);
  const voiceRef=React.useRef(null);
  const unlockedRef=React.useRef(false);

  // Mobile browsers block AudioContext until a user gesture.
  // We hook every touch/click/keydown on the document to unlock audio
  // the very first time the user interacts — before they tap any button.
  React.useEffect(()=>{
    const unlock=()=>{
      if(unlockedRef.current)return;
      unlockedRef.current=true;
      // Create/resume AudioContext on first gesture
      if(!ctx.current){
        try{ctx.current=new(window.AudioContext||window.webkitAudioContext)();}
        catch(e){return;}
      }
      if(ctx.current.state==='suspended')ctx.current.resume().catch(()=>{});
      // Prime speech synthesis — mobile requires a silent utterance on gesture
      if(window.speechSynthesis){
        const u=new SpeechSynthesisUtterance('');
        u.volume=0;
        window.speechSynthesis.speak(u);
      }
      // Clean up listeners once unlocked
      ['touchstart','touchend','click','keydown'].forEach(e=>{
        document.removeEventListener(e,unlock,true);
      });
    };
    ['touchstart','touchend','click','keydown'].forEach(e=>{
      document.addEventListener(e,unlock,{passive:true,capture:true});
    });
    return ()=>{
      ['touchstart','touchend','click','keydown'].forEach(e=>{
        document.removeEventListener(e,unlock,true);
      });
    };
  },[]);

  const getCtx=()=>{
    if(!ctx.current){
      try{ctx.current=new(window.AudioContext||window.webkitAudioContext)();}
      catch(e){return null;}
    }
    if(ctx.current.state==='suspended')ctx.current.resume().catch(()=>{});
    return ctx.current;
  };

  const beep=(freq,dur,vol=0.18,type='sine',ramp=true)=>{
    if(muteRef.current)return;
    const ac=getCtx();if(!ac)return;
    try{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type=type;o.frequency.value=freq;
      g.gain.setValueAtTime(vol,ac.currentTime);
      if(ramp)g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
      o.start(ac.currentTime);o.stop(ac.currentTime+dur);
    }catch(e){}
  };

  const sounds={
    click:   ()=>beep(880,0.08,0.12,'sine'),
    correct: ()=>{beep(523,0.12,0.2,'sine');setTimeout(()=>beep(659,0.12,0.2,'sine'),100);setTimeout(()=>beep(784,0.2,0.2,'sine'),200);},
    wrong:   ()=>{beep(200,0.15,0.2,'sawtooth');setTimeout(()=>beep(150,0.2,0.2,'sawtooth'),120);},
    complete:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,0.22,'sine'),i*100));},
    badge:   ()=>{[784,880,988,1047,1175].forEach((f,i)=>setTimeout(()=>beep(f,0.14,0.25,'sine'),i*80));},
    unlock:  ()=>{[392,494,587,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.16,0.22,'triangle'),i*90));},
    welcome: ()=>{[523,659,784,1047,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,0.2,'sine'),i*120));},
    stars:   ()=>{[784,988,1175].forEach((f,i)=>setTimeout(()=>beep(f,0.15,0.2,'sine'),i*100));},
    phase:   ()=>beep(660,0.1,0.14,'sine'),
  };

  const speak=(text,name)=>{
    if(muteRef.current||!window.speechSynthesis)return;
    try{
      window.speechSynthesis.cancel();
      // Preprocess text: add rhythm breaks to reduce robotic monotone
      // Commas and dashes create natural cyborg-style speech cadence
      const cleanText=text
        .replace(/[*_#`]/g,'')
        .replace(/([!?])\s+/g,'$1... ')       // pause after excitement
        .replace(/(AI|STEM|CODE|HTML|CSS|JS)/g,match=>match.split('').join(' '))  // spell out acronyms
        .slice(0,320);
      const u=new SpeechSynthesisUtterance(cleanText);
      const gender=window._ssaVoiceGender||'female';
      // Cyborg voices — same speed, different pitch, less monotone via text processing
      if(gender==='female'){
        u.pitch=1.35;  // bright cyborg — cheerful and electronic
        u.rate=1.08;   // same speed as boy
        u.volume=1.0;
      } else {
        u.pitch=1.1;   // cool cyborg — warm, not deep, same speed as girl
        u.rate=1.08;   // same speed as girl
        u.volume=1.0;
      }
      // Wait for voices to load (needed on some browsers)
      const trySpeak=()=>{
        let voices=window.speechSynthesis.getVoices();
        // iOS Safari: voices load synchronously after first call
        // Add a short retry loop for browsers that load voices async
        if(!voices.length){
          let attempts=0;
          const retry=setInterval(()=>{
            voices=window.speechSynthesis.getVoices();
            attempts++;
            if(voices.length||attempts>10){
              clearInterval(retry);
              if(voices.length)doSpeak(voices);
            }
          },100);
          // Also listen for voiceschanged event
          const onChange=()=>{
            clearInterval(retry);
            window.speechSynthesis.removeEventListener('voiceschanged',onChange);
            doSpeak(window.speechSynthesis.getVoices());
          };
          window.speechSynthesis.addEventListener('voiceschanged',onChange);
          return;
        }
        doSpeak(voices);
      };
      const doSpeak=(voices)=>{
        const englishVoices=voices.filter(v=>v.lang.startsWith('en'));
        const isFemale=v=>{
          const n=v.name.toLowerCase();
          return n.includes('female')||n.includes('samantha')||n.includes('karen')||
                 n.includes('victoria')||n.includes('moira')||n.includes('fiona')||
                 n.includes('tessa')||n.includes('veena')||n.includes('zira')||
                 n.includes('ava')||n.includes('allison')||n.includes('google us english');
        };
        const isMale=v=>{
          const n=v.name.toLowerCase();
          return n.includes(' male')||n.includes('daniel')||n.includes('alex')||
                 n.includes('fred')||n.includes('david')||n.includes('arthur')||
                 n.includes('google uk english');
        };
        let match;
        if(gender==='female'){
          match=englishVoices.find(isFemale)||englishVoices.find(v=>!isMale(v))||englishVoices[0];
        } else {
          match=englishVoices.find(isMale)||englishVoices.find(v=>!isFemale(v))||englishVoices[0];
        }
        if(match)u.voice=match;
        // Cancel any active speech, then speak immediately
        window.speechSynthesis.cancel();
        setTimeout(()=>{
          window.speechSynthesis.speak(u);
          voiceRef.current=u;
        },10);
      };
      trySpeak();
    }catch(e){}
  };

  const stopSpeech=()=>{try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}};
  const setMute=(v)=>{muteRef.current=v;if(v)stopSpeech();};

  return {sounds,speak,stopSpeech,setMute};
}


// ─── MEMORY GAME — flip card emoji pairs ───
function MemoryGame({game,onComplete,sounds}){
  const pairs=game.items;
  const allCards=React.useMemo(()=>{
    const cards=[...pairs.map((p,i)=>({id:i*2,pairId:i,e:p.e,label:p.e})),...pairs.map((p,i)=>({id:i*2+1,pairId:i,e:p.label,label:p.label}))];
    for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
  },[]);
  const [flipped,setFlipped]=React.useState([]);
  const [matched,setMatched]=React.useState(new Set());
  const [lock,setLock]=React.useState(false);
  const [moves,setMoves]=React.useState(0);
  const flip=(card)=>{
    if(lock||flipped.find(c=>c.id===card.id)||matched.has(card.pairId))return;
    sounds.click();
    const next=[...flipped,card];
    setFlipped(next);
    if(next.length===2){
      setMoves(m=>m+1);setLock(true);
      if(next[0].pairId===next[1].pairId){
        sounds.correct();
        const newMatched=new Set([...matched,next[0].pairId]);
        setMatched(newMatched);setFlipped([]);setLock(false);
        if(newMatched.size===pairs.length)setTimeout(()=>onComplete(3),600);
      } else {
        sounds.wrong();
        setTimeout(()=>{setFlipped([]);setLock(false);},900);
      }
    }
  };
  return h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
    h('p',{style:{fontWeight:800,color:'#FFE600',textAlign:'center',fontSize:'.88rem'}},'🧠 '+game.inst),
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
      h('div',{style:{fontSize:'.78rem',fontWeight:800,color:'rgba(255,255,255,.5)'}},'Pairs found: '+matched.size+'/'+pairs.length),
      h('div',{style:{fontSize:'.78rem',fontWeight:800,color:'rgba(255,255,255,.5)'}},'Moves: '+moves)
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${Math.min(4,allCards.length/2+1)},1fr)`,gap:8}},
      allCards.map(card=>{
        const isFlipped=!!flipped.find(c=>c.id===card.id);
        const isMatched=matched.has(card.pairId);
        return h('div',{key:card.id,
          style:{height:64,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:isFlipped||isMatched?'1.5rem':'.8rem',
            cursor:isMatched?'default':'pointer',
            background:isMatched?'rgba(57,255,20,.2)':isFlipped?'rgba(0,212,255,.2)':'rgba(255,255,255,.08)',
            border:`2px solid ${isMatched?'#39FF14':isFlipped?'#00D4FF':'rgba(255,255,255,.15)'}`,
            transition:'all .2s',transform:isFlipped||isMatched?'scale(1.05)':'scale(1)',
            fontWeight:900,color:'white'},
          onClick:()=>flip(card)},
          isFlipped||isMatched?card.e:'?'
        );
      })
    ),
    matched.size===pairs.length&&h('div',{style:{textAlign:'center',padding:'12px 0'},className:'pop'},
      h('div',{style:{fontSize:'1.1rem',fontWeight:900,color:'#39FF14'}},'🎉 All matched in '+moves+' moves!')
    )
  );
}

// ─── SCRAMBLE GAME — unscramble the word ───
function ScrambleGame({game,onComplete,sounds}){
  const [idx,setIdx]=React.useState(0);
  const [guess,setGuess]=React.useState('');
  const [feedback,setFeedback]=React.useState(null);
  const [score,setScore]=React.useState(0);
  const item=game.items[idx];
  const scrambled=React.useMemo(()=>{
    if(!item)return '';
    const a=item.word.toUpperCase().split('');
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a.join('');
  },[idx]);
  const check=()=>{
    if(!guess.trim())return;
    const ok=guess.trim().toUpperCase()===item.word.toUpperCase();
    sounds[ok?'correct':'wrong']();
    setFeedback(ok);
    setTimeout(()=>{
      if(ok)setScore(s=>s+1);
      setGuess('');setFeedback(null);
      if(idx<game.items.length-1)setIdx(i=>i+1);
      else onComplete(score+1>=game.items.length?3:score+1>=game.items.length-1?2:1);
    },900);
  };
  if(!item)return null;
  return h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
    h('div',{style:{display:'flex',justifyContent:'space-between'}},
      h('p',{style:{fontWeight:800,color:'#FFE600',fontSize:'.88rem'}},'🔤 '+game.inst),
      h('div',{style:{fontFamily:"'Fredoka One',cursive",color:'#00D4FF',fontSize:'.88rem'}},'✅ '+score+'/'+game.items.length)
    ),
    h('div',{key:'scr-'+idx,className:'pop slideUp',style:{background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.15)',borderRadius:20,padding:'20px',textAlign:'center'}},
      h('div',{style:{fontSize:'1rem',fontWeight:800,color:'rgba(255,255,255,.5)',marginBottom:8}},item.hint),
      h('div',{style:{fontFamily:"'Fredoka One',cursive",fontSize:'2rem',letterSpacing:6,color:'#FFE600',marginBottom:6,textShadow:'0 0 20px rgba(255,230,0,.4)'}},scrambled),
      h('div',{style:{fontSize:'.75rem',fontWeight:800,color:'rgba(255,255,255,.35)'}},'Unscramble the letters!')
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{className:'auth-input',style:{flex:1,padding:'12px 16px',fontSize:'1.1rem',letterSpacing:2,textTransform:'uppercase',
        borderColor:feedback===null?'rgba(255,255,255,.2)':feedback?'#39FF14':'#FF006E'},
        placeholder:'Type the word...',value:guess,
        onChange:e=>setGuess(e.target.value.toUpperCase()),
        onKeyDown:e=>e.key==='Enter'&&check()}),
      h('button',{className:'kb',style:{padding:'12px 16px',background:'linear-gradient(135deg,#FFE600,#FF8C00)',color:'#070118',fontSize:'1rem',flexShrink:0},onClick:check},'GO!')
    ),
    feedback===true&&h('div',{style:{textAlign:'center',color:'#39FF14',fontWeight:900,fontSize:'1rem'},className:'pop'},'🎉 '+getRand(CORRECT_MSGS)),

        h('div',{style:{fontWeight:800,fontSize:'.85rem',color:'rgba(255,255,255,.55)',marginBottom:4}},
          (()=>{const cm=getRand(CELEBRATE_MSGS);return cm[1];})()
        ),
        h('div',{style:{background:'rgba(255,255,255,.08)',borderRadius:22,padding:'18px 20px',width:'100%',maxWidth:350}},
          h('div',{style:{fontSize:'2rem',marginBottom:6}},Array(stars[lesson.id]||3).fill('⭐').join('')),
          h('div',{style:{fontWeight:900,fontSize:'1.1rem',color:modData.color,marginBottom:4}},`${lesson.title} — Complete!`),
          h('div',{style:{fontSize:'.83rem',color:'rgba(255,255,255,.55)',fontWeight:800,marginBottom:12}},`You are a genuine Junior AI Scientist! 🎓 ${sparkyName} is proud of you!`),
          badges.has(mod)&&modData&&modData.lessons[modData.lessons.length-1].id===lesson.id&&h('div',{style:{marginBottom:12,background:'rgba(255,230,0,.1)',border:'2px solid #FFE600',borderRadius:14,padding:'12px 16px'},className:'pop'},h('div',{style:{fontSize:'2.5rem'}},'🏅'),h('div',{style:{fontWeight:900,color:'#FFE600',fontSize:'1.05rem'}},`${modData.badgeName} Earned!`))
        ),
        h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}},
          lessonIdx<modData.lessons.length-1&&h('button',{className:'kb',style:{fontSize:'.93rem',padding:'12px 20px',background:modData.grad,color:'white'},onClick:()=>{sounds.click();setShowConf(false);startLesson(mod,lessonIdx+1);}},'Next Lesson →'),
          h('button',{className:'kb',style:{fontSize:'.9rem',padding:'11px 18px',background:'rgba(255,255,255,.1)',color:'white'},onClick:()=>{sounds.click();setShowConf(false);stopSpeech();setScreen('lessons');}},'📚 Lessons'),
          h('button',{className:'kb',style:{fontSize:'.9rem',padding:'11px 18px',background:'rgba(255,255,255,.1)',color:'white'},onClick:()=>{sounds.click();setShowConf(false);stopSpeech();setScreen('modules');}},'🌍 Worlds')
        )
      )
    )
  );
  return h('div',{style:{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'white'}},'✨ Loading...');
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
