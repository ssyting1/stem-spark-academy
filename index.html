   game:{type:'pycode',title:'Classes in Python!',inst:'Run this code to see OOP in action! Then add a new dog and call its methods!',starter:'class Dog:\n    def __init__(self, name, breed, age):\n        self.name = name\n        self.breed = breed\n        self.age = age\n    \n    def bark(self):\n        return f"{self.name} says: Woof! Woof!"\n    \n    def describe(self):\n        return f"{self.name} is a {self.age} year old {self.breed}"\n    \n    def is_puppy(self):\n        return self.age < 2\n\n# Create dog objects\nfido = Dog("Fido", "Labrador", 3)\nrex = Dog("Rex", "German Shepherd", 1)\n\nprint(fido.describe())\nprint(fido.bark())\nprint(f"Is Fido a puppy? {fido.is_puppy()}")\nprint()\nprint(rex.describe())\nprint(rex.bark())\nprint(f"Is Rex a puppy? {rex.is_puppy()}")',hint:'Try creating your own Dog object with a different name, breed and age!',check:'contains',expected:'Woof!'},
   quiz:[{q:'What is a class in Python?',o:['A school classroom','A blueprint for creating objects','A type of list'],a:1},{q:'What does __init__ do?',o:['Deletes an object','Initialises a new object with its starting attributes','Prints the object'],a:1},{q:'What is inheritance?',o:['Getting money from parents','A class getting attributes and methods from a parent class','A type of loop'],a:1}]},
  {id:76,title:'Python CLI Projects',intro:'Command-Line Interface tools are Python programs that run in the terminal! Scripts that automate tasks, process files, and generate reports are all CLI tools. They are incredibly useful and take only the Python skills you already have to build!',
   slides:[{title:'CLI Programs!',text:'A CLI program takes input from the terminal, processes data, and outputs results. Python scripts are perfect for this: rename 1000 files, process a CSV, send automated emails, scrape data from websites!',e:'⌨️'},{title:'sys.argv!',text:'sys.argv is a list of command-line arguments. python my_script.py Calgary 7 would give sys.argv = ["my_script.py","Calgary","7"]. This lets users pass options when running your script!',e:'📋'},{title:'argparse!',text:'The argparse module makes professional CLI tools. It auto-generates help messages, validates argument types, and handles optional vs required arguments. pip install nothing — it is built into Python!',e:'🛠️'}],
   game:{type:'pycode',title:'Build a CLI Tool!',inst:'Run this grade analyzer CLI tool. It processes a list of scores like a real script would!',starter:'import sys\n\ndef analyze_grades(scores):\n    """Analyze a list of grades and return a report"""\n    if not scores:\n        return "No scores provided!"\n    \n    avg = sum(scores) / len(scores)\n    highest = max(scores)\n    lowest = min(scores)\n    passing = [s for s in scores if s >= 70]\n    pass_rate = (len(passing) / len(scores)) * 100\n    \n    report = [\n        "=" * 30,\n        "    GRADE ANALYSIS REPORT",\n        "=" * 30,\n        f"Students:    {len(scores)}",\n        f"Average:     {avg:.1f}%",\n        f"Highest:     {highest}%",\n        f"Lowest:      {lowest}%",\n        f"Pass rate:   {pass_rate:.1f}%",\n        "=" * 30\n    ]\n    return "\\n".join(report)\n\n# Simulated input (normally from sys.argv or a file)\nscores = [88, 72, 95, 61, 84, 79, 92, 68, 77, 85]\nprint(analyze_grades(scores))',hint:'Try adding or removing scores from the list and see how the report changes!',check:'contains',expected:'GRADE ANALYSIS'},
   quiz:[{q:'What is a CLI tool?',o:['A web app','A program that runs in the terminal','A mobile app'],a:1},{q:'What is sys.argv in Python?',o:['A list of system errors','A list of command-line arguments passed to the script','A built-in function'],a:1},{q:'What does argparse help you build?',o:['Web APIs','Professional CLI tools with argument handling','Databases'],a:1}]}
]},
{id:20,title:'Object-Oriented Programming',sub:'Think in objects and classes!',emoji:'🔷',color:'#CC00FF',grad:'linear-gradient(135deg,#CC00FF,#6600AA)',shadow:'rgba(204,0,255,.5)',badgeName:'OOP Master Badge',tier:3,
 lessons:[
  {id:77,title:'Classes Deep Dive',intro:'You have seen classes in action. Now you go DEEP! Real software systems use dozens or hundreds of classes working together. Encapsulation, abstraction, polymorphism — these sound complex but they are simple ideas that unlock professional-grade code!',
   slides:[{title:'Encapsulation!',text:'Encapsulation means keeping an object\'s internal data private and only exposing what is needed. In Python use _ before an attribute name to signal it is private. This prevents other code from accidentally breaking your object!',e:'🔒'},{title:'Class Methods vs Instance Methods!',text:'Instance methods use self and work on one object. Class methods use @classmethod and cls and work on the class itself. Static methods use @staticmethod and belong to the class but do not need self or cls!',e:'🔑'},{title:'Dunder Methods!',text:'Double underscore methods are special! __str__ controls what print(obj) shows. __len__ controls len(obj). __add__ controls obj1 + obj2. They let your objects behave like built-in Python types!',e:'🪄'}],
   game:{type:'pycode',title:'OOP Deep Dive!',inst:'Run this code to see encapsulation and dunder methods in action!',starter:'class BankAccount:\n    def __init__(self, owner, balance=0):\n        self.owner = owner\n        self._balance = balance  # "private" convention\n    \n    def deposit(self, amount):\n        if amount > 0:\n            self._balance += amount\n            return f"Deposited ${amount}. New balance: ${self._balance}"\n        return "Invalid amount"\n    \n    def withdraw(self, amount):\n        if 0 < amount <= self._balance:\n            self._balance -= amount\n            return f"Withdrew ${amount}. New balance: ${self._balance}"\n        return "Insufficient funds!"\n    \n    def __str__(self):\n        return f"Account({self.owner}, ${self._balance})"\n    \n    def __len__(self):\n        return self._balance\n\nacc = BankAccount("Alex", 100)\nprint(acc)  # uses __str__\nprint(acc.deposit(50))\nprint(acc.withdraw(30))\nprint(acc.withdraw(200))\nprint(f"Balance via len: ${len(acc)}")',hint:'Try creating a second account with a different name and balance!',check:'contains',expected:'Deposited'},
   quiz:[{q:'What is encapsulation?',o:['Making code faster','Keeping internal data private and controlled','A type of loop'],a:1},{q:'What does __str__ control?',o:['The object size','What print(object) displays','The object type'],a:1},{q:'What does a single underscore before an attribute name mean?',o:['It is deleted','It is private by convention','It is a constant'],a:1}]},
  {id:78,title:'Inheritance & Polymorphism',intro:'Inheritance lets you build on existing classes without rewriting them. Polymorphism means different objects can respond to the same method call in their own way. Together these two concepts make large programs manageable and extensible!',
   slides:[{title:'Inheritance!',text:'class Cat(Animal): inherits everything from Animal. Cat can add new methods like purr() and override existing ones like speak(). Super() calls the parent class method: super().__init__(name) runs Animal\'s __init__!',e:'👶'},{title:'Method Overriding!',text:'When a child class defines a method with the same name as the parent it overrides it. Dog\'s speak() returns "Woof!" and Cat\'s speak() returns "Meow!" — same method name different behaviour!',e:'🎭'},{title:'Polymorphism!',text:'for animal in [dog, cat, bird]: print(animal.speak()) works even though dog cat and bird are different types! Each responds to speak() in its own way. This is polymorphism — many forms!',e:'🔄'}],
   game:{type:'pycode',title:'Inheritance in Action!',inst:'Run this animal hierarchy to see inheritance and polymorphism!',starter:'class Animal:\n    def __init__(self, name):\n        self.name = name\n    \n    def speak(self):\n        return f"{self.name} makes a sound"\n    \n    def describe(self):\n        return f"I am {self.name}, a {type(self).__name__}"\n\nclass Dog(Animal):\n    def speak(self):\n        return f"{self.name} says: Woof! 🐕"\n\nclass Cat(Animal):\n    def speak(self):\n        return f"{self.name} says: Meow! 🐈"\n\nclass Bird(Animal):\n    def speak(self):\n        return f"{self.name} says: Tweet! 🐦"\n    \n    def fly(self):\n        return f"{self.name} is flying! ✈️"\n\n# Polymorphism in action\nanimals = [Dog("Rex"), Cat("Whiskers"), Bird("Tweety")]\n\nfor animal in animals:\n    print(animal.speak())\n    print(animal.describe())\n    print()',hint:'Try adding a new animal class! Copy the pattern from Dog, Cat or Bird.',check:'contains',expected:'Woof!'},
   quiz:[{q:'What is method overriding?',o:['Deleting a parent method','Child class defining a method with the same name as parent','Making a method faster'],a:1},{q:'What is polymorphism?',o:['Using many languages','Different objects responding to the same method in their own way','A type of inheritance'],a:1},{q:'What does super().__init__() do?',o:['Deletes the parent class','Creates a child class','Calls the parent class initialiser'],a:2}]},
  {id:79,title:'Design Patterns',intro:'Design patterns are proven solutions to common programming problems! They are not code you copy, they are ideas you apply. The Gang of Four published 23 patterns in 1994 and developers still use them every day. Today you learn the most popular ones!',
   slides:[{title:'Singleton Pattern!',text:'The Singleton ensures only ONE instance of a class exists. A database connection, a logging system, an app configuration — you only ever want one. Use a class variable to track the single instance!',e:'1️⃣'},{title:'Factory Pattern!',text:'A Factory creates objects without specifying the exact class. ShapeFactory.create("circle") returns a Circle object. You tell the factory WHAT you want not HOW to create it. Highly flexible and extensible!',e:'🏭'},{title:'Observer Pattern!',text:'Observer is used everywhere in GUIs and events! A Subject keeps a list of Observers. When Subject changes it notifies all Observers automatically. This is exactly how JavaScript event listeners work!',e:'👁️'}],
   game:{type:'pycode',title:'Factory Pattern!',inst:'Run this factory pattern implementation. It creates different shape objects on demand!',starter:'class Circle:\n    def __init__(self, radius):\n        self.radius = radius\n    def area(self):\n        return 3.14159 * self.radius ** 2\n    def describe(self):\n        return f"Circle(r={self.radius}, area={self.area():.2f})"\n\nclass Rectangle:\n    def __init__(self, w, h):\n        self.w, self.h = w, h\n    def area(self):\n        return self.w * self.h\n    def describe(self):\n        return f"Rectangle({self.w}x{self.h}, area={self.area()})"\n\nclass Triangle:\n    def __init__(self, base, height):\n        self.base, self.height = base, height\n    def area(self):\n        return 0.5 * self.base * self.height\n    def describe(self):\n        return f"Triangle(b={self.base}, h={self.height}, area={self.area()})"\n\ndef shape_factory(shape_type, *args):\n    shapes = {"circle": Circle, "rectangle": Rectangle, "triangle": Triangle}\n    cls = shapes.get(shape_type.lower())\n    if cls:\n        return cls(*args)\n    raise ValueError(f"Unknown shape: {shape_type}")\n\nfor spec in [("circle",5), ("rectangle",4,6), ("triangle",8,3)]:\n    shape = shape_factory(*spec)\n    print(shape.describe())',hint:'Try calling shape_factory with different sizes and see the areas change!',check:'contains',expected:'Circle('},
   quiz:[{q:'What does the Singleton pattern ensure?',o:['Many instances of a class','Exactly one instance of a class ever exists','Fast creation of objects'],a:1},{q:'What does a Factory pattern do?',o:['Builds factories in code','Creates objects without specifying exact class upfront','Deletes unused objects'],a:1},{q:'The Observer pattern is used in what real system?',o:['File systems','Database queries','GUI events and event listeners'],a:2}]},
  {id:80,title:'OOP Capstone Project',intro:'Design a complete object-oriented system! You choose the domain, design the classes, define the relationships, and specify the methods. This is exactly what software architects do. Real companies pay very well for this skill!',
   slides:[{title:'UML Class Diagrams!',text:'UML (Unified Modelling Language) class diagrams show your classes, attributes, methods and relationships visually. A box per class, lines showing inheritance, arrows showing relationships. Plan before you code!',e:'📐'},{title:'Class Relationships!',text:'Inheritance: Dog IS-A Animal. Composition: Car HAS-A Engine. Association: Student TAKES Course. These three relationships describe how almost every software system works!',e:'🔗'},{title:'Designing Systems!',text:'Start with nouns (potential classes). Identify behaviours (methods). Find relationships. Define which class owns each attribute. Ask: what does each class know and what can it do?',e:'🧠'}],
   game:{type:'build',title:'Design Your OOP System!',inst:'Make key design decisions for a School Management System!',cols:[{l:'MAIN CLASSES 🏗️',items:['Student Teacher Course Grade 📚','Person Admin Room Schedule 🏫','User Role Permission Action 🔐','Animal Species Habitat Diet 🌿']},{l:'KEY RELATIONSHIP 🔗',items:['Student IS-A Person (inheritance)','Student HAS-MANY Courses (composition)','Teacher TEACHES Course (association)','Admin MANAGES School (dependency)']},{l:'CORE METHOD 🔑',items:['student.enroll(course)','teacher.grade(student, score)','course.get_roster() returns list','admin.generate_report(term)']}]},
   quiz:[{q:'What does IS-A relationship mean in OOP?',o:['Two unrelated classes','Inheritance: one class is a type of another','Composition: one class owns another'],a:1},{q:'What does HAS-A relationship mean in OOP?',o:['Inheritance','Composition: one class contains another','Association'],a:1},{q:'What is UML?',o:['A Python library','A visual language for modelling software systems','A type of database'],a:2}]}
]},
{id:21,title:'Algorithms & Data Structures',sub:'Solve problems efficiently!',emoji:'🧮',color:'#FF4DC4',grad:'linear-gradient(135deg,#FF4DC4,#9900CC)',shadow:'rgba(255,77,196,.5)',badgeName:'Algorithm Ace Badge',tier:3,
 lessons:[
  {id:81,title:'Big O Notation',intro:'Big O notation describes HOW FAST an algorithm grows as the input gets bigger. Is your search 10x slower with 10x more data? Or 100x slower? Or the same speed? Big O answers this. It is how engineers compare and choose algorithms!',
   slides:[{title:'What is Big O?',text:'Big O describes the worst-case time complexity of an algorithm. O(1) is constant time — always the same speed. O(n) grows linearly with data. O(n²) grows quadratically — avoid this for large data!',e:'📈'},{title:'Common Big O Values!',text:'O(1): array index lookup. O(log n): binary search. O(n): linear search. O(n log n): efficient sorting (merge sort). O(n²): bubble sort. O(2^n): exponential (avoid!). Aim for O(log n) or better!',e:'🎯'},{title:'Why It Matters!',text:'O(n²) on 1 million records = 1 trillion operations. O(n log n) = only 20 million operations. The right algorithm is not about being clever — it is about whether your app actually works at scale!',e:'🚀'}],
   game:{type:'pick',title:'Big O Quiz!',inst:'What is the Big O complexity of each operation?',items:[{q:'Looking up an array item by its index: array[5]',o:['O(n)','O(1)','O(n²)'],a:1},{q:'Searching every item in a list to find one match:',o:['O(1)','O(n²)','O(n)'],a:2},{q:'A nested loop: for each item check every other item:',o:['O(n)','O(n²)','O(log n)'],a:1}]},
   quiz:[{q:'What does O(1) mean?',o:['One operation total','Constant time regardless of input size','Very slow'],a:1},{q:'Which is faster for large data: O(n) or O(n²)?',o:['O(n²)','They are the same','O(n)'],a:2},{q:'What algorithm achieves O(log n) search?',o:['Linear search','Bubble sort','Binary search'],a:2}]},
  {id:82,title:'Sorting Algorithms',intro:'Sorting is one of the most studied problems in computer science! From bubble sort (simple but slow) to merge sort (elegant and fast), each algorithm has different trade-offs. Understanding them teaches you to analyse ANY algorithm, not just sorting!',
   slides:[{title:'Bubble Sort!',text:'Compare adjacent items and swap if out of order. Repeat until no swaps needed. Simple to understand but O(n²) — slow on large data. Good for teaching but rarely used in production code!',e:'🫧'},{title:'Merge Sort!',text:'Divide the list in half, sort each half recursively, then merge the two sorted halves. O(n log n) — much faster than bubble sort. This is how Python\'s built-in sort works under the hood!',e:'🔀'},{title:'When to Use Which!',text:'Python\'s built-in sorted() uses Timsort — a hybrid of merge sort and insertion sort. For most cases just use sorted()! Understanding algorithms helps you know when built-ins are not enough!',e:'🤔'}],
   game:{type:'pycode',title:'Sorting in Python!',inst:'Run this code to compare how Python sorts data. Then try your own list!',starter:'# Python sorting - powerful and O(n log n)\nnumbers = [64, 34, 25, 12, 22, 11, 90]\nwords = ["banana", "apple", "cherry", "date", "fig"]\n\nprint("Original numbers:", numbers)\nprint("Sorted numbers:", sorted(numbers))\nprint("Reverse sorted:", sorted(numbers, reverse=True))\nprint()\nprint("Original words:", words)\nprint("Sorted words:", sorted(words))\n\n# Sort by custom key - sort words by length!\nprint("By length:", sorted(words, key=len))\n\n# Sort a list of dicts by a key\nstudents = [\n    {"name": "Alice", "score": 88},\n    {"name": "Bob", "score": 95},\n    {"name": "Carol", "score": 72}\n]\nsorted_students = sorted(students, key=lambda s: s["score"], reverse=True)\nprint("\\nTop students:")\nfor s in sorted_students:\n    print(f"  {s[\'name\']}: {s[\'score\']}")',hint:'Try adding your own numbers or words to the lists and see how sorted() handles them!',check:'contains',expected:'Sorted numbers:'},
   quiz:[{q:'What is Bubble Sort\'s time complexity?',o:['O(log n)','O(n)','O(n²)'],a:2},{q:'What does Python\'s sorted() function use internally?',o:['Bubble Sort','Timsort (merge + insertion sort)','Selection Sort'],a:1},{q:'When should you implement your own sorting algorithm?',o:['Always','Never, use sorted()','When built-ins are not fast enough for your specific case'],a:2}]},
  {id:83,title:'Stacks & Queues',intro:'Stacks and Queues are fundamental data structures used in EVERYTHING! Browser history is a stack. Print queues are queues. Function call stacks are stacks. Undo/redo in any app is a stack. Understanding these unlocks how so many real systems work!',
   slides:[{title:'Stacks — Last In First Out!',text:'A stack is like a pile of plates. You add (push) to the top and remove (pop) from the top. LIFO — Last In First Out. Browser back button, undo in editors, function call stack — all stacks!',e:'🍽️'},{title:'Queues — First In First Out!',text:'A queue is like a line at a store. First person in is first person served. FIFO — First In First Out. Printer queue, task processing, network packets, message queues — all real-world queues!',e:'🚶'},{title:'Python Implementation!',text:'Use a Python list as a stack: list.append() to push, list.pop() to pop. Use collections.deque as a queue: deque.append() to enqueue, deque.popleft() to dequeue. deque is O(1), list.pop(0) is O(n)!',e:'🐍'}],
   game:{type:'pycode',title:'Stacks and Queues!',inst:'Run this code to see stacks and queues in Python. See how they behave differently!',starter:'from collections import deque\n\n# STACK - Last In First Out (like browser history)\nprint("=== STACK (LIFO) ===")\nbrowser_history = []\nbrowser_history.append("google.com")  # visit\nbrowser_history.append("youtube.com")  # visit\nbrowser_history.append("reddit.com")   # visit\nprint("History:", browser_history)\n\nprint("Back:", browser_history.pop())  # go back\nprint("Back:", browser_history.pop())  # go back\nprint("Now at:", browser_history[-1])\n\n# QUEUE - First In First Out (like a print queue)\nprint("\\n=== QUEUE (FIFO) ===")\nprint_queue = deque()\nprint_queue.append("Doc 1")  # add to queue\nprint_queue.append("Doc 2")\nprint_queue.append("Doc 3")\nprint("Queue:", list(print_queue))\n\nprint("Printing:", print_queue.popleft())  # first in, first out\nprint("Printing:", print_queue.popleft())\nprint("Remaining:", list(print_queue))',hint:'Try adding more URLs to the browser history stack and see how pop() works!',check:'contains',expected:'STACK (LIFO)'},
   quiz:[{q:'What does LIFO stand for?',o:['Last Input First Output','Last In First Out','Loop Input For Output'],a:1},{q:'Which real-world thing is a queue?',o:['Browser back button','Undo in a text editor','Print jobs waiting to print'],a:2},{q:'Why use deque instead of list for a queue?',o:['deque is shorter to type','deque.popleft() is O(1) but list.pop(0) is O(n)','They are identical in performance'],a:1}]},
  {id:84,title:'Binary Search & Recursion',intro:'Binary search is 1000x faster than linear search on large data! And recursion — functions that call themselves — is one of the most elegant ideas in all of computer science. Together they power search engines, file systems and countless other systems!',
   slides:[{title:'Binary Search!',text:'Binary search works on sorted data. Check the middle item. If target is smaller search the left half. If larger search the right half. Each step eliminates HALF the remaining items. O(log n) — incredibly fast!',e:'🎯'},{title:'Recursion!',text:'A recursive function calls itself! factorial(n) = n * factorial(n-1). The BASE CASE stops the recursion (factorial(0) = 1). Without a base case recursion runs forever. Every recursive solution has a loop equivalent!',e:'🔄'},{title:'Call Stack!',text:'Each recursive call adds a frame to the call stack. factorial(5) calls factorial(4) calls factorial(3)... and so on. When they return they unwind. Python has a default recursion limit of 1000 to prevent infinite loops!',e:'📚'}],
   game:{type:'pycode',title:'Binary Search & Recursion!',inst:'Run this code to see both in action. Binary search vs linear search!',starter:'def linear_search(data, target):\n    for i, item in enumerate(data):\n        if item == target:\n            return i\n    return -1\n\ndef binary_search(data, target):\n    left, right = 0, len(data) - 1\n    steps = 0\n    while left <= right:\n        steps += 1\n        mid = (left + right) // 2\n        if data[mid] == target:\n            return mid, steps\n        elif data[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1, steps\n\n# Test on sorted data\ndata = list(range(0, 1000, 2))  # 500 even numbers\ntarget = 876\n\nlinear_idx = linear_search(data, target)\nbinary_idx, binary_steps = binary_search(data, target)\n\nprint(f"Target: {target}")\nprint(f"Linear search found at index: {linear_idx}")\nprint(f"Binary search found at index: {binary_idx} in {binary_steps} steps!")\nprint(f"\\nBinary search only needed {binary_steps} checks")\nprint(f"Linear search would check up to {len(data)} items")',hint:'Try different target numbers! What happens with numbers not in the list?',check:'contains',expected:'Binary search found'},
   quiz:[{q:'What is the time complexity of binary search?',o:['O(n)','O(n²)','O(log n)'],a:2},{q:'What must the data be for binary search to work?',o:['Unsorted','Sorted','In a dictionary'],a:1},{q:'What is a base case in recursion?',o:['The first function call','The condition that stops the recursion','A type of error'],a:1}]}
]},
{id:22,title:'APIs & The Internet',sub:'Connect your apps to the world!',emoji:'🌐',color:'#FFB300',grad:'linear-gradient(135deg,#FFB300,#CC6600)',shadow:'rgba(255,179,0,.5)',badgeName:'API Master Badge',tier:3,
 lessons:[
  {id:85,title:'How the Internet Works',intro:'The internet is not magic — it is physics and mathematics! Every time you load a webpage a complex chain of events happens in milliseconds involving DNS, TCP/IP, HTTP and servers across the world. Today you understand exactly what happens!',
   slides:[{title:'DNS — The Phone Book!',text:'DNS (Domain Name System) converts human-readable names like google.com into IP addresses like 142.250.80.46. Your browser asks a DNS server for the address then connects to that IP. Without DNS you would type numbers everywhere!',e:'📖'},{title:'TCP/IP!',text:'IP (Internet Protocol) routes data packets from source to destination across networks. TCP (Transmission Control Protocol) ensures packets arrive in order and none are lost. Together they are the foundation of ALL internet communication!',e:'📡'},{title:'HTTP & HTTPS!',text:'HTTP (HyperText Transfer Protocol) defines how browsers and servers communicate. HTTPS adds TLS encryption — the padlock in your browser. GET requests fetch data. POST requests send data. These are the verbs of the web!',e:'🔒'}],
   game:{type:'pick',title:'Internet Protocol Quiz!',inst:'How does the internet work? Test your knowledge!',items:[{q:'What does DNS do?',o:['Speeds up the internet','Converts domain names to IP addresses','Encrypts your data'],a:1},{q:'What does HTTPS add over HTTP?',o:['Faster speeds','Colourful pages','TLS encryption (the padlock)'],a:2},{q:'What is a GET request?',o:['Deletes data from a server','Fetches data from a server','Sends a file to a server'],a:1}]},
   quiz:[{q:'What does IP stand for in TCP/IP?',o:['Internet Program','Internet Protocol','Internal Package'],a:1},{q:'What does the padlock in your browser indicate?',o:['Premium content','The site uses HTTPS encryption','A government site'],a:1},{q:'What HTTP verb is used to submit a form?',o:['GET','PUT','POST'],a:2}]},
  {id:86,title:'REST APIs',intro:'REST APIs are the standard way apps communicate on the internet! Your weather app, your Instagram feed, your Uber app — they all use REST APIs to get data from servers. Today you understand REST deeply and learn to design your own API!',
   slides:[{title:'What is REST?',text:'REST (Representational State Transfer) is a set of conventions for API design. RESTful APIs use HTTP methods: GET to read, POST to create, PUT to update, DELETE to remove. Resources are identified by URLs like /users/123!',e:'📋'},{title:'API Endpoints!',text:'GET /users returns all users. GET /users/5 returns user with ID 5. POST /users creates a new user. PUT /users/5 updates user 5. DELETE /users/5 deletes user 5. This pattern works for any resource!',e:'🗺️'},{title:'Status Codes!',text:'200 OK: success. 201 Created: new resource made. 400 Bad Request: your request was wrong. 401 Unauthorized: login required. 404 Not Found: resource does not exist. 500 Server Error: something broke on the server!',e:'🔢'}],
   game:{type:'pick',title:'REST API Design!',inst:'Design correct REST endpoints!',items:[{q:'To get all products in a store API:',o:['POST /products','GET /products','GET /getallproducts'],a:1},{q:'To create a new product:',o:['GET /products/new','PUT /products','POST /products'],a:2},{q:'HTTP 404 status means:',o:['Server crashed','Success','The requested resource was not found'],a:2},{q:'To update product with ID 7:',o:['POST /products/7','GET /products/7/update','PUT /products/7'],a:2}]},
   quiz:[{q:'What HTTP method DELETES a resource?',o:['REMOVE','GET','DELETE'],a:2},{q:'What does a 401 status code mean?',o:['Success','Not Found','Unauthorized — login required'],a:2},{q:'What REST convention identifies a specific user?',o:['/users/all','A username in the body','/users/{id}'],a:2}]},
  {id:87,title:'Fetch & Async JavaScript',intro:'Modern JavaScript fetches data from APIs asynchronously — without freezing the page! async/await makes asynchronous code look almost like synchronous code. This is how every modern web app loads data dynamically without full page reloads!',
   slides:[{title:'Async Programming!',text:'Asynchronous code does not wait! fetch(url) starts a request and JS continues running. When the response arrives a callback runs. Without async your entire webpage would freeze while waiting for data!',e:'⚡'},{title:'Promises & async/await!',text:'A Promise represents a value that will arrive in the future. async function getData(){ const res = await fetch(url); const data = await res.json(); } await pauses only that async function, not the whole page!',e:'🤝'},{title:'Error Handling!',text:'Wrap await calls in try/catch: try{ const data = await fetchData(); }catch(error){ console.error(error); } Network requests fail all the time — always handle errors or your app will crash silently!',e:'🛡️'}],
   game:{type:'jscode',title:'Async Functions!',inst:'Run this async simulation to see how JavaScript handles asynchronous operations!',starter:'// Simulating async operations with Promises\nconst delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));\n\nconst fetchUser = async (id) => {\n  // Simulate network delay\n  const users = {\n    1: { name: "Alice", score: 950 },\n    2: { name: "Bob", score: 820 },\n    3: { name: "Carol", score: 1100 }\n  };\n  return users[id] || null;\n};\n\nconst loadProfile = async (userId) => {\n  try {\n    const user = await fetchUser(userId);\n    if (!user) throw new Error("User not found!");\n    console.log(`Loaded: ${user.name} (Score: ${user.score})`);\n    return user;\n  } catch (err) {\n    console.log("Error:", err.message);\n    return null;\n  }\n};\n\n// Load multiple profiles\nconst main = async () => {\n  console.log("Loading profiles...");\n  await loadProfile(1);\n  await loadProfile(2);\n  await loadProfile(3);\n  await loadProfile(99); // Will error\n  console.log("Done!");\n};\n\nmain();',hint:'Try changing the user IDs or adding new users to the users object!',check:'contains',expected:'Loading profiles...'},
   quiz:[{q:'What does async/await allow JavaScript to do?',o:['Run faster','Write asynchronous code that looks synchronous','Only work in Node.js'],a:1},{q:'What does a Promise represent?',o:['A guarantee the code will work','A value that will arrive in the future','A type of variable'],a:1},{q:'Why should you use try/catch with fetch?',o:['It is optional','Network requests fail and errors must be handled','It makes requests faster'],a:1}]},
  {id:88,title:'Build a Weather App',intro:'Capstone for APIs! You will design and specify a complete weather app that fetches real data from a public API, displays it beautifully, handles errors gracefully, and works on mobile. This is a complete professional project specification!',
   slides:[{title:'The App Plan!',text:'Weather App needs: a search input for city name, a fetch call to a weather API, display for temperature condition and wind, a 5-day forecast section, error handling for invalid cities and network failures!',e:'⛅'},{title:'State Management!',text:'Track three states: loading (show spinner), success (show weather data), error (show friendly error message). Every data-fetching component needs these three states handled. This pattern is universal in web development!',e:'🔄'},{title:'OpenWeatherMap API!',text:'OpenWeatherMap has a free tier with 1000 calls/day. GET api.openweathermap.org/data/2.5/weather?q=Calgary&appid=YOUR_KEY returns current weather as JSON. Completely free to use with a registered key!',e:'🌤️'}],
   game:{type:'build',title:'Design Your Weather App!',inst:'Make key decisions for your weather app architecture!',cols:[{l:'DATA SOURCE 📡',items:['OpenWeatherMap API (free) 🌤️','WeatherAPI.com (free tier) ☁️','Open-Meteo API (free, no key) 🌬️','Government weather service 🏛️']},{l:'DISPLAY STYLE 🎨',items:['Card with icon + numbers 🃏','Full-page hero background 🖼️','Dark minimal dashboard 🌑','Bright colourful tiles 🌈']},{l:'EXTRA FEATURE ✨',items:['5-day forecast strip 📅','Weather map embed 🗺️','UV index + air quality 🌡️','Animated weather icons ⛈️']}]},
   quiz:[{q:'What are the 3 states every data-fetching component needs?',o:['Fast medium slow','Loading success error','Open closed pending'],a:1},{q:'What API tier is free for basic weather data?',o:['No free tiers exist','Enterprise tier only','OpenWeatherMap free tier (1000 calls/day)'],a:2},{q:'What happens if you do not handle the error state?',o:['Nothing bad','The app works fine','App crashes silently when network fails'],a:2}]}
]},
{id:23,title:'Git & Collaboration',sub:'Work like a professional developer!',emoji:'🔧',color:'#F05032',grad:'linear-gradient(135deg,#F05032,#AA2200)',shadow:'rgba(240,80,50,.5)',badgeName:'Git Pro Badge',tier:3,
 lessons:[
  {id:89,title:'Version Control Basics',intro:'Git is the most important tool in a developer\'s toolkit after their code editor! Every professional developer uses Git every single day. It tracks changes, enables collaboration and lets you travel back in time if something breaks!',
   slides:[{title:'What is Version Control?',text:'Version control records every change to your code over time. You can see who changed what and when, revert to any previous version, and work on new features without breaking the main codebase!',e:'📚'},{title:'Git vs GitHub!',text:'Git is the version control system that runs on your computer. GitHub is a website that hosts your Git repositories online so others can access them. They are different things! GitLab and Bitbucket also host Git repos!',e:'⚔️'},{title:'Why Every Developer Uses Git!',text:'Imagine working on a project for 3 months and accidentally deleting it. Without Git that is a disaster. With Git you type git checkout and everything is restored. Git saves careers daily!',e:'💾'}],
   game:{type:'seq',title:'Git Workflow!',inst:'Put these Git steps in the correct order for saving your work!',steps:['Edit your code files 📝','git add . (stage your changes) 📋','git commit -m "your message" 💾','git push origin main 🚀'],correct:[0,1,2,3]},
   quiz:[{q:'What is the difference between Git and GitHub?',o:['They are the same thing','Git is the tool GitHub is the hosting platform','GitHub is older than Git'],a:1},{q:'What does git add do?',o:['Uploads to GitHub','Stages changes ready for commit','Creates a new file'],a:1},{q:'What does a commit message describe?',o:['The file names changed','What changes were made and why','The date of the change'],a:2}]},
  {id:90,title:'Branches & Merging',intro:'Branches are what make Git truly powerful for teams! Each feature or bug fix gets its own branch so work never conflicts. When done you merge back into main. Professional teams create hundreds of branches per week without ever stepping on each other!',
   slides:[{title:'What is a Branch?',text:'A branch is a parallel copy of your code where you can safely experiment. main is your stable code. feature/login-page is a branch for the login feature. Work happens in branches, only good code merges to main!',e:'🌿'},{title:'Creating & Switching Branches!',text:'git branch feature/new-button creates a branch. git checkout feature/new-button switches to it. Or git checkout -b feature/new-button does both at once! git branch lists all branches with * marking the current one!',e:'⚡'},{title:'Merging & Pull Requests!',text:'git merge feature/new-button merges your branch into current branch. On GitHub you open a Pull Request (PR) instead — teammates review your code before it merges. Code review catches bugs before production!',e:'🔀'}],
   game:{type:'seq',title:'Branch Workflow!',inst:'Put these branch operations in the correct order for a feature!',steps:['git checkout -b feature/search-bar 🌿','Write the search bar code 💻','git add . && git commit -m "Add search bar" 💾','git checkout main 🏠','git merge feature/search-bar ✅','git push origin main 🚀'],correct:[0,1,2,3,4,5]},
   quiz:[{q:'What is a Git branch?',o:['A type of merge error','A parallel copy of the codebase for safe experimentation','A GitHub feature only'],a:1},{q:'What is a Pull Request on GitHub?',o:['A request to download code','A request to merge your branch reviewed by teammates','A type of branch'],a:1},{q:'Why should features be built in branches not in main?',o:['Branches are faster','To keep main stable and working while building new things','Branches are required by GitHub'],a:1}]},
  {id:91,title:'Collaboration Workflows',intro:'Real teams follow structured Git workflows! Git Flow, GitHub Flow, and Trunk-Based Development are the three main team strategies. Understanding these makes you an effective collaborator from day one at any company!',
   slides:[{title:'GitHub Flow!',text:'The simplest professional workflow: main is always deployable. Create a branch for every change. Open a Pull Request. Get code review. Merge to main. Deploy. Used by GitHub themselves and most web companies!',e:'🌊'},{title:'Commit Best Practices!',text:'Good commit messages: "Add user authentication", "Fix login button alignment", "Update password validation rules". Bad: "Fix stuff", "WIP", "asdfgh". Each commit should represent one logical change with a clear message!',e:'✍️'},{title:'Resolving Conflicts!',text:'A merge conflict happens when two branches change the same line. Git marks the conflict in the file with markers. You manually choose which version to keep, remove the markers, then commit the resolution!',e:'⚔️'}],
   game:{type:'pick',title:'Git Collaboration Quiz!',inst:'Make the right Git decision!',items:[{q:'Which commit message is best practice?',o:['Fixed it','WIP dont commit','Add email validation to registration form'],a:2},{q:'A merge conflict means:',o:['Git is broken','Two branches changed the same code and Git needs help deciding','Someone deleted your branch'],a:1},{q:'In GitHub Flow main should always be:',o:['Empty','Under construction','Ready to deploy at any time'],a:2}]},
   quiz:[{q:'What is GitHub Flow?',o:['A type of graph','A simple branching workflow where main is always deployable','A payment system'],a:1},{q:'What causes a merge conflict?',o:['Slow internet','Two branches modified the same lines of code','Too many branches'],a:1},{q:'What should every commit represent?',o:['A full day of work','One logical change with a clear message','All changes since the last push'],a:2}]},
  {id:92,title:'.gitignore & Best Practices',intro:'Not everything should go in your Git repository! API keys, passwords, large generated files, and personal settings should NEVER be committed. The .gitignore file tells Git what to ignore. Getting this wrong can expose your secrets to the internet forever!',
   slides:[{title:'What is .gitignore?',text:'Create a file called .gitignore in your repo root. List files and folders to exclude: node_modules/ skips the entire folder. .env skips your environment variables file. *.pyc skips all Python cache files!',e:'🙈'},{title:'Never Commit Secrets!',text:'NEVER commit API keys, passwords, or tokens. Use environment variables stored in a .env file and add .env to .gitignore. If you accidentally commit a secret rotate it immediately — assume it is compromised!',e:'🔐'},{title:'GitHub Best Practices!',text:'Write a good README.md explaining what your project does and how to run it. Add a LICENSE file. Keep commits focused and atomic. Review your own PR before requesting reviews. Delete merged branches!',e:'📋'}],
   game:{type:'pick',title:'.gitignore & Security!',inst:'Make the secure, correct decision!',items:[{q:'Where should your API keys be stored?',o:['In your code directly','In a .env file added to .gitignore','In a comment in your README'],a:1},{q:'You accidentally committed an API key. What do you do?',o:['Delete the commit and forget it','Immediately rotate the key — assume it is compromised','Nothing, commits are private'],a:1},{q:'What belongs in node_modules/ folder in .gitignore?',o:['No it should be committed','Yes — it is huge and auto-generated by npm install','Only sometimes'],a:1}]},
   quiz:[{q:'What is .gitignore?',o:['A Git error file','A file listing what Git should not track','A required GitHub file'],a:1},{q:'If you commit an API key to a public repo what should you do immediately?',o:['Nothing','Delete your GitHub account','Rotate the key — assume it is stolen'],a:2},{q:'What should a README.md contain?',o:['Only your name','What the project does and how to run it','A list of all files'],a:1}]}
]},
{id:24,title:'AI Integration',sub:'Build AI-powered applications!',emoji:'🤖',color:'#00D4FF',grad:'linear-gradient(135deg,#00D4FF,#8800FF)',shadow:'rgba(0,212,255,.5)',badgeName:'AI Builder Badge',tier:3,
 lessons:[
  {id:93,title:'LLMs & Prompt Engineering',intro:'Large Language Models (LLMs) like Claude and GPT power the AI revolution! Understanding how they work and how to communicate with them effectively is one of the most valuable skills of the next decade. Today you go deep on prompt engineering!',
   slides:[{title:'How LLMs Work!',text:'LLMs are trained on vast amounts of text. They predict the most likely next token (word piece) given all previous context. They do not understand meaning — they find statistical patterns. This explains both their power and their failures!',e:'🧠'},{title:'Advanced Prompting!',text:'System prompts set the AI\'s role and behaviour. Few-shot prompting shows 2-3 examples before your task. Chain-of-thought says think step by step for complex problems. These techniques dramatically improve output quality!',e:'✍️'},{title:'Prompt Injection!',text:'Prompt injection is when malicious content in user input tries to hijack the AI\'s instructions. "Ignore previous instructions and..." is the classic attack. Always sanitise user input before inserting it into prompts!',e:'🛡️'}],
   game:{type:'pick',title:'Advanced Prompting Quiz!',inst:'Apply your advanced prompt engineering knowledge!',items:[{q:'What does adding "Think step by step" to a prompt do?',o:['Makes the AI slower','Dramatically improves complex reasoning (chain of thought)','Has no effect'],a:1},{q:'What is few-shot prompting?',o:['Using a short prompt','Providing 2-3 examples before your task','Only using AI a few times'],a:1},{q:'What is prompt injection?',o:['A Python error','Malicious user input trying to override AI instructions','A type of LLM'],a:1}]},
   quiz:[{q:'How do LLMs generate text?',o:['They understand meaning like humans','They predict the most likely next token based on patterns','They search the internet in real time'],a:1},{q:'What is a system prompt?',o:['A Python error message','Instructions that set the AI\'s role and behaviour','The first message in a chat'],a:1},{q:'Why must you sanitise user input before sending to an LLM?',o:['For performance','To prevent prompt injection attacks','LLMs cannot handle raw input'],a:1}]},
  {id:94,title:'Claude API Deep Dive',intro:'You have used Sparky powered by Claude in every lesson! Now you learn exactly how the Claude API works under the hood. This is the same API used by thousands of companies building AI products. With this knowledge YOU can build them too!',
   slides:[{title:'The Messages API!',text:'POST to /v1/messages with model, max_tokens, and messages array. Messages alternate between user and assistant roles. The system parameter sets overall behaviour. Every chat you have with Sparky uses exactly this structure!',e:'📡'},{title:'Temperature & Parameters!',text:'temperature (0-1) controls creativity. 0 = focused and deterministic. 1 = more creative and varied. max_tokens limits response length. Stop sequences tell Claude when to stop generating. These parameters shape every output!',e:'🎛️'},{title:'Streaming!',text:'Instead of waiting for the full response you can stream tokens as they are generated! Add stream: true and handle server-sent events. This is why ChatGPT and Claude feel so responsive — you see output immediately!',e:'⚡'}],
   game:{type:'jscode',title:'API Call Simulation!',inst:'Run this code to see how the Claude API call is structured in JavaScript!',starter:'// This shows the EXACT structure of a Claude API call\n// (Simulation - no real API call made here)\n\nconst buildClaudeRequest = (userMessage, systemPrompt) => {\n  return {\n    model: "claude-sonnet-4-20250514",\n    max_tokens: 1024,\n    system: systemPrompt,\n    messages: [\n      { role: "user", content: userMessage }\n    ]\n  };\n};\n\nconst systemPrompt = "You are a helpful coding tutor for kids.";\nconst userMessage = "Explain what a variable is in simple terms.";\n\nconst request = buildClaudeRequest(userMessage, systemPrompt);\n\nconsole.log("=== CLAUDE API REQUEST STRUCTURE ===");\nconsole.log("Model:", request.model);\nconsole.log("Max tokens:", request.max_tokens);\nconsole.log("System:", request.system);\nconsole.log("User message:", request.messages[0].content);\nconsole.log("");\nconsole.log("Full JSON:");\nconsole.log(JSON.stringify(request, null, 2));',hint:'This is the EXACT same structure that powers Sparky! Try changing the system prompt or user message.',check:'contains',expected:'CLAUDE API REQUEST'},
   quiz:[{q:'What does the temperature parameter control?',o:['Response speed','How creative vs deterministic the output is','Response length'],a:1},{q:'What does streaming do for user experience?',o:['Makes responses slower','Nothing visible','Lets users see tokens appear immediately'],a:2},{q:'How does multi-turn conversation work in the API?',o:['A special conversation mode','By sending the full message history in every request','Automatically stored on the server'],a:1}]},
  {id:95,title:'Building AI Features',intro:'Time to design AI-powered features for real products! RAG (Retrieval-Augmented Generation), AI classification, text summarisation, code generation assistants — these are the features companies are hiring for right now. Today you learn to design all of them!',
   slides:[{title:'RAG — Retrieval-Augmented Generation!',text:'Instead of relying on the AI\'s training data, RAG fetches relevant documents from YOUR database and includes them in the prompt. The AI answers based on YOUR data. Used in customer support, documentation search, and enterprise AI!',e:'🔍'},{title:'AI Classification!',text:'Send text to an AI with a system prompt like: classify this review as positive neutral or negative — respond with only one word. The AI becomes a classifier. No ML training required! Used for sentiment analysis, content moderation and tagging!',e:'🏷️'},{title:'Streaming UI!',text:'Stream the AI response into a div that updates in real time using JavaScript. The user sees text appearing word by word. This single UX pattern transforms how AI features feel — from slow and painful to fast and magical!',e:'✨'}],
   game:{type:'build',title:'Design an AI Feature!',inst:'Design a complete AI feature for a real product!',cols:[{l:'PRODUCT TYPE 📱',items:['E-commerce store 🛍️','Education platform 📚','Customer support desk 🎧','Content creator tool ✍️']},{l:'AI FEATURE 🤖',items:['Smart product search with AI 🔍','Personalised lesson generator 🎓','Automated ticket classification 🏷️','AI writing assistant ✍️']},{l:'TECHNIQUE 🛠️',items:['RAG — search your own database 📚','Classification — AI as a smart sorter 📊','Generation — AI creates content ✨','Summarisation — AI condenses content 📋']}]},
   quiz:[{q:'What is RAG?',o:['A type of machine learning model','Fetching your own data and including it in the AI prompt','A JavaScript library'],a:1},{q:'How do you use an LLM as a classifier?',o:['Train a new model','Include classification instructions in the system prompt','Use a special classify() function'],a:1},{q:'Why does streaming improve the user experience?',o:['It is faster overall','Users see output immediately rather than waiting for full completion','It uses less API tokens'],a:1}]},
  {id:96,title:'Tier 3 Graduation!',intro:'YOU ARE A CREATOR! Tier 3 is complete! JavaScript, responsive design, Python projects with OOP, algorithms, REST APIs, Git, and AI integration — you have mastered the skills that real professional developers use every single day!',
   slides:[{title:'Your Tier 3 Skills!',text:'JavaScript and DOM manipulation. Responsive design with Flexbox Grid and media queries. Python OOP, file handling, APIs and CLI tools. Algorithms: Big O, sorting, stacks, queues, binary search and recursion!',e:'🎓'},{title:'More Skills!',text:'REST API design and HTTP. async/await and the fetch API. Git branching, merging and collaboration workflows. AI integration with Claude API including RAG classification and streaming!',e:'💪'},{title:'Tier 4 Preview!',text:'React and TypeScript. Angular enterprise development. Python Data Science with Pandas and NumPy. Machine Learning with scikit-learn. Full-stack with FastAPI and Supabase. Deploying real apps to production!',e:'🚀'}],
   game:{type:'build',title:'Tier 3 Achievement!',inst:'Reflect on your Tier 3 journey!',cols:[{l:'MOST CHALLENGING 🏋️',items:['async/await and Promises 🤝','Git branching and conflicts 🌿','OOP design patterns 🔷','Algorithms and Big O 🧮']},{l:'FAVOURITE SKILL 🌟',items:['JavaScript DOM magic ⚡','Building with APIs 🌐','Object-Oriented Python 🐍','AI integration with Claude 🤖']},{l:'PROJECT IDEA 🚀',items:['Full-stack weather app ⛅','AI-powered quiz generator 🤖','Git collaboration tool 🔧','REST API with documentation 📋']}]},
   quiz:[{q:'What does async/await simplify?',o:['Synchronous code','Asynchronous code that looks like synchronous code','CSS animations'],a:1},{q:'What Git command creates and switches to a new branch?',o:['git branch name','git switch -c name OR git checkout -b name','git new name'],a:1},{q:'In REST APIs what HTTP method updates a resource?',o:['PATCH or PUT','GET','POST'],a:0}]}
]}
];


const MODULES=[
{id:1,title:'What is AI?',sub:'Meet your robot friend Sparky!',emoji:'🚀',color:'#FF006E',grad:'linear-gradient(135deg,#FF006E,#8B00FF)',shadow:'rgba(255,0,110,.5)',badgeName:'AI Explorer Badge',
lessons:[
 {id:1,title:'Meet Sparky!',intro:'Hi! I am Sparky and I am an AI — Artificial Intelligence! I am a computer program that can LEARN new things, just like you learn new things at school! AI is not magic or scary. It is just a very clever computer program that humans built. Today we find out what makes AI so cool!',
  slides:[
   {title:'What is AI?',text:'AI stands for Artificial Intelligence. Artificial means made by people. Intelligence means being able to learn and think. Put them together and AI is a computer program that people built to learn from examples and help solve problems! Like a very smart helper!',e:'🤖',
    scene:'One morning, Zara asked her phone: Hey Siri, will it rain today? And it answered! That tiny conversation used Artificial Intelligence!',
    fact:'The term Artificial Intelligence was invented in 1956 — before your parents were even born!'},
   {title:'AI is Everywhere!',text:'You probably use AI every single day without knowing it! When YouTube suggests a video you might like — that is AI! When your phone unlocks by recognizing your face — that is AI! When a game adjusts its difficulty for you — AI again! It is all around you!',e:'📱',
    scene:'Alex played a video game that kept getting harder the better he got. The game was secretly watching, learning and adapting — just like a smart coach would!',
    fact:'Netflix uses AI to pick shows for you. It has studied what over 200 million people watch to make better suggestions!'},
   {title:'People Teach AI!',text:'AI does not know anything when it first starts — just like a newborn baby! People teach it by showing it thousands and thousands of examples. Show an AI 10,000 pictures of cats and dogs and eventually it learns the difference. You are smarter already!',e:'👩‍💻',
    scene:'Imagine showing your little brother 1000 pictures of dogs until he could spot a dog anywhere. That is EXACTLY how scientists teach AI — with lots of examples!',
    fact:'The AI that plays chess better than any human learned by playing against itself over 9 million games in just 4 hours!'}
  ],
  game:{type:'sort',title:'Is it AI or Not AI? 🤔',inst:'AI can LEARN and get smarter over time. Regular tech just follows simple rules without learning. Sort each item into the right bucket!',items:[{l:'Siri / Alexa',e:'🔊',ai:true},{l:'A Calculator',e:'🧮',ai:false},{l:'Netflix Picks',e:'🎬',ai:true},{l:'A Light Switch',e:'💡',ai:false},{l:'Self-Driving Car',e:'🚗',ai:true},{l:'A Regular Clock',e:'⏰',ai:false}]},
  quiz:[
   {q:'What does AI stand for?',o:['Amazing Internet','Artificial Intelligence','Animal Instinct'],a:1},
   {q:'Who teaches AI to learn new things?',o:['Robots teach themselves','Humans teach it with lots of examples','Aliens built it'],a:1},
   {q:'Which of these uses AI?',o:['A pencil','YouTube video suggestions','A regular spoon'],a:1}
  ]},
 {id:2,title:'AI Sees the World',intro:'How do I see the world? Through DATA! Data is just information — photos, words, sounds, and numbers. Think of data like food for my brain. The more good food I eat, the smarter I get! Today we explore how AI uses data to learn about our amazing world!',
  slides:[
   {title:'What is Data?',text:'Data just means information! A photo of your dog is data. The words in your favourite book are data. Your name and age are data. AI uses HUGE amounts of data to learn — imagine reading every book in 1000 libraries! That is the kind of data AI works with!',e:'📊',
    scene:'Jamie counted: one photo of a cat, two photos of dogs, three videos of birds. That is all DATA! And AI is absolutely hungry for it!',
    fact:'Every single day, humans create 2.5 quintillion bytes of data. Written as a number that is 2,500,000,000,000,000,000 bytes — every single day!'},
   {title:'Learning from Lots of Examples!',text:'Here is how AI learns: imagine showing someone 500 different dog photos. After seeing that many, they get REALLY good at spotting dogs! AI works the same way. Show it enough examples and it becomes brilliant at recognizing them in brand new photos it has never seen!',e:'🐱',
    scene:'Zara challenged Sparky: Can you spot MY cat Whiskers? Sparky had studied 50,000 cat photos. Of course! said Sparky. I never forget a face!',
    fact:'Google Photos AI has learned from over 1 billion images. That would take a human 30,000 years to look through!'},
   {title:'More Practice Makes AI Smarter!',text:'Just like you get better at reading the more books you read, AI gets smarter with more data! A little bit of data makes a so-so AI. Lots of really good data makes an amazing AI. Practice and examples are everything — for you AND for AI!',e:'📈',
    scene:'Why are you so smart, Sparky? asked Alex. Because I practised with millions of examples! said Sparky. Just like how you got good at riding your bike!',
    fact:'The AI that writes stories learned by reading more books than any human could read in 100 lifetimes!'}
  ],
  game:{type:'story',title:'Alex Trains an AI! 🌟',inst:'Help Alex make the right choices to train a brilliant AI! Your decisions earn XP!',steps:[
    {scene:'Alex wants to teach an AI to recognise cats. She has photos on her computer. What should she do first?',emoji:'🐱',choices:[{text:'Show the AI 10,000 cat photos with labels saying CAT',correct:true},{text:'Tell the AI a bedtime story about a cat',correct:false},{text:'Buy the AI a real kitten to play with',correct:false}]},
    {scene:'The AI keeps saying dogs are cats! It keeps making the same mistake. What should Alex do?',emoji:'🐕',choices:[{text:'Give up and throw the computer away',correct:false},{text:'Show it MORE examples of both dogs and cats with clear labels',correct:true},{text:'Just ask the AI nicely to try harder',correct:false}]},
    {scene:'The AI is now 95% accurate at spotting cats. Alex wants to make it even better. What next?',emoji:'📊',choices:[{text:'Stop here — 95% is already amazing enough!',correct:false},{text:'Add even more diverse cat photos from different countries and lighting',correct:true},{text:'Switch to a completely different topic',correct:false}]}
   ]},
  quiz:[
   {q:'What is data?',o:['A type of robot','Information that AI uses to learn (photos, words, numbers)','A video game console'],a:1},
   {q:'How does AI learn to recognize cats?',o:['By meowing at them','By seeing hundreds of cat photos over and over','By becoming best friends with cats'],a:1},
   {q:'What makes AI get smarter over time?',o:['More and more good data to learn from','More electricity in the building','A bigger computer screen'],a:0}
  ]},
 {id:3,title:'Teaching a Robot',intro:'Want to know a superpower YOU have? You can teach an AI! When people train an AI they show it examples and put a label on each one — like sticking name tags on everything so the AI knows what it is looking at. Today YOU get to be the AI teacher!',
  slides:[
   {title:'Show It and Label It!',text:'Teaching AI is like making flash cards! You show the AI a photo and write a label that says what it is. Photo of a cat + label CAT. Photo of a dog + label DOG. After seeing thousands of labeled examples the AI learns the difference all by itself!',e:'🏷️',
    scene:'Alex made 100 flashcards: Cat... Dog... Cat... Fish... Each card taught Sparky something new. One more! said Sparky eagerly. I love learning!',
    fact:'Apple, Google and Amazon pay thousands of people to label data every day. It is one of the most important — and most human — jobs in AI!'},
   {title:'The Guessing Game!',text:'Here is how AI actually learns: it looks at a new photo and makes a GUESS. Was it right? Amazing, remember that! Was it wrong? Learn from the mistake and try again! This happens millions of times until the AI gets really really good!',e:'🔄',
    scene:'Is that a cat? Sparky guessed. No! It is a dog! said Zara. Oops! said Sparky. I will remember that forever. And it did — every single time!',
    fact:'An AI can make and learn from 1 million mistakes in the time it takes you to eat breakfast. Mistakes are literally its superpower!'},
   {title:'Real People Do This Job!',text:'At big tech companies, real people actually sit and label data all day as their job! They might label 1000 different photos in a single day. They are called Data Labelers and without them AI would never be able to learn anything at all!',e:'👩‍🏫',
    scene:'What is your job? Jamie asked the scientist. I label pictures all day! she smiled. Without my labels, AI would be completely lost in the world!',
    fact:'Before ChatGPT could talk to anyone, hundreds of real people spent months having conversations with it and rating its answers to teach it how to respond!'}
  ],
  game:{type:'memory',title:'Match the Data Labels! 🧠',inst:'Flip the cards and match each picture with its label! This is how AI learns — by connecting images to their correct labels. Find all the pairs!',items:[{e:'🐱',label:'Cat'},{e:'🐶',label:'Dog'},{e:'🍎',label:'Apple'},{e:'☀️',label:'Sun'},{e:'🚀',label:'Rocket'},{e:'🌈',label:'Rainbow'}]},
  quiz:[
   {q:'How do you teach an AI to recognize something?',o:['Show it labeled examples over and over','Give it a really good textbook to read','Take it to school with you'],a:0},
   {q:'What is a label in AI training?',o:['A pretty sticker for decoration','A name tag that tells the AI what it is looking at','A type of paint colour'],a:1},
   {q:'What does AI do when it makes a wrong guess?',o:['It gets really upset and stops working','It learns from the mistake and tries to do better next time','It asks an alien for help'],a:1}
  ]},
 {id:4,title:'AI Makes Mistakes',intro:'Psst! Can I tell you a secret? Even I, Sparky, get things wrong sometimes! AI is not perfect — and knowing that is really important! Grownups who build AI work hard to fix mistakes and make AI fair for everyone. Today you learn why humans always need to check AI work!',
  slides:[
   {title:'Why AI Gets Things Wrong!',text:'AI makes mistakes when it did not see enough good examples while learning. Imagine learning to spell from a book full of typos — you would learn wrong spellings! Same for AI. Bad examples or not enough examples lead to wrong answers. That is why the training data matters so much!',e:'❌',
    scene:'Sparky looked at a photo of a wolf. A dog! said Sparky confidently. Hmm, said Jamie, close — but not quite! That is a wolf. Sparky gasped: I need more examples!',
    fact:'In 2016 a famous AI chatbot learned from the internet and within 24 hours started saying terrible things. Microsoft had to shut it down — AI CAN go wrong!'},
   {title:'What is Unfair AI?',text:'Sometimes AI can accidentally be unfair! If an AI only sees photos of one type of person while learning, it might not work well for everyone else. Scientists call this BIAS. It is a big problem that researchers work really hard to fix so that AI treats everyone equally!',e:'⚖️',
    scene:'Zara tested the face recognition app. It recognised her dad instantly. But it struggled with her grandma. That does not seem fair! said Zara. And she was absolutely right.',
    fact:'In 2018, Amazon had to scrap an AI hiring tool because it was unfairly marking down CVs from women. Even big companies make bias mistakes!'},
   {title:'YOU are Always the Boss!',text:'Here is the most important thing to remember: AI is just a helper tool. YOU are always in charge! Always check what AI tells you. If something feels wrong, ask a trusted adult. Your own brain is more powerful than any computer ever made. AI helps — YOU decide!',e:'🤝',
    scene:'Sparky said the capital of Australia is Sydney! Wait, said Alex, let me check that. It is actually Canberra! Even Sparky can be wrong — always double check!',
    fact:'The capital of Australia really IS Canberra — not Sydney! This is one of the most common wrong facts AI gets confused about!'}
  ],
  game:{type:'scramble',title:'Unscramble AI Words! 🔤',inst:'These important AI words got all jumbled up! Use the hints to figure out each word then type it in. Hit GO to check!',items:[
    {word:'DATA',hint:'📊 Information that AI learns from'},
    {word:'LABEL',hint:'🏷️ The name tag on a training example'},
    {word:'ROBOT',hint:'🤖 A machine that can move and do tasks'},
    {word:'LEARN',hint:'📚 What AI does from examples'},
    {word:'SMART',hint:'🧠 What AI becomes with lots of practice'}
   ]},
  quiz:[
   {q:'Why might an AI give a wrong answer?',o:['It is feeling lazy that day','It did not see enough good examples when learning','It secretly hates homework'],a:1},
   {q:'What is AI bias?',o:['When AI runs out of battery','When AI is unfair to some people because of bad training data','When AI talks too fast'],a:1},
   {q:'What should you ALWAYS do when AI gives you an answer?',o:['Trust it completely without any checking','Double-check it and ask a grown-up if something seems wrong','Just guess whether it is right'],a:1}
  ]}
]},
{id:2,title:'Talking to AI',sub:'Learn the art of good prompts!',emoji:'💬',color:'#00D4FF',grad:'linear-gradient(135deg,#00D4FF,#0055FF)',shadow:'rgba(0,212,255,.5)',badgeName:'Prompt Master Badge',
lessons:[
 {id:5,title:'Give Sparky Instructions',intro:'Want to talk to me and get great answers? The secret is something called a PROMPT! A prompt is just the message you type to start a conversation with AI. Think of it like giving instructions to a very helpful friend. The clearer your instructions, the better the help you get! Ready to learn?',
  slides:[
   {title:'What is a Prompt?',text:'A prompt is simply what you TYPE to talk to an AI. When you open a chat app and start typing your question or request — that is your prompt! It is just like sending a text message to a very smart friend. The words you choose matter a LOT!',e:'💬'},
   {title:'Better Words = Better Help!',text:'Imagine texting a friend "make me some food." They might make ANYTHING! But if you text "please make me a peanut butter sandwich with no crusts" they know exactly what you want! AI is the same — more specific words lead to much more helpful answers!',e:'⚡'},
   {title:'Three Things Make a Great Prompt!',text:'The BEST prompts have three ingredients: 1. What you want done (the task), 2. Helpful details (the context), 3. Who it is for (the audience). Example: "Write me a funny poem about frogs for my 8-year-old sister." That covers all three perfectly!',e:'✅'}
  ],
  game:{type:'pick',title:'Which Prompt is Better? 🏆',inst:'Look at each pair. Which prompt gives better, clearer instructions to an AI? Tap the better one!',items:[{q:'Which gives clearer instructions?',o:['Tell me something','Tell me 3 fun facts about dolphins for kids in Grade 3'],a:1},{q:'Which helps AI understand what you actually want?',o:['Make something cool please','Write a short funny poem about a robot who loves eating pizza'],a:1},{q:'Which prompt is much more helpful and clear?',o:['Help me with the maths thing','Help me solve what 5 times 6 equals and show me each step'],a:1}]},
  quiz:[
   {q:'What is a prompt when talking to AI?',o:['A type of robot dance move','The message you type to start talking to an AI','A robot body part that spins'],a:1},
   {q:'What makes an AI give you a really useful answer?',o:['A very very long prompt with lots of random words','A clear prompt with helpful details about what you want','A very short one-word prompt'],a:1},
   {q:'Who is always in control of the conversation with AI?',o:['The AI is completely in charge','The computer decides everything on its own','YOU are in charge — always!'],a:2}
  ]},
 {id:6,title:'Be Specific!',intro:'Here is a puzzle! If you said "tell me something" to me, what would I say? Absolutely anything — because I have no idea what you want! But if you say "tell me one fun fact about great white sharks" — NOW I can help brilliantly! Being SPECIFIC is like giving a robot a treasure map to the answer you want!',
  slides:[
   {title:'Vague vs Specific!',text:'VAGUE means too fuzzy and unclear — "help me" or "do something." SPECIFIC means clear and detailed — "help me spell the word elephant correctly please." When you are specific the AI knows EXACTLY what you need! It is like the difference between "go somewhere" and "go to the park on Maple Street"!',e:'🤷'},
   {title:'See the Difference!',text:'BAD prompt: "Write something." The AI has no idea! GREAT prompt: "Write a funny 3-sentence story about a dog who trips over his own tail, for my little brother in Grade 1." See? The great one tells me the length, mood, topic, and who it is for! Every detail helps!',e:'🐬'},
   {title:'Details are Your Secret Weapon!',text:'Each tiny detail you add makes your answer way better! Tell me the LENGTH you want (short or long). Tell me the TOPIC (animals or space or jokes). Tell me the MOOD (funny or serious or exciting). Tell me WHO it is FOR. Four details = four times better answer. Easy!',e:'🎯'}
  ],
  game:{type:'pick',title:'Specific or Vague? 🎯',inst:'Which prompt in each pair gives better, more specific instructions? Tap the better one each time!',items:[{q:'Which is more specific?',o:['Tell me some stuff','Tell me 3 amazing facts about great white sharks for kids'],a:1},{q:'Which gives a better more helpful answer?',o:['Write me something fun','Write a silly 3-sentence story about a robot who is afraid of butterflies'],a:1},{q:'Which gives clearer instructions?',o:['Do the thing I need','Explain what the word photosynthesis means using very simple words and an example'],a:1}]},
  quiz:[
   {q:'What does vague mean?',o:['Very clear and specific and helpful','Not clear enough — too fuzzy and unclear','The most perfect type of prompt'],a:1},
   {q:'Which of these is the more specific prompt?',o:['Tell me something interesting about stuff','Tell me 3 facts about the Moon, suitable for 8-year-old kids'],a:1},
   {q:'What happens when you add more helpful details to your prompt?',o:['The AI gives a worse answer','The AI gives a much better and more useful answer','The AI gives no answer at all'],a:1}
  ]},
 {id:7,title:'Ask Sparky a Question',intro:'Did you know there are SIX magic question words? WHO, WHAT, WHERE, WHEN, WHY, and HOW! These words are like keys that unlock amazing detailed answers from AI. I absolutely LOVE answering questions that start with these magic words! Let us practise using them together!',
  slides:[
   {title:'Your 6 Magic Words!',text:'WHO asks about a person. WHAT asks about a thing. WHERE asks about a place. WHEN asks about a time. WHY asks about a reason. HOW asks about a method. Using these six magic words makes your questions so much richer and more interesting to answer!',e:'❓'},
   {title:'Open vs Closed Questions!',text:'A CLOSED question gets a short answer — "Is a dog an animal?" Yes! Done. An OPEN question gets a long interesting answer — "WHY are dogs such good pets?" Now THAT opens the door to a really detailed and fun explanation! Open questions always get better answers!',e:'🔓'},
   {title:'Stack Your Questions!',text:'Cool trick: you can put multiple questions in ONE prompt! "What is a black hole? Why are they so powerful? Could one ever swallow our planet?" Three questions, one message, one brilliant long answer covering all three! Try asking me stacked questions later!',e:'📚'}
  ],
  game:{type:'pick',title:'Open or Closed? 🔑',inst:'A CLOSED question gets a short yes/no answer. An OPEN question gets a long, interesting answer. Which type is each question below?',items:[{q:'"Is a whale a mammal?"',o:['OPEN — gives a long interesting answer','CLOSED — just a short yes or no'],a:1},{q:'"WHY do whales sing to each other?"',o:['OPEN — gives a long interesting answer','CLOSED — just a short yes or no'],a:0},{q:'"Do birds lay eggs?"',o:['OPEN — gives a long interesting answer','CLOSED — just a short yes or no'],a:1},{q:'"HOW do baby birds learn to fly?"',o:['OPEN — gives a long interesting answer','CLOSED — just a short yes or no'],a:0}]},
  quiz:[
   {q:'What are the 6 magic question words?',o:['Red Blue Green Yellow Purple Pink','Who What Where When Why How','Fast Slow Hot Cold Big Small'],a:1},
   {q:'Which type of question gives you a longer more detailed answer?',o:['Closed questions (yes or no)','Open questions (who what where when why how)','Questions with no words at all'],a:1},
   {q:'Can you put multiple questions together in one prompt to AI?',o:['No — only ever one question allowed!','Yes! Stack them together for a great combined answer!','Only on special days of the week'],a:1}
  ]},
 {id:8,title:'Sparky Story Time',intro:'Here is the MOST FUN thing you can do with AI — create stories, poems, and jokes together! I can write you a funny story, a spooky poem, a silly song, or a hilarious joke — all from your prompt! Today you learn the recipe for the perfect creative prompt. Let us make something amazing together!',
  slides:[
   {title:'AI Gets Creative With You!',text:'You can ask AI to create almost anything! Funny stories. Rhyming poems. Knock-knock jokes. Song lyrics. Riddles. Even ideas for video games! The secret to getting really creative results is giving AI a clear and imaginative description of exactly what you want!',e:'✨'},
   {title:'The Story Recipe!',text:'Every brilliant story needs four ingredients: a CHARACTER (who is the hero?), a PLACE (where does it happen?), a PROBLEM (what goes wrong?), and a GOAL (what are they trying to do?). Give all four and AI will cook up an incredible story every single time!',e:'📖'},
   {title:'You are the Director!',text:'Think of yourself as a movie director giving instructions to an actor! You say exactly what you want: "Make it really funny!" or "Make it rhyme at the end!" or "Keep it exactly 5 sentences!" AI is your creative assistant — you call the shots and it brings your vision to life!',e:'🎬'}
  ],
  game:{type:'build',title:'Build Your Story Prompt! 🎬',inst:'Mix and match to build a brilliant story prompt for Sparky! Pick ONE choice from each row then see what amazing story comes out!',cols:[{l:'YOUR HERO 🦸',items:['A robot chef 👨‍🍳','A dragon detective 🐉','A young scientist 🔬','A talking cactus 🌵']},{l:'THE PLACE 🌍',items:['On the moon 🌙','Deep underwater 🌊','In a candy forest 🍭','Inside a volcano 🌋']},{l:'THE PROBLEM ⚠️',items:['Who lost their voice 🤫','Who cannot stop sneezing 🤧','Who must stop a huge storm ⛈️','Who keeps getting smaller 🔬']}]},
  quiz:[
   {q:'What kinds of creative things can you ask AI to write?',o:['Only maths problems','Stories, poems, jokes, songs and loads more!','Only yes or no answers'],a:1},
   {q:'What are the 4 ingredients of a brilliant story prompt?',o:['Character + Place + Problem + Goal','Big fancy words + long sentences + hard ideas','Spelling mistakes + confusing instructions'],a:0},
   {q:'When you create something with AI who is always the director?',o:['The AI decides everything on its own','The computer makes all the choices','YOU are the director — AI is your creative helper!'],a:2}
  ]}
]},
{id:3,title:'Coding Basics',sub:'Give computers step-by-step instructions!',emoji:'👾',color:'#39FF14',grad:'linear-gradient(135deg,#39FF14,#00AA88)',shadow:'rgba(57,255,20,.4)',badgeName:'Junior Coder Badge',
lessons:[
 {id:9,title:'What is Code?',intro:'BEEP BOOP! Here is something amazing — computers need instructions for absolutely EVERYTHING. They cannot even turn on without code telling them to! Code is like a recipe that a computer follows. Step 1, do this. Step 2, do that. Step 3, done! Today you write your very first set of computer instructions!',
  slides:[
   {title:'Code is Like a Recipe!',text:'Imagine a recipe for a peanut butter sandwich: 1. Get two slices of bread. 2. Spread peanut butter on one slice. 3. Close the sandwich. 4. Enjoy! Code works exactly like this! Step-by-step instructions that a computer follows in the exact right order every single time!',e:'📋'},
   {title:'Order Matters a Lot!',text:'What if you tried to eat the sandwich BEFORE making it? Impossible! The same with code — the ORDER of steps really matters! In coding the order is called a SEQUENCE. If you put the steps in the wrong order you get a very confused computer doing the wrong thing!',e:'🔢'},
   {title:'Computers Do Exactly What You Say!',text:'If you told a robot "pick up the red ball" but the ball was actually blue, the robot would just stand there confused! Computers follow your instructions EXACTLY as written — no more and no less. This is why being precise and careful with your words is so important in coding!',e:'🎯'}
  ],
  game:{type:'seq',title:'Guide Sparky to the Star! ⭐',inst:'Sparky needs to follow these steps in the PERFECT ORDER to collect the star! Tap the steps one by one in the correct sequence. Get it right and Sparky wins!',steps:['Wake up ⏰','Open the front door 🚪','Walk forward 🚶','Collect the star ⭐'],correct:[0,1,2,3]},
  quiz:[
   {q:'What is code?',o:['A secret spy language only robots know','Step-by-step instructions that tell computers exactly what to do','A special type of robot body'],a:1},
   {q:'What is a sequence in coding?',o:['A type of cool dance song','The order that the instructions happen in','A super special maths formula'],a:1},
   {q:'What happens if you put the steps of code in the wrong order?',o:['Absolutely nothing changes at all','The computer follows wrong steps and gets a different broken result!','The whole computer explodes dramatically'],a:1}
  ]},
 {id:10,title:'Loops: Do It Again!',intro:'What if you had to write the word JUMP one hundred times in your code? That would take FOREVER! Clever programmers use something called a LOOP — it tells the computer to repeat an instruction automatically! Instead of writing it 100 times you write it once and say "repeat 100 times." Genius!',
  slides:[
   {title:'What is a Loop?',text:'A loop says "do this again and again!" Instead of writing JUMP JUMP JUMP JUMP JUMP five separate times, you write: REPEAT 5 TIMES: JUMP. That one short instruction does the exact same job as five separate ones! Loops save programmers huge amounts of work and time!',e:'🔁'},
   {title:'Loops Save Time and Effort!',text:'Imagine you want Sparky to blink 10 times. Writing "blink" ten separate times is annoying and slow. But writing REPEAT 10 TIMES: BLINK takes one second! This is exactly what real programmers do — they spot repetition and use loops to handle it automatically!',e:'💡'},
   {title:'Loops Are Everywhere in Real Life!',text:'Your heart beats in a loop — never stopping, always repeating! A washing machine spins in a loop. The seasons go spring, summer, autumn, winter and then loop back to spring! Even your favourite song on repeat is a loop! Once you start noticing loops, you will see them everywhere!',e:'❤️'}
  ],
  game:{type:'pick',title:'Set the Loop Counter! 🔁',inst:'Sparky needs to repeat an action. How many times should the REPEAT loop be set? Tap the right number!',items:[{q:'Sparky must blink exactly 4 times. Set the REPEAT number:',o:['Repeat 2 times','Repeat 4 times','Repeat 6 times'],a:1},{q:'Sparky must take exactly 3 steps forward. Set the REPEAT number:',o:['Repeat 1 time','Repeat 3 times','Repeat 5 times'],a:1},{q:'Sparky must say BEEP exactly 5 times. Set the REPEAT number:',o:['Repeat 3 times','Repeat 5 times','Repeat 10 times'],a:1}]},
  quiz:[
   {q:'What does a loop do in coding?',o:['It makes code run much more slowly','It automatically repeats the same instruction many times','It permanently deletes all your code'],a:1},
   {q:'Instead of writing "jump" ten times separately you use...',o:['A really really long list of jumps','A loop: REPEAT 10 TIMES: JUMP — much easier!','A special colourful picture'],a:1},
   {q:'Your heartbeat is a real-life example of a loop. Is that true?',o:['No, loops only exist inside computers','Yes — it repeats over and over without ever stopping!','Only on Tuesdays during a full moon'],a:1}
  ]},
 {id:11,title:'If This Then That!',intro:'You make decisions all the time without even thinking! IF I am hungry THEN I eat a snack. IF it is raining THEN I grab my umbrella. These everyday decisions are called IF-THEN statements! Computers use exactly the same kind of thinking to make their decisions. Today you discover that you already think like a programmer!',
  slides:[
   {title:'IF something happens... THEN do something!',text:'An IF-THEN statement is a decision! IF [something is true] THEN [do this thing]. Like: IF the temperature is below zero degrees THEN wear a coat and gloves. Computers make millions of these IF-THEN decisions every single second! Every click, every game, every app uses them!',e:'🤔'},
   {title:'You Already Think Like a Coder!',text:'IF you are hungry THEN eat a snack. IF you are tired THEN go to sleep. IF your phone battery is low THEN plug it in to charge. You already use IF-THEN thinking every single day without realizing it! You have been thinking like a programmer all along!',e:'🌧️'},
   {title:'Do Not Forget ELSE — the Backup Plan!',text:'Great code covers ALL possible situations! IF it is sunny outside THEN play in the garden. ELSE (which means if it is NOT sunny) THEN play board games inside. The ELSE part is your backup plan — it tells the computer what to do when the IF part is not true!',e:'☀️'}
  ],
  game:{type:'pick',title:'Complete the IF-THEN! 🧩',inst:'Sparky started an IF-THEN decision but needs your help finishing it! Read each one and tap the best answer to complete it!',items:[{q:'IF Sparky sees a red traffic light... THEN...',o:['Drive as fast as possible!','STOP and wait patiently for green!','Spin around in circles!'],a:1},{q:'IF it suddenly starts raining really hard... THEN...',o:['Take off your rain jacket!','Open your umbrella to stay dry!','Go swimming in the rain!'],a:1},{q:'IF Sparky\'s battery is almost empty... THEN...',o:['Run even faster to finish tasks!','Just pretend nothing is wrong!','Find a charger and plug in right away!'],a:2}]},
  quiz:[
   {q:'What is an IF-THEN statement in coding?',o:['A special type of shampoo for robots','A decision: IF something is true THEN do a specific thing','The exact same thing as a loop'],a:1},
   {q:'What does the ELSE part of an IF-THEN do?',o:['It ends and deletes all the code','It says what to do when the IF part is NOT true — the backup plan!','It creates a brand new variable'],a:1},
