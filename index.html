   slides:[{title:'What is an Observable?',text:'An Observable is a stream of values over time. Like an array in time. An HTTP call is an Observable that emits one value and completes. A WebSocket is an Observable that emits many values. You subscribe() to receive them!',e:'🌊'},{title:'Operators!',text:'RxJS operators transform streams! map() transforms each value. filter() only passes values that match. switchMap() switches to a new observable. debounceTime() waits for a pause before emitting — perfect for search!',e:'🔧'},{title:'The Async Pipe!',text:'In Angular templates use the async pipe: {{ user$ | async }}. It subscribes automatically and unsubscribes when the component is destroyed. No manual subscription management — prevents the most common memory leak in Angular!',e:'🪝'}],
   game:{type:'pick',title:'RxJS Concepts!',inst:'Test your Observable knowledge!',items:[{q:'What is an Observable?',o:['A visible UI element','A stream of values over time that you subscribe to','A type of component'],a:1},{q:'What does debounceTime(300) do?',o:['Delays everything by 300ms','Waits 300ms after the last emission before proceeding','Limits to 300 values'],a:1},{q:'What does the Angular async pipe do?',o:['Makes code async','Auto-subscribes and auto-unsubscribes from an Observable in templates','Formats dates'],a:1}]},
   quiz:[{q:'How do you receive values from an Observable?',o:['observe()','await it','subscribe()'],a:2},{q:'Which RxJS operator transforms each value?',o:['filter()','map()','merge()'],a:1},{q:'Why use the async pipe instead of manual subscribe?',o:['Performance','It prevents memory leaks by auto-unsubscribing','It is required'],a:1}]},
  {id:108,title:'Enterprise Patterns',intro:'Enterprise development means building software that works reliably for thousands of users, maintained by large teams, for years. That requires architecture patterns, testing discipline, and documentation standards that go beyond just making things work!',
   slides:[{title:'Module Architecture!',text:'Feature modules group related components, services and routes. Shared module contains reusable components. Core module contains app-wide singleton services. This structure scales to 100+ component apps without chaos!',e:'🏢'},{title:'Testing in Angular!',text:'Unit tests with Jasmine and Karma test components in isolation. E2E tests with Cypress test the full user journey. Aim for 80%+ code coverage on services. Angular CLI generates test files automatically with every component!',e:'🧪'},{title:'Documentation!',text:'Compodoc generates beautiful API documentation from your TypeScript comments. JsDoc comments describe every public method. README explains setup, architecture decisions, and deployment. Code without documentation is a liability!',e:'📚'}],
   game:{type:'build',title:'Enterprise App Design!',inst:'Make architectural decisions for an enterprise HR management system!',cols:[{l:'MODULE STRUCTURE 🏗️',items:['Core + Shared + Feature modules pattern','Single app module (not scalable)','Micro-frontends (max flexibility)','Component-first (no modules)']},{l:'TESTING STRATEGY 🧪',items:['Unit tests for services + E2E for critical flows','Only E2E tests','No tests (ship fast)','Only unit tests for components']},{l:'DOCUMENTATION 📚',items:['Compodoc + JSDoc + Architecture ADRs','README only','Comments in code only','No documentation']}]},
   quiz:[{q:'What is a Feature Module in Angular?',o:['A paid extension','A group of related components services and routes','A testing tool'],a:1},{q:'What tool generates Angular documentation?',o:['TypeDoc','JSDoc','Compodoc'],a:2},{q:'What code coverage percentage is a common enterprise target?',o:['10%','50%','80%+'],a:2}]}
]},
{id:28,title:'Python Data Science',sub:'Analyze data and find insights!',emoji:'📊',color:'#FF9500',grad:'linear-gradient(135deg,#FF9500,#CC5500)',shadow:'rgba(255,149,0,.5)',badgeName:'Data Scientist Badge',tier:4,
 lessons:[
  {id:109,title:'NumPy & Arrays',intro:'NumPy is the backbone of ALL Python data science! Every data science library — Pandas, Scikit-learn, TensorFlow — is built on NumPy. It provides fast multi-dimensional arrays and mathematical operations that are 100x faster than Python lists!',
   slides:[{title:'NumPy Arrays!',text:'import numpy as np. arr = np.array([1,2,3,4,5]) creates an array. arr * 2 multiplies every element by 2 — no loop needed! np.zeros(5) creates [0,0,0,0,0]. np.arange(0,10,2) creates [0,2,4,6,8]!',e:'📐'},{title:'Array Operations!',text:'NumPy operations work on every element at once — called vectorisation. arr.mean() calculates average. arr.max() finds maximum. arr.std() finds standard deviation. arr.reshape(2,3) reshapes a 6-element array into 2 rows × 3 cols!',e:'⚡'},{title:'Why NumPy is Fast!',text:'Python lists store Python objects with overhead. NumPy arrays store raw C numbers in contiguous memory. Adding 1 million numbers: Python loop takes seconds. NumPy takes milliseconds. This speed difference enables data science!',e:'🚀'}],
   game:{type:'pycode',title:'NumPy Operations!',inst:'Run this code to see NumPy-style array operations in Python!',starter:'# NumPy-style array operations using Python lists\n# (Skulpt does not support NumPy, so we simulate it!)\n\nimport math\n\ndef array_ops(data):\n    n = len(data)\n    mean = sum(data) / n\n    variance = sum((x - mean) ** 2 for x in data) / n\n    std = math.sqrt(variance)\n    return {"mean": round(mean, 2), "std": round(std, 2),\n            "min": min(data), "max": max(data), "sum": sum(data)}\n\nscores = [85, 92, 78, 95, 88, 73, 96, 81, 90, 84]\nprint("=== Data Analysis ===")\nprint("Data:", scores)\n\nstats = array_ops(scores)\nfor key, val in stats.items():\n    print(f"{key:8}: {val}")\n\n# Vectorised operations (element-wise)\nscaled = [round(x * 1.1, 1) for x in scores]  # +10% bonus\nprint("\\nWith 10% bonus:", scaled)\nprint("New average:", round(sum(scaled)/len(scaled), 2))',hint:'Try adding or changing scores! See how the statistics update automatically.',check:'contains',expected:'Data Analysis'},
   quiz:[{q:'Why is NumPy faster than Python lists for math?',o:['NumPy uses more RAM','NumPy stores raw C numbers in contiguous memory','NumPy uses GPU'],a:1},{q:'What does vectorisation mean in NumPy?',o:['Making code into vectors','Operations apply to all elements at once without loops','A type of plot'],a:1},{q:'What does arr.reshape(2,3) do?',o:['Creates 2 arrays of 3 elements','Rearranges a 6-element array into 2 rows and 3 columns','Deletes elements'],a:1}]},
  {id:110,title:'Pandas & DataFrames',intro:'Pandas is THE Python data analysis library! DataFrames are like Excel spreadsheets but with the full power of Python. Every data scientist uses Pandas daily. It is the most downloaded Python library after NumPy and is installed on virtually every data science machine on Earth!',
   slides:[{title:'DataFrames!',text:'A DataFrame is a 2D table with labelled rows and columns. df = pd.DataFrame(data) creates one from a dictionary. df["name"] accesses a column. df.head(5) shows first 5 rows. df.info() shows column types. df.describe() shows statistics!',e:'📋'},{title:'Filtering & Selecting!',text:'df[df["age"] > 18] filters rows where age is over 18. df[["name","email"]] selects specific columns. df.loc[0] gets row by label. df.iloc[0] gets row by position. Chaining: df[df["score"]>80]["name"] gets names of high scorers!',e:'🔍'},{title:'GroupBy & Aggregation!',text:'df.groupby("department")["salary"].mean() calculates average salary per department. groupby + agg is how you build summary tables. This single pattern answers 80% of business analysis questions!',e:'📊'}],
   game:{type:'pycode',title:'DataFrame Analysis!',inst:'Run this Pandas-style data analysis using Python dictionaries!',starter:'# Simulating Pandas DataFrame operations with Python\n# Real Pandas syntax is nearly identical!\n\nstudents = [\n    {"name": "Alice", "grade": 10, "math": 92, "science": 88, "english": 95},\n    {"name": "Bob",   "grade": 10, "math": 78, "science": 85, "english": 72},\n    {"name": "Carol", "grade": 11, "math": 95, "science": 91, "english": 89},\n    {"name": "David", "grade": 11, "math": 68, "science": 74, "english": 81},\n    {"name": "Emma",  "grade": 10, "math": 88, "science": 92, "english": 94},\n]\n\ndef describe(data, col):\n    vals = [r[col] for r in data]\n    return {"mean": round(sum(vals)/len(vals),1), "max": max(vals), "min": min(vals)}\n\n# df.describe() equivalent\nprint("=== Score Statistics ===")\nfor col in ["math", "science", "english"]:\n    s = describe(data=students, col=col)\n    print(f"{col:8}: mean={s[\'mean\']} max={s[\'max\']} min={s[\'min\']}")\n\n# df[df["math"] > 85] equivalent\nprint("\\n=== High Math Scorers (>85) ===")\nhigh = [s for s in students if s["math"] > 85]\nfor s in high:\n    print(f"  {s[\'name\']}: {s[\'math\']}")\n\n# groupby equivalent\nprint("\\n=== Average by Grade ===")\nfor grade in [10, 11]:\n    grp = [s for s in students if s["grade"] == grade]\n    avg = sum(s["math"] for s in grp) / len(grp)\n    print(f"  Grade {grade}: avg math = {avg:.1f}")',hint:'Try changing the scores or adding a new student!',check:'contains',expected:'Score Statistics'},
   quiz:[{q:'What is a Pandas DataFrame?',o:['A Python dictionary','A 2D table with labelled rows and columns','A type of plot'],a:1},{q:'What does df.groupby("dept")["salary"].mean() calculate?',o:['The overall mean salary','Average salary grouped by department','The maximum salary'],a:1},{q:'How do you filter rows where age > 18 in Pandas?',o:['df.filter(age > 18)','df[df["age"] > 18]','df.where("age", 18)'],a:1}]},
  {id:111,title:'Data Visualization',intro:'A chart communicates what a thousand rows of numbers cannot! Matplotlib and Seaborn are Python\'s visualization powerhouses. From simple line charts to heatmaps, scatter plots and subplots — data visualization turns raw data into insights people can actually understand and act on!',
   slides:[{title:'Matplotlib!',text:'import matplotlib.pyplot as plt. plt.plot(x, y) draws a line chart. plt.bar(categories, values) draws a bar chart. plt.scatter(x, y) draws a scatter plot. plt.title() plt.xlabel() plt.ylabel() label the chart. plt.show() displays it!',e:'📈'},{title:'Choosing the Right Chart!',text:'Line chart: trends over time. Bar chart: comparing categories. Scatter plot: relationships between two variables. Histogram: distribution of values. Pie chart: composition (use sparingly — bar charts are usually clearer)!',e:'🎨'},{title:'Seaborn!',text:'Seaborn builds on Matplotlib with a higher-level API. seaborn.heatmap() for correlation matrices. seaborn.boxplot() for distributions. seaborn.pairplot() plots all variable pairs. Seaborn defaults look beautiful with almost no code!',e:'🌊'}],
   game:{type:'pycode',title:'Data Visualization Logic!',inst:'Run this code to analyze and present data like a data scientist!',starter:'# Data visualization with text output\n# Real code would use matplotlib.pyplot.plot() etc!\n\ndef bar_chart(data, title):\n    print(f"\\n=== {title} ===")\n    max_val = max(data.values())\n    for label, val in data.items():\n        bar = "█" * int((val / max_val) * 30)\n        print(f"{label:10} {bar} {val}")\n\ndef histogram(values, title):\n    print(f"\\n=== {title} ===")\n    buckets = {"<70": 0, "70-79": 0, "80-89": 0, "90-100": 0}\n    for v in values:\n        if v < 70: buckets["<70"] += 1\n        elif v < 80: buckets["70-79"] += 1\n        elif v < 90: buckets["80-89"] += 1\n        else: buckets["90-100"] += 1\n    max_b = max(buckets.values()) or 1\n    for bucket, count in buckets.items():\n        bar = "█" * int((count / max_b) * 20)\n        print(f"{bucket:8} {bar} ({count} students)")\n\nmonthly = {"Jan":120,"Feb":145,"Mar":189,"Apr":210,"May":267,"Jun":301}\nscores = [72,85,91,88,76,94,83,79,92,87,68,95,81,77,90]\n\nbar_chart(monthly, "Monthly Users")\nhistogram(scores, "Score Distribution")',hint:'Try modifying the monthly data or adding more scores to the histogram!',check:'contains',expected:'Monthly Users'},
   quiz:[{q:'When should you use a line chart?',o:['Comparing categories','Showing a distribution','Showing trends over time'],a:2},{q:'What does Seaborn add over Matplotlib?',o:['More speed','Higher-level API with beautiful default styles','3D charts'],a:1},{q:'What does a scatter plot show?',o:['Trends over time','Relationships between two numerical variables','Composition/percentages'],a:1}]},
  {id:112,title:'Data Science Project',intro:'Time to think like a data scientist! The Data Science workflow is: Define the question, Collect data, Clean data, Analyse data, Visualize insights, Present conclusions, Take action. This process is used at Google, Amazon, hospitals, and governments worldwide!',
   slides:[{title:'The Data Science Workflow!',text:'Business question → Data collection → Data cleaning → Exploratory analysis → Feature engineering → Modelling → Evaluation → Deployment → Monitoring. Each step matters. Clean data produces reliable insights. Dirty data produces dangerous conclusions!',e:'🔄'},{title:'Data Cleaning!',text:'Real data is messy! Missing values (fill with mean or drop). Duplicates (drop them). Outliers (investigate before removing). Inconsistent formats ("Male"/"male"/"M" all mean the same). 80% of data science time is cleaning!',e:'🧹'},{title:'Telling the Story!',text:'Data without story is noise. Identify your key insight. Design charts that support it. Write a headline finding. Explain what action to take. The best data scientists are also the best communicators!',e:'📖'}],
   game:{type:'build',title:'Design a Data Science Project!',inst:'Plan a complete data science project!',cols:[{l:'BUSINESS QUESTION ❓',items:['Which students need extra support? 🎓','Which products drive most revenue? 💰','What causes customer churn? 📉','Which neighbourhoods need more resources? 🏘️']},{l:'DATA SOURCE 📦',items:['School grade records + attendance 📋','E-commerce transaction logs 🛍️','CRM data + survey responses 📊','Census + service usage data 🗺️']},{l:'KEY INSIGHT FORMAT 📈',items:['Dashboard with 3 key metrics','Single clear finding with chart','Predictive model + accuracy score','Recommendation report with actions']}]},
   quiz:[{q:'What percentage of data science time is typically spent cleaning data?',o:['10%','80%','50%'],a:1},{q:'What is the first step of the data science workflow?',o:['Collect data','Build a model','Define the business question'],a:2},{q:'What makes a good data science presentation?',o:['As many charts as possible','A clear story with actionable insight','Only tables of numbers'],a:1}]}
]},
{id:29,title:'Machine Learning Basics',sub:'Train AI to solve problems!',emoji:'🧠',color:'#CC00FF',grad:'linear-gradient(135deg,#CC00FF,#6600AA)',shadow:'rgba(204,0,255,.5)',badgeName:'ML Pioneer Badge',tier:4,
 lessons:[
  {id:113,title:'What is Machine Learning?',intro:'Machine Learning is AI that LEARNS from data without being explicitly programmed! Instead of writing rules (if email contains "free money" then spam) you show it thousands of spam emails and let it learn the rules itself. This one shift has transformed the entire tech industry!',
   slides:[{title:'ML vs Traditional Programming!',text:'Traditional: you write rules → computer follows them. ML: you show examples → computer learns the rules. Traditional is precise and explainable. ML handles complex patterns humans cannot articulate. Both are valuable tools!',e:'⚔️'},{title:'Types of ML!',text:'Supervised learning: learn from labelled examples (email → spam/not spam). Unsupervised learning: find patterns with no labels (customer segmentation). Reinforcement learning: learn by reward and punishment (game AI). Most business ML is supervised!',e:'🗂️'},{title:'The ML Pipeline!',text:'Collect data → Clean data → Split into train/test sets → Choose model → Train on training data → Evaluate on test data → Tune hyperparameters → Deploy. Never test on training data — it is cheating and gives false confidence!',e:'🔄'}],
   game:{type:'pick',title:'ML Concepts Quiz!',inst:'Test your Machine Learning knowledge!',items:[{q:'What is supervised learning?',o:['Learning without any data','Learning from labelled examples','Learning by trial and error'],a:1},{q:'Why do you split data into train and test sets?',o:['To have more data','To evaluate model on unseen data — testing on training data is cheating','To speed up training'],a:1},{q:'What is reinforcement learning?',o:['Learning from labels','Learning from patterns','Learning from reward and punishment signals'],a:2}]},
   quiz:[{q:'How is ML different from traditional programming?',o:['ML is always faster','ML learns rules from examples rather than following hand-written rules','ML only works for images'],a:1},{q:'What are the three main types of ML?',o:['Fast medium slow','Supervised unsupervised reinforcement','Classification regression clustering'],a:1},{q:'What is a test set used for?',o:['Training the model','Evaluating model performance on data it has never seen','Cleaning the data'],a:1}]},
  {id:114,title:'Training a Model',intro:'Training a model is showing it examples until it learns patterns! The model adjusts its internal parameters thousands of times to minimise its errors. This process called gradient descent is the same whether you are training a spam filter or a large language model!',
   slides:[{title:'Features & Labels!',text:'Features are the INPUT data — for house prices: square footage, bedrooms, location. Labels are the OUTPUT you want to predict — the house price. The model learns the relationship between features and labels from many examples!',e:'📋'},{title:'Training & Loss!',text:'The model makes a prediction. We compare it to the true label and calculate the error (called loss). The model adjusts its weights to reduce loss. Repeat millions of times. This is gradient descent — the engine of all modern ML!',e:'📉'},{title:'Overfitting & Underfitting!',text:'Overfitting: model memorises training data but fails on new data. Underfitting: model is too simple to capture the pattern. Sweet spot: generalises well to new data. More training data and regularisation help prevent overfitting!',e:'⚖️'}],
   game:{type:'pycode',title:'Train a Simple Model!',inst:'Run this code to train a simple linear regression model from scratch!',starter:'# Training a Linear Regression Model from scratch!\n# Real sklearn code is almost identical!\n\ndef train_linear_regression(X, y, lr=0.01, epochs=100):\n    """Gradient descent for y = m*x + b"""\n    m, b = 0, 0\n    n = len(X)\n    \n    for epoch in range(epochs):\n        # Predictions\n        predictions = [m * x + b for x in X]\n        # Errors\n        errors = [pred - actual for pred, actual in zip(predictions, y)]\n        # Loss (MSE)\n        loss = sum(e**2 for e in errors) / n\n        # Gradient descent\n        dm = (2/n) * sum(errors[i] * X[i] for i in range(n))\n        db = (2/n) * sum(errors)\n        m -= lr * dm\n        b -= lr * db\n        \n        if epoch % 20 == 0:\n            print(f"Epoch {epoch:3d}: loss={loss:.4f}, m={m:.4f}, b={b:.4f}")\n    \n    return m, b\n\n# House sizes (hundreds sq ft) → prices (thousands)\nhouse_sizes = [10,15,20,25,30,35,40]\nhouse_prices = [150,200,250,300,360,400,450]\n\nprint("=== Training Linear Regression ===")\nm, b = train_linear_regression(house_sizes, house_prices, lr=0.001, epochs=80)\nprint(f"\\nModel: price = {m:.1f} * size + {b:.1f}")\npred = m * 28 + b\nprint(f"Predicted price for 2800 sq ft: ${pred:.0f}k")',hint:'Try changing the learning rate or epochs and see how it affects training!',check:'contains',expected:'Training Linear Regression'},
   quiz:[{q:'What are features in ML?',o:['The output labels','The input data used to make predictions','The model weights'],a:1},{q:'What is gradient descent?',o:['A type of chart','The algorithm that adjusts model weights to reduce error','A data cleaning step'],a:1},{q:'What is overfitting?',o:['Model too simple for the data','Model memorises training data but fails on new data','Model trains too slowly'],a:1}]},
  {id:115,title:'Classification & Regression',intro:'Classification predicts a CATEGORY (spam or not spam, cat or dog). Regression predicts a NUMBER (house price, tomorrow\'s temperature). These two task types cover the vast majority of real-world supervised machine learning applications in industry!',
   slides:[{title:'Classification!',text:'Output is a category. Logistic regression for binary (yes/no). Random Forest and SVM for multi-class. Examples: email spam detection, disease diagnosis, image recognition, sentiment analysis. Evaluate with accuracy, precision, recall!',e:'🏷️'},{title:'Regression!',text:'Output is a continuous number. Linear regression is the simplest. Decision tree regression, Random Forest regression, Neural networks for complex patterns. Examples: house prices, stock forecasting, temperature prediction!',e:'📈'},{title:'Evaluation Metrics!',text:'Classification: accuracy (% correct), precision (of predicted positives how many are real?), recall (of real positives how many did we find?). Regression: MAE (mean absolute error), RMSE (root mean squared error), R² score!',e:'📊'}],
   game:{type:'pycode',title:'Classification Logic!',inst:'Run this spam classifier simulation using rule-based and then score-based classification!',starter:'# Spam Classifier - building intuition for ML classification\n\ndef extract_features(email):\n    """Extract numerical features from an email"""\n    text = email.lower()\n    return {\n        "has_free": int("free" in text),\n        "has_money": int("money" in text or "$" in text),\n        "exclamations": text.count("!"),\n        "length": len(text),\n        "has_urgent": int("urgent" in text or "act now" in text),\n    }\n\ndef classify(features, threshold=2):\n    """Simple score-based classifier"""\n    score = (features["has_free"] * 2 + \n             features["has_money"] * 3 +\n             features["exclamations"] +\n             features["has_urgent"] * 2)\n    return "SPAM" if score >= threshold else "NOT SPAM"\n\nemails = [\n    "Hi, your order has shipped. Track it here.",\n    "FREE MONEY!!! Click NOW to claim your $1000 prize!!!",\n    "Meeting tomorrow at 3pm. Please confirm.",\n    "URGENT: Free gift waiting! Act now! Limited time offer $$$",\n]\n\nprint("=== Email Classifier ===")\nfor email in emails:\n    feat = extract_features(email)\n    result = classify(feat)\n    print(f"{result}: {email[:45]}...")',hint:'Try adding your own email to the list and see how it gets classified!',check:'contains',expected:'Email Classifier'},
   quiz:[{q:'What type of ML problem is predicting house prices?',o:['Classification','Reinforcement learning','Regression'],a:2},{q:'What does accuracy measure?',o:['How fast the model trains','The percentage of predictions that are correct','Model size'],a:1},{q:'What does recall measure?',o:['How fast the model recalls data','Of all actual positives how many did we correctly identify?','The percentage of correct predictions'],a:1}]},
  {id:116,title:'Neural Networks',intro:'Neural networks are loosely inspired by the brain and power everything from image recognition to ChatGPT! A neural network is layers of interconnected nodes that learn complex patterns. Deep learning means many layers. Understanding the concept puts modern AI in perspective!',
   slides:[{title:'Layers & Neurons!',text:'An input layer receives features. Hidden layers find patterns. An output layer gives predictions. Each connection has a weight. Training adjusts these weights. A network with many hidden layers is deep — hence deep learning!',e:'🧠'},{title:'Activation Functions!',text:'After each neuron a non-linear activation function decides how much signal passes. ReLU (max(0,x)) is most common. Sigmoid squashes to 0-1 (for binary output). Softmax turns outputs into probabilities for multi-class classification!',e:'⚡'},{title:'Training Deep Networks!',text:'Backpropagation calculates how much each weight contributed to the error. Gradient descent updates weights. This happens for millions of examples thousands of times. GPUs run these calculations in parallel — essential for large models!',e:'🔄'}],
   game:{type:'pick',title:'Neural Network Quiz!',inst:'Test your neural network knowledge!',items:[{q:'What is a hidden layer in a neural network?',o:['A layer that is invisible in the UI','Intermediate layers between input and output that find patterns','The first input layer'],a:1},{q:'What does ReLU activation do?',o:['Returns the negative of input','Returns max(0, x) — passes positive values zeros out negative','Returns 1 or 0 only'],a:1},{q:'What is backpropagation?',o:['Running the network backwards','Calculating how much each weight contributed to the error','A type of activation function'],a:1}]},
   quiz:[{q:'What makes a neural network "deep"?',o:['It processes very large data','It has many hidden layers','It is trained for a long time'],a:1},{q:'Why are GPUs used for neural network training?',o:['GPUs have more RAM','GPUs run many parallel calculations simultaneously','GPUs are cheaper'],a:1},{q:'What does the output layer of a classifier do?',o:['Stores all data','Gives the final prediction or probability','Receives the input features'],a:1}]}
]},
{id:30,title:'AI with Python',sub:'Build production AI features!',emoji:'🤖',color:'#00D4FF',grad:'linear-gradient(135deg,#00D4FF,#0033AA)',shadow:'rgba(0,212,255,.5)',badgeName:'AI Engineer Badge',tier:4,
 lessons:[
  {id:117,title:'LLM APIs in Depth',intro:'You have used Claude in every lesson. Now you build WITH it! The Claude API, OpenAI API, and Gemini API share very similar interfaces. Master one and you master them all. Today you understand every parameter, token economics, and advanced patterns!',
   slides:[{title:'Token Economics!',text:'LLMs process text as tokens — roughly 4 characters each. Input tokens cost less than output tokens. A 1000-word document is about 750 tokens. gpt-4o costs ~$2.50 per million input tokens. Design prompts efficiently — verbose prompts waste money!',e:'💰'},{title:'Advanced Parameters!',text:'temperature (0-2): creativity vs precision. top_p: nucleus sampling — alternative to temperature. frequency_penalty: reduces repetition. presence_penalty: encourages new topics. max_tokens: limits output. stop sequences: end generation on specific text!',e:'🎛️'},{title:'Conversation History!',text:'Every message sent to the API must include the full conversation history. Token count grows with each turn. Use sliding window to drop old messages. Summarise long conversations before context limit is hit. Design for long conversations from day one!',e:'💬'}],
   game:{type:'jscode',title:'Token & Cost Calculator!',inst:'Run this tool to understand LLM token costs!',starter:'// LLM Token Economics Calculator\n// Understanding the economics of AI APIs\n\nconst tokenize = (text) => Math.ceil(text.length / 4);\n\nconst models = {\n  "claude-sonnet": { input: 3, output: 15 },   // $ per million tokens\n  "gpt-4o":        { input: 2.5, output: 10 },\n  "gpt-4o-mini":   { input: 0.15, output: 0.6 },\n  "gemini-1.5-pro":{ input: 1.25, output: 5 },\n};\n\nconst calcCost = (inputText, outputText, model) => {\n  const rates = models[model];\n  const inputTokens = tokenize(inputText);\n  const outputTokens = tokenize(outputText);\n  const cost = (inputTokens / 1_000_000) * rates.input +\n               (outputTokens / 1_000_000) * rates.output;\n  return { inputTokens, outputTokens, cost };\n};\n\nconst systemPrompt = "You are a helpful coding tutor. Keep responses concise.";\nconst userMsg = "Explain what a React component is in 2 sentences.";\nconst assistantResponse = "A React component is a JavaScript function that returns JSX — HTML-like syntax that describes what should render on screen. Components are reusable, composable building blocks you use to construct any UI.";\n\nconsole.log("=== LLM API Cost Comparison ===");\nfor (const [model, _] of Object.entries(models)) {\n  const {inputTokens, outputTokens, cost} = calcCost(\n    systemPrompt + userMsg, assistantResponse, model\n  );\n  console.log(`${model}:`);\n  console.log(`  Input: ${inputTokens} tokens, Output: ${outputTokens} tokens`);\n  console.log(`  Cost: $${(cost * 1000).toFixed(6)} per 1000 calls`);\n}',hint:'Try changing the system prompt or user message to see how length affects cost!',check:'contains',expected:'Cost Comparison'},
   quiz:[{q:'Roughly how many characters make one LLM token?',o:['1 character','4 characters','10 characters'],a:1},{q:'What happens to token count in a long conversation?',o:['It resets each turn','It grows — the full history is sent every turn','It stays constant'],a:1},{q:'What does temperature=0 produce?',o:['Random creative output','No output','Focused deterministic output'],a:2}]},
  {id:118,title:'RAG Systems',intro:'RAG — Retrieval-Augmented Generation — is the most impactful AI architecture in enterprise right now! Instead of relying on the LLM\'s training data, RAG retrieves relevant documents from YOUR database and includes them in the prompt. This enables AI over YOUR private data!',
   slides:[{title:'The RAG Pipeline!',text:'User asks a question → System converts it to a vector embedding → Vector database finds similar document chunks → Chunks inserted into prompt → LLM generates answer grounded in YOUR documents. Used in every enterprise AI assistant!',e:'🔍'},{title:'Vector Embeddings!',text:'An embedding converts text to a numerical vector of 1000+ dimensions. Similar text has similar vectors. text-embedding-ada-002 from OpenAI or voyage-2 from Anthropic convert text to vectors. Store these in a vector database like Pinecone or Supabase pgvector!',e:'🎯'},{title:'Chunking Strategy!',text:'Split documents into chunks of 500-1000 tokens. Add overlap (last 100 tokens from previous chunk) to preserve context. Chunk size is critical — too small loses context, too large dilutes relevance. Experiment with your specific data!',e:'✂️'}],
   game:{type:'jscode',title:'RAG Pipeline Simulation!',inst:'Run this code to simulate a complete RAG pipeline!',starter:'// RAG Pipeline Simulation\n\n// 1. Knowledge Base (would be a vector DB in production)\nconst documents = [\n  { id: 1, content: "React components are functions that return JSX.", topic: "react" },\n  { id: 2, content: "useState is a React Hook for managing component state.", topic: "react" },\n  { id: 3, content: "Python lists use zero-based indexing.", topic: "python" },\n  { id: 4, content: "SQL SELECT * FROM table fetches all rows.", topic: "sql" },\n  { id: 5, content: "Git commit saves a snapshot of your changes.", topic: "git" },\n  { id: 6, content: "useEffect runs side effects in React components.", topic: "react" },\n];\n\n// 2. Simple keyword retriever (would be vector similarity in production)\nconst retrieve = (query, docs, topK = 2) => {\n  const words = query.toLowerCase().split(" ");\n  const scored = docs.map(doc => ({\n    ...doc,\n    score: words.filter(w => doc.content.toLowerCase().includes(w)).length\n  }));\n  return scored.sort((a,b) => b.score - a.score).slice(0, topK);\n};\n\n// 3. Build augmented prompt\nconst buildPrompt = (query, retrieved) => {\n  const context = retrieved.map(d => `- ${d.content}`).join("\\n");\n  return `Context:\\n${context}\\n\\nQuestion: ${query}\\nAnswer:`;\n};\n\n// 4. Simulate the full RAG pipeline\nconst queries = ["How does React state work?", "How do I save code changes?"];\n\nconsole.log("=== RAG Pipeline Demo ===\\n");\nfor (const query of queries) {\n  const retrieved = retrieve(query, documents);\n  const prompt = buildPrompt(query, retrieved);\n  console.log(`Query: "${query}"`);\n  console.log(`Retrieved ${retrieved.length} docs (scores: ${retrieved.map(d=>d.score).join(", ")})`);\n  console.log("Prompt sent to LLM:");\n  console.log(prompt);\n  console.log("---");\n}',hint:'Try adding new documents to the knowledge base and test with different queries!',check:'contains',expected:'RAG Pipeline Demo'},
   quiz:[{q:'What problem does RAG solve?',o:['Makes LLMs faster','Lets LLMs answer questions about YOUR private data','Reduces token costs'],a:1},{q:'What is a vector embedding?',o:['A compressed image','A numerical representation of text that captures meaning','A type of database'],a:1},{q:'Why do you chunk documents for RAG?',o:['Smaller files are easier to store','To fit relevant pieces into the limited context window','Chunks are required by vector databases'],a:1}]},
  {id:119,title:'AI Agents',intro:'AI Agents are LLMs that can TAKE ACTIONS — search the web, run code, call APIs, read files. They reason about what to do next and loop until the task is complete. Agents are the fastest-growing area of AI engineering and where most new AI products are being built!',
   slides:[{title:'What is an AI Agent?',text:'An agent uses an LLM as its "brain" and has access to tools — functions it can call. It reasons: to answer this question I need to search the web, then read the result, then calculate something. It decides the sequence of actions!',e:'🤖'},{title:'ReAct Pattern!',text:'ReAct = Reason + Act. The agent reasons: "I need the weather in Calgary." Then acts: call weather_tool("Calgary"). Sees result. Reasons again. Acts again. This thought-action loop continues until the task is complete!',e:'🔄'},{title:'Tool Calling!',text:'Modern LLM APIs support tool calling natively! Define your tools as functions with descriptions. The LLM decides which to call. Your code executes the tool and returns the result. The LLM uses the result to continue reasoning!',e:'🔧'}],
   game:{type:'jscode',title:'Agent Reasoning Simulation!',inst:'Run this AI agent simulation to see the ReAct pattern in action!',starter:'// AI Agent Simulation using ReAct pattern\n\n// Available tools\nconst tools = {\n  search: (query) => `Search results for "${query}": Calgary population is 1.3M, founded 1875, in Alberta Canada.`,\n  calculate: (expr) => `Calculation result: ${eval(expr.replace(/[^0-9+\\-*/().]/g,""))}`,\n  weather: (city) => `Weather in ${city}: 18°C, Sunny, Wind 15km/h from the west.`,\n  time: () => `Current time: ${new Date().toLocaleTimeString()}`,\n};\n\n// Simulate agent reasoning and action\nconst agentRun = (task) => {\n  console.log(`\\n🤖 AGENT TASK: ${task}`);\n  console.log("=".repeat(50));\n  \n  // Simulated ReAct loop steps\n  const steps = [\n    { thought: "I need to find information about Calgary first.", action: "search", input: "Calgary Alberta" },\n    { thought: "Now I need current weather there.", action: "weather", input: "Calgary" },\n    { thought: "I have enough information to answer.", action: null, input: null },\n  ];\n  \n  for (let i = 0; i < steps.length; i++) {\n    const step = steps[i];\n    console.log(`\\nStep ${i+1}: 💭 ${step.thought}`);\n    if (step.action) {\n      console.log(`  ⚡ Action: ${step.action}("${step.input}")`);\n      const result = tools[step.action](step.input);\n      console.log(`  📦 Result: ${result}`);\n    } else {\n      console.log("  ✅ Task complete — generating final answer!");\n    }\n  }\n};\n\nagentRun("Tell me about Calgary and its current weather");',hint:'Try changing the task description or adding a new tool to the tools object!',check:'contains',expected:'AGENT TASK'},
   quiz:[{q:'What is an AI agent?',o:['An LLM that only answers questions','An LLM that can take actions using tools to complete tasks','A type of chatbot'],a:1},{q:'What does the ReAct pattern stand for?',o:['React.js framework','Read and Create','Reason and Act in a loop'],a:2},{q:'How does tool calling work?',o:['You call the tool then ask the LLM','LLM decides which tool to call your code runs it result goes back to LLM','Tools call the LLM automatically'],a:1}]},
  {id:120,title:'Production AI Systems',intro:'Shipping AI to real users is very different from a demo! Rate limiting, cost monitoring, safety filtering, fallback handling, latency optimization, evaluation frameworks — production AI engineering is a whole discipline. Today you design a production-grade AI system!',
   slides:[{title:'Rate Limiting & Cost!',text:'Set per-user rate limits to prevent abuse and runaway costs. Track token usage per user per day. Set hard monthly budget caps with alerts. Cache common responses — if 100 users ask the same question serve from cache!',e:'💰'},{title:'Safety & Filtering!',text:'Input filtering: detect and block toxic content before sending to LLM. Output filtering: check responses before showing to users. System prompt injection attempts must be detected. Log all interactions for review. Always have a human feedback mechanism!',e:'🛡️'},{title:'Evaluation!',text:'Build an eval dataset of 100+ question-answer pairs. Run your prompts against it automatically. Track accuracy over time. When you change the prompt run all evals before deploying. What gets measured gets improved!',e:'📊'}],
   game:{type:'build',title:'Production AI System Design!',inst:'Design a production-grade AI tutoring feature!',cols:[{l:'SAFETY LAYER 🛡️',items:['Input filter + output filter + logging','Rate limit per user per day','Content moderation API (Perspective)','Human review queue for flagged content']},{l:'COST CONTROL 💰',items:['Cache frequent responses (Redis)','Rate limit + budget cap per user','Use smaller model for simple queries','Token budget with user notification']},{l:'EVALUATION 📊',items:['Automated eval suite 200+ cases','A/B test prompts with real users','Human rater panel weekly review','Metric dashboard (accuracy latency cost)']}]},
   quiz:[{q:'Why should you cache AI responses?',o:['Caching is not applicable to AI','To save costs and reduce latency for repeated queries','To improve accuracy'],a:1},{q:'What is an eval dataset?',o:['Training data for the model','A set of test cases to measure AI feature quality','User feedback forms'],a:1},{q:'What should you do before changing a production AI prompt?',o:['Just deploy it','Run it against your eval suite first','Ask the LLM if it is ok'],a:2}]}
]},
{id:31,title:'Backend & Databases',sub:'Build the server behind the app!',emoji:'🖥️',color:'#39FF14',grad:'linear-gradient(135deg,#39FF14,#007730)',shadow:'rgba(57,255,20,.5)',badgeName:'Full Stack Badge',tier:4,
 lessons:[
  {id:121,title:'FastAPI Basics',intro:'FastAPI is the fastest-growing Python web framework! It is used by Microsoft, Netflix, Uber and Explosion AI. It is fast (as fast as Node.js), easy to write, and automatically generates beautiful API documentation. Today you learn to build real backends!',
   slides:[{title:'What is FastAPI?',text:'FastAPI is a Python framework for building REST APIs. from fastapi import FastAPI; app = FastAPI(). Then @app.get("/") async def root(): return {"message":"Hello"} creates an endpoint. That is it — a working API in 3 lines!',e:'⚡'},{title:'Path & Query Parameters!',text:'@app.get("/users/{user_id}") captures {user_id} from the URL. @app.get("/search") with def search(q: str) reads ?q=python from the URL. FastAPI validates types automatically — pass a string where int expected and it returns 422!',e:'🗺️'},{title:'Pydantic Models!',text:'class User(BaseModel): name: str; age: int defines a request/response model. FastAPI uses it to validate request bodies and serialize responses. It also generates the API documentation automatically — zero extra work!',e:'📋'}],
   game:{type:'pycode',title:'FastAPI Pattern!',inst:'Run this code to see FastAPI-style request handling in pure Python!',starter:'# FastAPI-style route handling (simulated)\n# Real FastAPI syntax is nearly identical!\n\nfrom datetime import datetime\n\nclass APIApp:\n    def __init__(self):\n        self.routes = {}\n        self.db = [\n            {"id": 1, "name": "Alice", "score": 950, "level": 12},\n            {"id": 2, "name": "Bob",   "score": 820, "level": 8},\n            {"id": 3, "name": "Carol", "score": 1100,"level": 15},\n        ]\n    \n    def get(self, path):\n        """Decorator: @app.get("/path")"""\n        def decorator(func):\n            self.routes[f"GET {path}"] = func\n            return func\n        return decorator\n    \n    def request(self, method, path, **kwargs):\n        handler = self.routes.get(f"{method} {path}")\n        if handler:\n            return handler(**kwargs)\n        return {"error": "404 Not Found"}\n\napp = APIApp()\n\n@app.get("/users")\ndef get_users():\n    return {"users": app.db, "count": len(app.db)}\n\n@app.get("/users/{user_id}")\ndef get_user(user_id):\n    user = next((u for u in app.db if u["id"] == user_id), None)\n    return user or {"error": "User not found"}\n\n@app.get("/leaderboard")\ndef leaderboard():\n    sorted_users = sorted(app.db, key=lambda u: u["score"], reverse=True)\n    return {"leaderboard": sorted_users}\n\n# Simulate API requests\nprint("GET /users:", app.request("GET", "/users"))\nprint("GET /users/2:", app.request("GET", "/users/{user_id}", user_id=2))\nprint("GET /leaderboard:", app.request("GET", "/leaderboard"))',hint:'Try adding a new route or adding more users to the db list!',check:'contains',expected:'leaderboard'},
   quiz:[{q:'What does @app.get("/users") do in FastAPI?',o:['Imports users from a database','Creates a GET endpoint at the /users URL','Deletes users'],a:1},{q:'What is Pydantic used for in FastAPI?',o:['Database connections','Data validation and serialisation','CSS styling'],a:1},{q:'What does FastAPI generate automatically from your models?',o:['Frontend components','API documentation','Database tables'],a:2}]},
  {id:122,title:'Database Integration',intro:'A backend without a database is just a calculator! Today you connect your FastAPI backend to Supabase (PostgreSQL) — the same database powering STEM Spark Academy. You will write SQL, use the Supabase Python client, and design a proper data layer!',
   slides:[{title:'Supabase with Python!',text:'from supabase import create_client. supabase = create_client(url, key). Then supabase.table("users").select("*").execute() fetches all users. supabase.table("users").insert({"name":"Alex"}).execute() adds one. Incredibly clean API!',e:'🗄️'},{title:'Connection Pooling!',text:'Every database connection takes memory on the server. Connection pooling reuses connections instead of creating new ones per request. Supabase handles this automatically — but for raw PostgreSQL use a pool library like asyncpg or psycopg3!',e:'🔄'},{title:'Migrations!',text:'Database migrations are version-controlled SQL scripts that evolve your schema. create table users... is migration 001. add column bio to users is migration 002. Never edit production database manually — always use migrations for reproducibility!',e:'📋'}],
   game:{type:'pick',title:'Database Backend Quiz!',inst:'Test your backend database knowledge!',items:[{q:'What does connection pooling solve?',o:['Slow queries','Using too much memory by creating too many connections','Data security'],a:1},{q:'What is a database migration?',o:['Moving databases between servers','A versioned SQL script that evolves the database schema','A backup process'],a:1},{q:'supabase.table("users").select("*").execute() does what?',o:['Deletes all users','Updates all users','Fetches all rows from the users table'],a:2}]},
   quiz:[{q:'Why use migrations instead of editing the database manually?',o:['Migrations are required by law','Migrations are versioned and reproducible across all environments','Manual edits are not possible'],a:1},{q:'What is the Supabase Python client used for?',o:['Only for JavaScript','Interacting with your Supabase database from a Python backend','Creating React components'],a:1},{q:'What does connection pooling do?',o:['Encrypts database connections','Reuses connections to avoid creating too many','Speeds up queries'],a:1}]},
  {id:123,title:'Auth & Security',intro:'Security is not optional! Authentication (who are you?), authorization (what can you do?), input validation, SQL injection prevention, HTTPS, secrets management — these are the skills that separate professional developers from beginners. One security mistake can destroy a company!',
   slides:[{title:'JWT Authentication!',text:'JSON Web Tokens (JWT) store user identity. On login server creates a signed JWT containing user_id and expiry. Client stores it and sends it with every request in Authorization: Bearer <token> header. Server verifies the signature!',e:'🔑'},{title:'SQL Injection!',text:'Never concatenate user input into SQL! cursor.execute("SELECT * FROM users WHERE name=" + username) is dangerous. A user entering \' OR 1=1 -- gets ALL users! Use parameterised queries: cursor.execute("...WHERE name=?", (username,)) always!',e:'💉'},{title:'Environment Variables!',text:'Never hardcode secrets! DATABASE_URL = os.environ.get("DATABASE_URL") reads from environment. Use .env files locally (add to .gitignore!) and proper secret managers in production (AWS Secrets Manager, HashiCorp Vault, Doppler). This is non-negotiable!',e:'🔐'}],
   game:{type:'pick',title:'Security Best Practices!',inst:'Choose the secure option every time!',items:[{q:'Where should database credentials be stored?',o:['Directly in your code','In a .env file (locally) and secrets manager (production)','In a comment in the README'],a:1},{q:'Which SQL approach is safe from injection?',o:['String concatenation with user input','Parameterised queries with placeholders','Only reading never writing'],a:1},{q:'What does JWT store?',o:['The user\'s password','User identity and claims with a cryptographic signature','Session data on the server'],a:1}]},
   quiz:[{q:'What is SQL injection?',o:['Injecting SQL performance improvements','An attack where malicious SQL in user input executes on your database','A database indexing technique'],a:1},{q:'What does the Authorization header contain in JWT auth?',o:['Username and password','The Bearer token (JWT)','A session cookie'],a:1},{q:'Why must secrets never be in your code?',o:['They slow down the app','They get committed to Git and exposed publicly','Secrets are optional'],a:1}]},
  {id:124,title:'Deploy a Full Stack App',intro:'DEPLOYMENT — taking your app from your laptop to the world! This is the final skill that completes the full-stack journey. Containerisation with Docker, CI/CD pipelines, environment management, monitoring and scaling. This is DevOps, and every developer needs to understand it!',
   slides:[{title:'Docker!',text:'Docker packages your app and ALL its dependencies into a container. The container runs identically everywhere — your laptop, a server, the cloud. Dockerfile describes the container. docker build creates it. docker run starts it!',e:'🐳'},{title:'CI/CD!',text:'CI (Continuous Integration): every git push automatically runs tests. CD (Continuous Deployment): if tests pass it auto-deploys to production. GitHub Actions, GitLab CI, and CircleCI provide this. Push code → tests run → deployed. Instant and reliable!',e:'🔄'},{title:'Cloud Deployment!',text:'Vercel for React frontends (free tier). Railway or Render for FastAPI backends. Supabase for database. Cloudflare for CDN and DNS. This stack costs $0-$5/month for a side project and scales to thousands of users!',e:'☁️'}],
   game:{type:'seq',title:'Deployment Pipeline!',inst:'Put the deployment steps in the correct professional order!',steps:['Push code to GitHub 📤','GitHub Actions triggers CI pipeline 🔄','Automated tests run ✅','Docker image built 🐳','Image deployed to production server 🚀','Health check confirms app is running 💚','Team notified: deploy successful! 🎉'],correct:[0,1,2,3,4,5,6]},
   quiz:[{q:'What does Docker solve?',o:['It makes code faster','Packages app + dependencies so it runs identically everywhere','It replaces Git'],a:1},{q:'What does CD mean in CI/CD?',o:['Code Deployment','Continuous Deployment — automatic deploy when tests pass','Cloud Distribution'],a:1},{q:'Which platform is recommended for free React deployment?',o:['AWS EC2 (expensive)','Vercel or Netlify (free)','Heroku (discontinued free tier)'],a:1}]}
]},
{id:32,title:'Capstone: Launch Your App',sub:'Ship something real to the world!',emoji:'🚀',color:'#FFE600',grad:'linear-gradient(135deg,#FFE600,#CC8800)',shadow:'rgba(255,230,0,.5)',badgeName:'App Launcher Badge',tier:4,
 lessons:[
  {id:125,title:'Product Planning',intro:'The best apps solve REAL problems for REAL people! Before writing one line of code, professional product teams spend significant time understanding the problem deeply, defining success metrics, and planning the roadmap. Today you become a product thinker!',
   slides:[{title:'Problem Validation!',text:'Before building: interview 10 potential users. Do they actually have this problem? How do they solve it today? Would they pay for your solution? What price? 80% of startups fail because they build something nobody wants!',e:'🎯'},{title:'Success Metrics!',text:'Define what success looks like BEFORE you build. Daily Active Users. User retention (% still using after 30 days). Net Promoter Score (would users recommend you?). Revenue per user. Without metrics you cannot improve what matters!',e:'📊'},{title:'The Roadmap!',text:'List every feature you want. Prioritise ruthlessly using RICE: Reach × Impact × Confidence ÷ Effort. Build the highest-scoring features first. Say no to low-priority features — every feature has a maintenance cost forever!',e:'🗺️'}],
   game:{type:'build',title:'Plan Your Capstone App!',inst:'Make the key product decisions for your launch!',cols:[{l:'PROBLEM TO SOLVE 🎯',items:['Students losing track of homework 📚','Local events nobody knows about 🗺️','Developers forgetting good resources 🔖','Families splitting chores unfairly 🏠']},{l:'TARGET USER 👤',items:['High school students (underserved!)','Adults 25-40 in cities','Professional developers','Parents with young children']},{l:'KEY METRIC 📊',items:['Daily active users + 7-day retention','Listings posted per week','Resources saved per user','Tasks completed per family']}]},
   quiz:[{q:'Why should you interview users before building?',o:['To get free ideas','To validate the problem is real and people actually want a solution','Interviews are optional'],a:1},{q:'What does RICE stand for in product prioritisation?',o:['React Interface Components Elements','Reach Impact Confidence divided by Effort','Review Implement Check Execute'],a:1},{q:'What is a success metric?',o:['A metric that makes you feel good','A measurable indicator that tells you if your app is achieving its goal','The number of features'],a:1}]},
  {id:126,title:'Architecture & Build',intro:'Now you architect and begin building your capstone! A solid technical architecture prevents re-writes later. You will choose your stack, design your database schema, map your API endpoints, and set up your development environment — all before writing a single feature!',
   slides:[{title:'Architecture Decision Record!',text:'Before building write an ADR — a short document recording your tech choices and WHY. Why React not Vue? Why Supabase not MongoDB? Future you (and your teammates) will thank present you for explaining the reasoning behind every architectural decision!',e:'📋'},{title:'Database Schema Design!',text:'Draw every table, every column, every relationship. Define primary keys, foreign keys, indexes. Think about queries: "show me all posts by user X ordered by date" — index on (user_id, created_at). Schema design is much cheaper than schema migration!',e:'🗄️'},{title:'API Contract First!',text:'Define all your API endpoints before implementing them. Method, URL, request body, response shape, auth requirement, status codes. This contract lets frontend and backend be built in parallel. Use OpenAPI (Swagger) to document it formally!',e:'📝'}],
   game:{type:'build',title:'Define Your Architecture!',inst:'Make technical decisions for your capstone app!',cols:[{l:'TECH STACK 🛠️',items:['React + FastAPI + Supabase ⚛️🐍🗄️','Next.js full-stack + Supabase 🚀','React + Express + MongoDB ⚛️📦','Vue.js + Django + PostgreSQL 💚🐍']},{l:'AUTH STRATEGY 🔐',items:['Supabase Auth (easiest)','JWT with FastAPI backend','Magic link (no password)','OAuth only (Google/GitHub)']},{l:'DEPLOYMENT TARGET 🚀',items:['Vercel + Railway + Supabase','Vercel + Supabase (full-stack Next)','Netlify + Render + Supabase','Self-hosted VPS (Digital Ocean)']}]},
   quiz:[{q:'What is an Architecture Decision Record?',o:['A code comment','A document recording tech choices and the reasoning behind them','A test case'],a:1},{q:'Why design your database schema before coding?',o:['Schema design is not important','Schema changes later are expensive and risky','You cannot start coding without a schema'],a:1},{q:'What is API-contract-first development?',o:['Paying for the API first','Defining API endpoints before implementing them so both sides can build in parallel','A security practice'],a:1}]},
  {id:127,title:'Testing & Refinement',intro:'Untested code is broken code you have not found yet! Professional software has a testing pyramid: many unit tests, some integration tests, few E2E tests. Today you design your testing strategy, write tests for critical paths, and learn the discipline of test-driven development!',
   slides:[{title:'The Testing Pyramid!',text:'Many fast unit tests at the base. Some integration tests in the middle (test multiple components together). Few slow E2E tests at the top (test the whole user journey). The pyramid keeps tests fast and maintainable!',e:'🔺'},{title:'What to Test!',text:'Test the critical paths first: user registration, core feature, payment. Test edge cases: empty input, maximum values, concurrent requests. Test security: authenticated endpoints reject unauthenticated requests. Test error handling: what happens when the database is down?',e:'🎯'},{title:'Test-Driven Development!',text:'TDD: write the test FIRST, watch it fail, write the minimum code to make it pass, refactor. Red → Green → Refactor. Counter-intuitive but produces better design, better coverage, and fewer bugs. Many professional teams mandate TDD!',e:'🔴'}],
   game:{type:'pick',title:'Testing Strategy Quiz!',inst:'Make the right testing decision!',items:[{q:'The testing pyramid has most tests at which level?',o:['E2E tests (top)','Unit tests (base)','Integration tests (middle)'],a:1},{q:'In TDD what is the correct order?',o:['Write code then test','Write test → fail → code → pass → refactor','Refactor then test'],a:1},{q:'Which path should you test first?',o:['The least used feature','The most critical user journey (registration, core feature)','Only error cases'],a:1}]},
   quiz:[{q:'What is a unit test?',o:['A test for the entire app','A test for one small isolated piece of code','A manual testing session'],a:1},{q:'What does E2E test mean?',o:['Easy and Efficient testing','End-to-End testing of a complete user journey','External and Embedded testing'],a:1},{q:'What is the main benefit of TDD?',o:['It is faster','Better design fewer bugs and higher confidence','Required by all companies'],a:1}]},
  {id:128,title:'Launch & Beyond!',intro:'🚀 YOU MADE IT! This is your graduation from STEM Spark Academy Tier 4! You have learned everything from Grade 3 AI basics to production full-stack development with React, Python, databases, ML, AI agents and DevOps. You are now a JUNIOR DEVELOPER. Welcome to the profession!',
   slides:[{title:'You Are A Developer Now!',text:'You have completed 128 lessons across 4 tiers. You know Python, JavaScript, TypeScript, React, Angular, SQL, Git, REST APIs, ML, AI engineering and deployment. Junior developers get hired every day with exactly these skills!',e:'🎓'},{title:'What to Do Next!',text:'Build and ship your capstone project. Put it on GitHub. Deploy it live. Write a case study. Add it to your portfolio (stingfolio.netlify.app is a great example!). Apply for junior dev, intern, or co-op positions. Your education never stops!',e:'🚀'},{title:'Kappr.ai Inspiration!',text:'Platforms like Kappr.ai show what you can build! An AI-powered evaluation platform for logistics, built with the exact stack you have learned: React, Supabase, Python APIs, and Claude integration. Every great product started with skills like yours!',e:'⚡'}],
   game:{type:'build',title:'Your Launch Plan!',inst:'Plan the next steps for your developer career!',cols:[{l:'CAPSTONE TO SHIP 🚀',items:['AI-powered study assistant 🤖','Full-stack task manager ✅','Real-time chat app 💬','Data dashboard with ML insights 📊']},{l:'FIRST STEP THIS WEEK 📅',items:['Create the GitHub repo today 📁','Write the README and architecture doc 📋','Design the database schema 🗄️','Build the login/auth flow 🔐']},{l:'JOB TARGET 💼',items:['Junior Frontend Developer (React)','Junior Backend Developer (Python)','Junior Full-Stack Developer','AI/ML Engineering Intern']}]},
   quiz:[{q:'What makes a strong junior developer portfolio?',o:['Many tutorial projects','Shipped apps that solve real problems with clean code on GitHub','Only certificates'],a:1},{q:'What should you do after building a project?',o:['Keep it local on your laptop','Deploy it write a case study add to portfolio','Start the next project immediately'],a:1},{q:'You have completed all 128 lessons. You are now a...',o:['Expert senior developer','Beginner with nothing to show','Junior developer with real skills ready for the industry!'],a:2}]}
]}
];








const TIER3_MODULES=[
{id:17,title:'JavaScript Fundamentals',sub:'Make web pages come alive!',emoji:'⚡',color:'#F7DF1E',grad:'linear-gradient(135deg,#F7DF1E,#CC9900)',shadow:'rgba(247,223,30,.5)',badgeName:'JS Spark Badge',tier:3,
 lessons:[
  {id:65,title:'JavaScript Intro',intro:'JavaScript is THE language of the web! Every interactive thing on every website — buttons, popups, animations, games — is powered by JavaScript. Python runs on servers, but JavaScript runs right inside every browser on Earth!',
   slides:[{title:'What is JavaScript?',scene:'Jordan clicked the button and absolutely nothing happened. "It\'s HTML," they muttered. Then they added one line of JavaScript. The button glowed, the page transformed. "Oh," Jordan whispered. "THAT\'s what JavaScript is for."',text:'JavaScript is the only language that runs natively in web browsers. It makes HTML pages interactive and dynamic. One line of JS can change the entire look of a page instantly!',e:'⚡'},{title:'JS vs Python',fact:'JavaScript runs on 98% of all websites on Earth. It was created in just 10 days in 1995 by Brendan Eich — and it went on to power the entire modern web!',text:'Python is great for servers and data. JavaScript is king of the browser. Both use variables, functions, loops and conditions — but the syntax is slightly different!',e:'⚔️'},{title:'The Console!',text:'The browser console is where JavaScript output appears. In Chrome press F12 then click Console. console.log("Hello!") prints Hello! there. It is the programmer\'s best friend!',e:'🖥️'}],
   game:{type:'pick',title:'JS Knowledge Check!',inst:'Choose the correct answer about JavaScript!',items:[{q:'Where does JavaScript run?',o:['Only on servers','Inside web browsers','Only in Python'],a:1},{q:'What does console.log() do?',o:['Saves to a file','Prints output to the browser console','Creates a variable'],a:1},{q:'Can JavaScript change a webpage after it loads?',o:['No pages are fixed','Yes that is its superpower','Only with Python help'],a:1}]},
   quiz:[{q:'What is JavaScript mainly used for?',o:['Server databases','Making web pages interactive','Image editing'],a:1},{q:'Every web browser can run...',o:['Python','JavaScript natively','Only HTML'],a:1},{q:'What is the browser console?',o:['A gaming device','Where JavaScript output and errors appear','A file storage system'],a:1}]},
  {id:66,title:'Variables & Types in JS',intro:'JavaScript variables are similar to Python but with some key differences! You use let and const instead of just writing the name. let can change, const cannot. Understanding this prevents a huge category of bugs before they happen!',
   slides:[{title:'let and const!',text:'let score = 0 creates a variable that can change. const PI = 3.14 creates a constant that can never change. Always prefer const — if you need to change it use let. Never use old-style var!',e:'📦'},{title:'JS Data Types!',text:'string: "Hello". number: 42 or 3.14 (JavaScript has just ONE number type!). boolean: true or false. null: intentionally empty. undefined: not yet assigned. object: complex data. array: list of items!',e:'🔢'},{title:'Template Literals!',text:'In JS you use backticks for template strings! const name = "Alex"; console.log(`Hello ${name}!`) outputs Hello Alex! — just like Python f-strings but with backticks!',e:'✨'}],
   game:{type:'jscode',title:'Variables in JavaScript!',inst:'Run the code to see JS variables and types in action!',starter:'// JavaScript variables\nconst name = "Alex";\nlet score = 100;\nconst isWinner = true;\n\nconsole.log("Name:", name);\nconsole.log("Score:", score);\nconsole.log("Winner:", isWinner);\n\n// Template literal\nconsole.log(`${name} scored ${score} points!`);\n\n// Change a let variable\nscore += 50;\nconsole.log("New score:", score);',hint:'Change name to your own name and run again! Try changing the score too.',check:'contains',expected:'points!'},
   quiz:[{q:'What keyword creates a variable that can change in JS?',o:['const','var','let'],a:2},{q:'In JS how many number types are there?',o:['Two: int and float','One number type for all numbers','Three: int float and decimal'],a:1},{q:'How do you write a template literal in JavaScript?',o:['Use single quotes','Use backticks with ${}','Use f before quotes'],a:1}]},
  {id:67,title:'Functions & DOM',intro:'Functions in JavaScript work just like Python but with different syntax. AND JavaScript has something Python does not — access to the DOM! The DOM is the Document Object Model, the live tree of every element on a webpage that you can read and change!',
   slides:[{title:'JS Functions!',text:'function greet(name){ return "Hello " + name; } defines a function. Or the modern arrow function: const greet = (name) => "Hello " + name; Arrow functions are shorter and are preferred in modern JS code!',e:'⚙️'},{title:'The DOM!',text:'document.getElementById("title") grabs the element with id="title". document.querySelector(".button") grabs the first element with class="button". The DOM lets JavaScript reach into any part of the page!',e:'🌳'},{title:'Changing the Page!',text:'element.textContent = "New text!" changes what is written. element.style.color = "red" changes the colour. element.classList.add("active") adds a CSS class. JavaScript controls everything!',e:'✏️'}],
   game:{type:'jscode',title:'JS Functions!',inst:'Run the code to see JS functions and calculations!',starter:'// Arrow function\nconst square = (n) => n * n;\nconst add = (a, b) => a + b;\nconst greet = (name) => `Hello, ${name}!`;\n\nconsole.log(square(5));\nconsole.log(square(12));\nconsole.log(add(8, 7));\nconsole.log(greet("World"));\n\n// Function with logic\nconst getGrade = (score) => {\n  if (score >= 90) return "A";\n  if (score >= 80) return "B";\n  if (score >= 70) return "C";\n  return "D";\n};\n\nconsole.log("Grade for 95:", getGrade(95));\nconsole.log("Grade for 73:", getGrade(73));',hint:'Try calling greet() with your own name! Or test getGrade with different scores.',check:'contains',expected:'Hello, World!'},
   quiz:[{q:'What is the modern JS function syntax called?',o:['Lambda function','Arrow function','Quick function'],a:1},{q:'What does document.getElementById() do?',o:['Creates a new element','Deletes an element','Finds an existing element by its id'],a:2},{q:'What is the DOM?',o:['A type of database','The live tree of all elements on a webpage','A JavaScript library'],a:1}]},
  {id:68,title:'Events & Interactivity',intro:'Events are what make websites RESPOND to users! Clicks, key presses, mouse movements, form submissions — all events. JavaScript listens for events and runs code when they happen. This is how EVERY interactive website works!',
   slides:[{title:'addEventListener!',text:'element.addEventListener("click", myFunction) tells the browser: when this element is clicked, run myFunction. The first argument is the event type, the second is the function to call!',e:'👂'},{title:'Common Events!',text:'click fires on a mouse click. keydown fires on any key press. submit fires when a form is submitted. mouseover fires when the cursor moves onto an element. input fires as text is typed!',e:'🖱️'},{title:'The Event Object!',text:'Your event handler receives an event object automatically! event.target is the element that was clicked. event.key tells you which key was pressed. event.preventDefault() stops default browser behaviour!',e:'📦'}],
   game:{type:'jscode',title:'Event Simulation!',inst:'Run this code to simulate event handling with JS logic!',starter:'// Simulating event-driven logic\nconst handleClick = (buttonName) => {\n  console.log(`Button clicked: ${buttonName}`);\n  return `Processed click on ${buttonName}`;\n};\n\nconst handleKeyPress = (key) => {\n  if (key === "Enter") return "Form submitted!";\n  if (key === "Escape") return "Dialog closed!";\n  return `Key pressed: ${key}`;\n};\n\n// Simulate clicks\nconsole.log(handleClick("Submit"));\nconsole.log(handleClick("Cancel"));\n\n// Simulate key presses  \nconsole.log(handleKeyPress("Enter"));\nconsole.log(handleKeyPress("Escape"));\nconsole.log(handleKeyPress("a"));',hint:'Try adding your own button names or key names to test!',check:'contains',expected:'Button clicked:'},
   quiz:[{q:'What does addEventListener() do?',o:['Creates a new event','Removes an event','Tells JS to run a function when an event happens'],a:2},{q:'What event fires when a user clicks a button?',o:['press','click','select'],a:1},{q:'What is event.target?',o:['The type of event','The element that triggered the event','The event listener function'],a:1}]}
]},
{id:18,title:'Responsive Web Design',sub:'Build sites that work everywhere!',emoji:'📱',color:'#00C8FF',grad:'linear-gradient(135deg,#00C8FF,#0066CC)',shadow:'rgba(0,200,255,.5)',badgeName:'Responsive Badge',tier:3,
 lessons:[
  {id:69,title:'Mobile-First Design',intro:'More than 60% of web traffic comes from phones! Mobile-first design means you design for the smallest screen first, then expand for larger screens. This approach produces cleaner code and better user experiences on every device!',
   slides:[{title:'Why Mobile-First?',text:'Start with mobile constraints: small screen, touch input, slow connection. This forces you to prioritise only what matters most. Then enhance progressively for tablets and desktops!',e:'📱'},{title:'Viewport Meta Tag!',text:'Add meta name="viewport" content="width=device-width, initial-scale=1" to your head. Without this mobile browsers zoom out to show the full desktop view — your layout looks tiny!',e:'🏷️'},{title:'Touch vs Click!',text:'Mobile users tap, not click. Buttons must be at least 44x44px for comfortable tapping. Hover effects do not exist on touch screens. Links close together cause accidental taps. Design for fingers!',e:'👆'}],
   game:{type:'pick',title:'Mobile-First Quiz!',inst:'Choose the best mobile-first decision!',items:[{q:'What percentage of web traffic comes from phones?',o:['About 10%','Over 60%','About 30%'],a:1},{q:'Which screen size do you design for FIRST in mobile-first?',o:['Desktop 1920px','Tablet 768px','Mobile 375px'],a:2},{q:'What is the minimum comfortable tap target size?',o:['10x10px','20x20px','44x44px'],a:2}]},
   quiz:[{q:'What does mobile-first mean?',o:['Only build for mobile','Design for mobile first then enhance for larger screens','Desktop is more important'],a:1},{q:'What does the viewport meta tag do?',o:['Changes the browser tab title','Controls how the page scales on mobile devices','Sets the page background'],a:1},{q:'Why do hover effects not work on mobile?',o:['Mobile browsers are too slow','Touch screens have no cursor to hover','Mobile CSS does not support hover'],a:1}]},
  {id:70,title:'CSS Media Queries',intro:'Media queries are how CSS detects screen size and applies different styles! One HTML file, one CSS file, infinite screen sizes — media queries make it all work. This is the core technical skill of responsive design!',
   slides:[{title:'Media Query Syntax!',text:'@media (max-width: 768px) { .container { padding: 10px; } } applies the padding only on screens 768px wide or smaller. min-width targets larger screens. max-width targets smaller ones!',e:'📐'},{title:'Common Breakpoints!',text:'Mobile: max-width 480px. Tablet: max-width 768px. Laptop: max-width 1024px. Desktop: max-width 1200px. Wide: anything above 1200px. These are the industry-standard breakpoints used everywhere!',e:'📏'},{title:'Mobile-First Media Queries!',text:'Write your base CSS for mobile. Then use min-width media queries to add styles for larger screens. This is opposite to old desktop-first approach and results in leaner simpler code!',e:'✅'}],
   game:{type:'pick',title:'Media Query Quiz!',inst:'Which media query achieves each goal?',items:[{q:'Apply styles ONLY on screens smaller than 600px:',o:['@media (min-width: 600px)','@media (max-width: 600px)','@media screen > 600px'],a:1},{q:'Apply styles for LARGE screens (min-width 1024px):',o:['@media (max-width: 1024px)','@media (under: 1024px)','@media (min-width: 1024px)'],a:2},{q:'Which is the standard tablet breakpoint?',o:['480px','768px','1200px'],a:1}]},
   quiz:[{q:'What does max-width in a media query do?',o:['Sets the maximum image size','Targets screens SMALLER than the value','Targets screens LARGER than the value'],a:1},{q:'What are breakpoints?',o:['Where code breaks','Screen width values where the layout changes','Types of media queries'],a:1},{q:'In mobile-first CSS what media query direction do you use?',o:['max-width going down','min-width going up','No media queries needed'],a:1}]},
  {id:71,title:'Flexbox & Grid Mastery',intro:'Flexbox and CSS Grid are the two layout systems that replaced floats forever! Flexbox is great for one-dimensional layouts (rows or columns). Grid is great for two-dimensional layouts (rows AND columns). Master both and you can build any layout imaginable!',
   slides:[{title:'Flexbox!',text:'display: flex on a parent. flex-direction: row or column. justify-content: flex-start center flex-end space-between. align-items: center stretch. gap: 20px adds spacing. One parent property controls all children!',e:'↔️'},{title:'CSS Grid!',text:'display: grid on a parent. grid-template-columns: 1fr 1fr 1fr creates 3 equal columns. grid-template-columns: repeat(3, 1fr) does the same. gap: 20px adds spacing. Grid places children automatically!',e:'🔲'},{title:'When to Use Which!',text:'Use Flexbox for navigation bars, button groups, card rows — anything along one axis. Use Grid for page layouts, image galleries, dashboards — anything in two dimensions. Both can be combined!',e:'🤔'}],
   game:{type:'pick',title:'Flexbox vs Grid!',inst:'Which CSS layout system fits each task best?',items:[{q:'Creating a 3-column image gallery:',o:['Flexbox','CSS Grid','Neither'],a:1},{q:'Centering items in a navigation bar:',o:['CSS Grid','Flexbox','Tables'],a:1},{q:'Building a full dashboard layout with rows and columns:',o:['Flexbox only','CSS Grid','Inline styles'],a:1},{q:'Making buttons in a row with equal spacing:',o:['CSS Grid','Tables','Flexbox'],a:2}]},
   quiz:[{q:'What does display: flex do?',o:['Makes elements invisible','Enables flexbox on a parent element','Creates a CSS grid'],a:1},{q:'What does grid-template-columns: 1fr 1fr 1fr create?',o:['3 rows','3 equal columns','A 3x3 grid'],a:1},{q:'Flexbox is best for layouts along...',o:['Two dimensions','One axis (row or column)','Only vertical layouts'],a:1}]},
  {id:72,title:'Build a Responsive Site',intro:'Capstone time! You are going to design and spec a complete responsive website using mobile-first principles, media queries, flexbox and grid. You have all the tools. Now you put it all together into a cohesive professional design!',
   slides:[{title:'The Design System!',text:'A design system is a set of reusable decisions: colour palette, typography scale, spacing scale, component styles. Defining it upfront makes your site consistent and much faster to build!',e:'🎨'},{title:'Component Thinking!',text:'Break your UI into reusable components: Card, Button, Navbar, Footer, Hero. Build each component once and reuse it everywhere. This is the same thinking React uses — you are already learning it!',e:'🧱'},{title:'Performance Matters!',text:'Optimise images (use WebP format, compress them). Minimise CSS (remove unused styles). Lazy load images below the fold. A 1-second improvement in load time increases conversions by 7%!',e:'⚡'}],
   game:{type:'build',title:'Design Your Responsive Site!',inst:'Make key decisions for your full responsive website project!',cols:[{l:'SITE TYPE 🌐',items:['Personal portfolio site 💼','Local business site 🏪','Student club website 🏫','Product landing page 🚀']},{l:'LAYOUT APPROACH 🏗️',items:['Mobile hero + stacked sections 📱','Grid-based magazine layout 📰','Dashboard with sidebar ⚙️','Full-screen scroll experience 🖥️']},{l:'KEY FEATURE ✨',items:['Dark/light mode toggle 🌙','Animated scroll reveals 🌊','Interactive contact form 📬','Project gallery with filters 🔍']}]},
   quiz:[{q:'What is a design system?',o:['A design app','A set of reusable design decisions (colours fonts spacing)','A type of CSS framework'],a:1},{q:'What is component thinking?',o:['Thinking about computers','Breaking UI into reusable pieces','Only used in React'],a:1},{q:'What image format is best for web performance?',o:['BMP','WebP','TIFF'],a:1}]}
]},
{id:19,title:'Python Projects',sub:'Build real tools with Python!',emoji:'🐍',color:'#39FF14',grad:'linear-gradient(135deg,#39FF14,#00AA44)',shadow:'rgba(57,255,20,.5)',badgeName:'Python Builder Badge',tier:3,
 lessons:[
  {id:73,title:'File Handling',intro:'Real programs READ and WRITE files! Configuration files, saving game progress, processing spreadsheets, reading logs — file handling is a core skill every Python developer needs. Today you learn to work with files like a pro!',
   slides:[{title:'Opening Files!',text:'with open("file.txt", "r") as f: content = f.read() reads a file. The "r" means read mode. "w" means write (overwrites). "a" means append (adds to end). The with statement automatically closes the file!',e:'📂'},{title:'Reading & Writing!',text:'f.read() reads the whole file as one string. f.readlines() returns a list of lines. f.write("Hello!") writes text. Always use with open() to ensure files are properly closed even if an error happens!',e:'✍️'},{title:'File Paths!',text:'A relative path like "data.txt" looks in the current folder. An absolute path like "/Users/alex/data.txt" specifies the exact location. Use the os module for cross-platform path handling!',e:'📁'}],
   game:{type:'pycode',title:'File Operations!',inst:'Run this code to simulate file operations. Python processes text files just like this!',starter:'# Simulating file-like operations with strings\nimport io\n\n# Simulate writing to a file\ncontent = []\ncontent.append("Name: Alex Chen\\n")\ncontent.append("Score: 950\\n")\ncontent.append("Level: 7\\n")\ncontent.append("Status: Active\\n")\n\n# Join and display\nfile_text = "".join(content)\nprint("=== FILE CONTENTS ===")\nprint(file_text)\n\n# Simulate reading line by line\nprint("=== LINE BY LINE ===")\nlines = file_text.strip().split("\\n")\nfor i, line in enumerate(lines):\n    print(f"Line {i+1}: {line}")\n\nprint(f"\\nTotal lines: {len(lines)}")',hint:'This simulates what happens when you read a real text file! Try adding more lines to the content list.',check:'contains',expected:'FILE CONTENTS'},
   quiz:[{q:'What does open("file.txt","r") do?',o:['Creates a new file','Opens file.txt for reading','Deletes the file'],a:1},{q:'Why use with open() instead of just open()?',o:['It is faster','It automatically closes the file even if an error occurs','It is the only way'],a:1},{q:'What does "a" mode do when opening a file?',o:['Reads from the start','Overwrites all content','Appends new content to the end'],a:2}]},
  {id:74,title:'APIs with Python',intro:'APIs are how programs talk to the internet! Weather data, stock prices, news headlines, maps, translation — all available through APIs. Python makes calling APIs incredibly easy with the requests library. Today you learn to connect your programs to the world!',
   slides:[{title:'What is an API?',text:'API stands for Application Programming Interface. It is a set of rules for how programs communicate. A weather API lets your Python code ask "What is the weather in Calgary?" and receive a JSON response!',e:'🌐'},{title:'JSON Data!',text:'APIs return data as JSON — JavaScript Object Notation. It looks like Python dictionaries! {"city":"Calgary","temp":18,"condition":"Sunny"} is JSON. Python\'s json module converts it to a real dictionary!',e:'📋'},{title:'The requests Library!',text:'import requests then response = requests.get(url) fetches data from the URL. response.json() converts the response to a Python dictionary. response.status_code tells you if it succeeded (200 = OK)!',e:'📡'}],
   game:{type:'pycode',title:'Working with JSON Data!',inst:'Run this code to see Python process API-style JSON data!',starter:'import json\n\n# Simulated API response (what a real API returns)\napi_response = \'\'\'{\n  "city": "Calgary",\n  "temperature": 18,\n  "condition": "Sunny",\n  "humidity": 42,\n  "wind_speed": 15\n}\'\'\'\n\n# Parse the JSON\nweather = json.loads(api_response)\n\n# Use the data\nprint(f"Weather for: {weather[\'city\']}")\nprint(f"Temperature: {weather[\'temperature\']}°C")\nprint(f"Condition: {weather[\'condition\']}")\nprint(f"Humidity: {weather[\'humidity\']}%")\n\n# Make a decision based on data\nif weather[\'temperature\'] > 20:\n    print("\\nAdvice: Wear sunscreen! ☀️")\nelif weather[\'temperature\'] > 10:\n    print("\\nAdvice: Light jacket recommended 🧥")\nelse:\n    print("\\nAdvice: Bundle up! 🧤")',hint:'Try changing the temperature to different values and see how the advice changes!',check:'contains',expected:'Weather for:'},
   quiz:[{q:'What does API stand for?',o:['Automatic Python Interface','Application Programming Interface','Advanced Program Integration'],a:1},{q:'What format do most APIs use to send data?',o:['CSV','XML','JSON'],a:2},{q:'What does response.status_code of 200 mean?',o:['Server error','Request successful','File not found'],a:1}]},
  {id:75,title:'Object-Oriented Python',intro:'Object-Oriented Programming is how professional developers organise large programs! Instead of just functions and variables you create CLASSES — blueprints for objects that have their own data (attributes) and behaviour (methods). Every major Python program uses OOP!',
   slides:[{title:'Classes and Objects!',text:'A class is a blueprint. class Dog: defines a blueprint. fido = Dog() creates one Dog object (an instance). fido and rex are different objects from the same Dog class — like two real dogs from the same species!',e:'🐕'},{title:'Attributes and Methods!',text:'def __init__(self, name, breed): self.name = name sets the object\'s name. def bark(self): print(f"{self.name} says Woof!") is a method. self refers to the specific object being used!',e:'⚙️'},{title:'Inheritance!',text:'class Puppy(Dog): inherits all of Dog\'s attributes and methods. Puppy can add new methods or override existing ones. This is called inheritance and it avoids repeating code across similar classes!',e:'👶'}],
