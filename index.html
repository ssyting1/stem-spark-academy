<body class="stars-bg">
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const {useState,useEffect,useRef,useMemo}=React;
const h=React.createElement;

const LOCKED_TIERS=[];
// All 4 tiers are now complete!


const CREATIVE_TRACK=[
{id:'c1',title:'Intro to p5.js',intro:'p5.js is a JavaScript library that makes CREATIVE coding magical! Artists, musicians, and designers use it to create generative art, data visualisations, interactive animations and music visualisers. Today you start your creative coding journey!',
 slides:[{title:'What is p5.js?',text:'p5.js brings the Processing visual programming language to the browser. setup() runs once to initialise. draw() runs 60 times per second. Together they create animations. background(), ellipse(), rect(), line() — simple functions, infinite possibilities!',e:'🎨'},{title:'The Canvas!',text:'p5.js draws on an HTML canvas. createCanvas(400,400) sets the size. Coordinate (0,0) is the TOP-LEFT. X increases right. Y increases down. The centre of a 400×400 canvas is (200,200)!',e:'📐'},{title:'Colour & Shape!',text:'fill(255,0,0) sets red fill. stroke(0) sets black outline. noStroke() removes the outline. ellipse(x,y,w,h) draws a circle or oval. rect(x,y,w,h) draws a rectangle. These 7 functions create unlimited visuals!',e:'🔴'}],
 game:{type:'pick',title:'p5.js Foundations!',inst:'Test your p5.js knowledge!',items:[{q:'In p5.js what are the coordinates of the top-left corner?',o:['(1,1)','(0,0)','(-1,-1)'],a:1},{q:'How many times per second does draw() run?',o:['Once','30 times','60 times'],a:2},{q:'What does noStroke() do?',o:['Removes the fill colour','Removes the outline of shapes','Stops the animation'],a:1}]},
 quiz:[{q:'What is p5.js used for?',o:['Database management','Creative coding: animations, art and interactive visuals','Server-side programming'],a:1},{q:'What does setup() do in p5.js?',o:['Runs 60 times per second','Runs once to initialise the canvas','Handles user input'],a:1},{q:'What does fill(255,0,0) set?',o:['A red outline','A red background','A red fill colour for shapes'],a:2}]},
{id:'c2',title:'Drawing with Code',intro:'Every pixel on the screen is a canvas waiting for your code! By combining simple shapes, colors, and mathematical patterns you can create stunning visuals that would take hours in a traditional art program but only minutes in code!',
 slides:[{title:'Coordinates & Math!',text:'Math is art! sin() and cos() create circular motion. random() creates organic unpredictability. map() converts ranges — map(mouseX, 0, 400, 0, 255) turns mouse position into a colour value. Math is the vocabulary of generative art!',e:'📐'},{title:'Loops in Art!',text:'for(let i=0; i<36; i++){ let angle = i*10; line(200,200, cos(angle)*100+200, sin(angle)*100+200); } draws 36 spokes of a wheel. Loops in p5.js let one line of intent create hundreds of visual elements!',e:'🔁'},{title:'HSB Colour!',text:'colorMode(HSB) switches from RGB to Hue-Saturation-Brightness. Hue 0-360 is the colour wheel. A rainbow: for(let i=0; i<360; i++){ fill(i,100,100); rect(i,0,1,100); } One loop creates the entire visible spectrum!',e:'🌈'}],
 game:{type:'jscode',title:'Generative Pattern!',inst:'Run this code to see a mathematical pattern generator!',starter:'// Generative Art Pattern - ASCII version\n// Real p5.js code would draw this on a canvas!\n\nconst width = 40;\nconst height = 20;\n\n// Generate a wave pattern\nconst generateWave = (time) => {\n  const lines = [];\n  for (let y = 0; y < height; y++) {\n    let line = "";\n    for (let x = 0; x < width; x++) {\n      const wave1 = Math.sin((x + time) * 0.4);\n      const wave2 = Math.sin((y + time * 0.7) * 0.3);\n      const combined = wave1 + wave2;\n      // Map wave value to characters\n      const chars = " .,-~+=*#@";\n      const idx = Math.floor((combined + 2) / 4 * chars.length);\n      line += chars[Math.max(0, Math.min(chars.length-1, idx))];\n    }\n    lines.push(line);\n  }\n  return lines.join("\\n");\n};\n\nconsole.log("=== Wave Pattern (t=0) ===");\nconsole.log(generateWave(0));\nconsole.log("\\n=== Wave Pattern (t=5) ===");\nconsole.log(generateWave(5));',hint:'Try changing the wave frequency multipliers (0.4 and 0.3) to create different patterns!',check:'contains',expected:'Wave Pattern'},
 quiz:[{q:'What does Math.sin() create in animation?',o:['Straight lines','Smooth wave and circular motion','Random movement'],a:1},{q:'What does the map() function in p5.js do?',o:['Creates a literal map','Converts a value from one range to another','Loops through an array'],a:1},{q:'What colour mode uses a 0-360 hue wheel?',o:['RGB','CMYK','HSB (Hue Saturation Brightness)'],a:2}]},
{id:'c3',title:'Animation & Interaction',intro:'Static art is beautiful but INTERACTIVE art is alive! Making your p5.js sketches respond to mouse movement, clicks, and keyboard input transforms them from pictures into experiences. This is where creative coding becomes truly magical!',
 slides:[{title:'Mouse & Keyboard!',text:'mouseX and mouseY give current cursor position. mousePressed() fires on click. keyPressed() fires on any key. key holds the last key pressed. These variables and functions make any sketch respond to the viewer!',e:'🖱️'},{title:'Smooth Motion!',text:'Easing creates natural motion! Instead of x = mouseX (jumpy), use x += (mouseX - x) * 0.1 (smooth). The object chases the mouse with delay. Change 0.1 for faster or slower following. This one line transforms animation quality!',e:'🌊'},{title:'Particle Systems!',text:'Create an array of particle objects. Each has position, velocity, and lifespan. In draw() update all particles and draw them. On click spawn new ones. Particles die and respawn. A few dozen lines creates stunning visual effects!',e:'✨'}],
 game:{type:'jscode',title:'Particle System Simulation!',inst:'Run this particle system simulation!',starter:'// Particle System\nclass Particle {\n  constructor(x, y) {\n    this.x = x;\n    this.y = y;\n    this.vx = (Math.random() - 0.5) * 4;\n    this.vy = (Math.random() - 0.5) * 4 - 2;\n    this.life = 1.0;\n    this.decay = Math.random() * 0.02 + 0.01;\n    this.char = ["*","·","o","°","★"][Math.floor(Math.random()*5)];\n  }\n  update() {\n    this.x += this.vx;\n    this.y += this.vy;\n    this.vy += 0.1; // gravity\n    this.life -= this.decay;\n  }\n  isAlive() { return this.life > 0; }\n}\n\nconst simulate = (frames, spawnX, spawnY) => {\n  const particles = [];\n  const log = [];\n  for (let f = 0; f < frames; f++) {\n    if (f % 3 === 0) particles.push(new Particle(spawnX, spawnY));\n    particles.forEach(p => p.update());\n    particles.splice(0, particles.length, ...particles.filter(p => p.isAlive()));\n    if (f % 5 === 0) log.push(`Frame ${f}: ${particles.length} particles alive`);\n  }\n  return log;\n};\n\nconst results = simulate(50, 20, 10);\nresults.forEach(line => console.log(line));\nconsole.log("Simulation complete!");',hint:'Try changing the gravity value (0.1) or the spawn rate (every 3 frames)!',check:'contains',expected:'particles alive'},
 quiz:[{q:'What do mouseX and mouseY give you in p5.js?',o:['Mouse button state','Current cursor coordinates','Mouse speed'],a:1},{q:'What does x += (mouseX - x) * 0.1 create?',o:['Teleportation to mouse','Smooth eased following of the mouse','Random movement'],a:1},{q:'What is a particle system?',o:['A physics engine','Many small objects with position velocity and lifespan','A type of shader'],a:1}]},
{id:'c4',title:'Generative Patterns',intro:'Generative art uses algorithms and mathematical rules to create artwork that could not be made by hand! From Mondrian-style grids to Voronoi diagrams to L-systems that grow like plants — code lets you explore infinite variations of visual ideas in seconds!',
 slides:[{title:'Noise vs Random!',text:'Math.random() is pure chaos — adjacent values have no relationship. Perlin noise (noise() in p5.js) creates organic randomness — adjacent values are similar. Natural-looking landscapes, clouds, and terrain all use noise, not random!',e:'🌊'},{title:'Recursive Art!',text:'A function that calls itself can create fractal patterns! drawTree(x,y,length,angle){ drawBranch; drawTree(x1,y1,length*0.7, angle+25); drawTree(x2,y2,length*0.7, angle-25); } This creates an entire tree from one simple rule!',e:'🌳'},{title:'Symmetry & Transformation!',text:'push() and pop() save and restore the transformation state. translate() moves the origin. rotate() rotates around it. scale() scales. Combine these to draw in a convenient space then transform to the final position!',e:'🔄'}],
 game:{type:'jscode',title:'Recursive Fractal Tree!',inst:'Run this recursive tree generator!',starter:'// Recursive Fractal Tree\nconst drawTree = (x, y, length, angle, depth, output) => {\n  if (depth === 0 || length < 2) return;\n  \n  const rad = angle * Math.PI / 180;\n  const x2 = x + Math.cos(rad) * length;\n  const y2 = y - Math.sin(rad) * length; // y goes up\n  \n  const indent = "  ".repeat(8 - depth);\n  output.push(`${indent}Branch: (${Math.round(x)},${Math.round(y)}) → (${Math.round(x2)},${Math.round(y2)}) depth=${depth}`);\n  \n  drawTree(x2, y2, length * 0.72, angle + 28, depth - 1, output);\n  drawTree(x2, y2, length * 0.72, angle - 28, depth - 1, output);\n};\n\nconst lines = [];\ndrawTree(200, 350, 80, 90, 5, lines);\nconsole.log(`Generated ${lines.length} branches!`);\nlines.slice(0, 15).forEach(l => console.log(l));\nconsole.log(`... and ${lines.length - 15} more branches`);',hint:'Try changing the angle (28) or scale factor (0.72) to grow different shaped trees!',check:'contains',expected:'Generated'},
 quiz:[{q:'Why use Perlin noise instead of Math.random() for landscapes?',o:['Noise is faster','Noise creates organic smoothly-varying randomness','Random is not allowed in p5.js'],a:1},{q:'What does recursion create in generative art?',o:['Simple shapes only','Fractal patterns through self-similar repetition','Random noise'],a:1},{q:'What do push() and pop() do in p5.js?',o:['Add and remove elements','Save and restore the transformation state','Control sound volume'],a:1}]},
{id:'c5',title:'Interactive Art',intro:'Interactive generative art responds to you in real time! The boundary between artist and audience dissolves when the viewer\'s movements and actions become part of the creative process. Today you design interactive experiences that are unique each time they are run!',
 slides:[{title:'Reactive Systems!',text:'Systems that react to input create emergent behaviour impossible to plan. A flock simulation (boids): each bird follows 3 simple rules — avoid crowding, align with neighbours, stay close to the group. Complex realistic flocking emerges automatically!',e:'🐦'},{title:'Data Visualisation as Art!',text:'Your data is beautiful! Visualise it with intent. Use size to show magnitude. Use colour to show category. Use animation to show change over time. The best data visualisations are also aesthetically beautiful — function and form together!',e:'📊'},{title:'Sound & Music!',text:'p5.sound extends p5.js with audio capabilities. oscillator.freq(220) plays A. Map mouse position to frequency for a theremin-like instrument. Analyse audio frequencies and drive visuals — music visualisers use this exact approach!',e:'🎵'}],
 game:{type:'pick',title:'Interactive Systems!',inst:'Choose the best interactive design decision!',items:[{q:'What creates emergent behaviour in boids (flocking)?',o:['Complex pre-programmed choreography','Simple rules per individual that produce complex group behaviour','Random movement'],a:1},{q:'In data visualisation what should SIZE encode?',o:['Random variation','Aesthetic preference only','Magnitude — how big a value is'],a:2},{q:'The p5.sound library enables what?',o:['Faster graphics','3D rendering','Audio input output and synthesis'],a:2}]},
 quiz:[{q:'What is emergent behaviour?',o:['Programmed complex actions','Complex group patterns arising from simple individual rules','A type of algorithm'],a:1},{q:'What does mapping mouseX to frequency create?',o:['A random soundscape','An instrument where horizontal position controls pitch','A rhythm generator'],a:1},{q:'What makes data visualisation beautiful AND useful?',o:['Using all available chart types','When aesthetic choices directly encode meaningful data','Maximum use of colour'],a:2}]},
{id:'c6',title:'Sound Visualizer',intro:'Music visualisers analyse audio frequencies and translate them into stunning real-time visual displays! Every frequency — bass, mid, treble — drives a different visual element. The result is a display that dances perfectly in sync with any music!',
 slides:[{title:'Frequency Analysis!',text:'Sound is waves at different frequencies. A Fast Fourier Transform (FFT) splits audio into frequency buckets. The Web Audio API provides this in the browser. Low frequencies (bass) in bucket 0. High frequencies (treble) in the last bucket!',e:'🎵'},{title:'Mapping Sound to Vision!',text:'For each frequency bucket: amplitude (volume) → visual intensity. Bass might drive a pulsing circle. Mids drive a wave. Treble drives sparkling particles. Map audio data to visual properties and the visualiser responds to the music!',e:'🔴'},{title:'The AnalyserNode!',text:'audioContext.createAnalyser() creates an FFT analyser. analyser.getByteFrequencyData(dataArray) fills an array with 256 frequency amplitudes each frame. Loop through this array in your draw() function to create a frequency spectrum display!',e:'📊'}],
 game:{type:'jscode',title:'Audio Frequency Simulation!',inst:'Run this audio spectrum simulation!',starter:'// Audio Spectrum Visualizer Simulation\n// Simulates what Web Audio API + p5.js would do!\n\nconst generateSpectrum = (time) => {\n  const bins = 64;\n  const spectrum = [];\n  for (let i = 0; i < bins; i++) {\n    const freq = i / bins;\n    // Simulate different frequency bands\n    const bass = i < 8 ? Math.abs(Math.sin(time * 2.1)) * 0.9 : 0;\n    const mid = (i >= 8 && i < 32) ? Math.abs(Math.sin(time * 3.7 + i * 0.2)) * 0.6 : 0;\n    const treble = i >= 32 ? Math.abs(Math.sin(time * 7.3 + i * 0.5)) * 0.4 : 0;\n    spectrum.push(Math.min(1, bass + mid + treble));\n  }\n  return spectrum;\n};\n\nconst visualise = (spectrum, label) => {\n  console.log(`\\n${label}`);\n  const barWidth = 2;\n  for (let i = 0; i < spectrum.length; i += barWidth) {\n    const avg = spectrum.slice(i, i+barWidth).reduce((a,b)=>a+b,0)/barWidth;\n    const height = Math.round(avg * 12);\n    const bar = "█".repeat(height).padEnd(12);\n    const freqLabel = i < 8 ? "BASS" : i < 32 ? "MID " : "HIGH";\n    if (i % 8 === 0) console.log(`${freqLabel} ${bar} ${(avg*100).toFixed(0)}%`);\n  }\n};\n\nvisualise(generateSpectrum(0.5), "Beat 1 - Bass heavy");\nvisualise(generateSpectrum(2.1), "Beat 2 - Mid heavy");',hint:'Try changing the time values to simulate different moments in a track!',check:'contains',expected:'BASS'},
 quiz:[{q:'What does FFT stand for?',o:['Fast Frame Transfer','Fast Fourier Transform','Frequency Filter Technology'],a:1},{q:'What does the Web Audio API AnalyserNode provide?',o:['Beat detection only','An array of frequency amplitude values per frame','A synthesizer'],a:1},{q:'In a visualiser what does bass typically drive?',o:['Small treble sparkles','Low frequency large pulsing elements','High frequency detail'],a:1}]},
{id:'c7',title:'Particle Systems Deep Dive',intro:'Particle systems simulate fire, smoke, explosions, rain, snow, magic spells — every visual effect in games and film uses particle systems! The technique is elegant: hundreds of simple objects following physics rules, creating an emergent visual that looks complex but emerges from simplicity!',
 slides:[{title:'Particle Physics!',text:'Each particle has: position (x,y), velocity (vx,vy), acceleration, lifespan, colour, and size. Every frame: acceleration changes velocity. Velocity changes position. Lifespan decreases. When lifespan reaches 0 the particle is removed!',e:'⚛️'},{title:'Forces!',text:'Apply forces to change acceleration! gravity = {0, 0.2} pulls down. wind = {0.1, 0} blows right. Turbulence = {noise*2-1, noise*2-1} creates organic chaos. Adding forces to all particles at once creates realistic collective behaviour!',e:'🌬️'},{title:'Colour Over Lifetime!',text:'Map lifespan (1→0) to colour. Fire: lifespan 1.0→0.5 = orange, 0.5→0 = red. Smoke: lifespan 1.0→0 = grey getting more transparent. lerpColor() interpolates smoothly between two colours based on a 0-1 value!',e:'🎨'}],
 game:{type:'jscode',title:'Physics Particle System!',inst:'Run this physics-based particle simulation!',starter:'// Physics Particle System\nclass PhysicsParticle {\n  constructor(x, y, type) {\n    this.x = x; this.y = y;\n    this.vx = (Math.random()-0.5) * 6;\n    this.vy = Math.random() * -8 - 2;\n    this.life = 1.0;\n    this.type = type;\n    this.char = type === "fire" ? ["🔥","✨","💫","⭐"][Math.floor(Math.random()*4)]\n                                : ["❄️","🌨️","💧","•"][Math.floor(Math.random()*4)];\n  }\n  update(gravity, wind) {\n    this.vx += wind;\n    this.vy += gravity;\n    this.x += this.vx;\n    this.y += this.vy;\n    this.life -= 0.03;\n  }\n}\n\nconst runSim = (type, gravity, wind, frames) => {\n  const particles = Array.from({length:20}, () => new PhysicsParticle(200, 200, type));\n  for (let f = 0; f < frames; f++) {\n    particles.forEach(p => p.update(gravity, wind));\n  }\n  const alive = particles.filter(p => p.life > 0);\n  return { total: particles.length, alive: alive.length,\n           spread: Math.round(Math.max(...particles.map(p=>p.x)) - Math.min(...particles.map(p=>p.x))) };\n};\n\nconst fire = runSim("fire", -0.1, 0.05, 20);\nconst snow = runSim("snow",  0.2, -0.02, 20);\nconsole.log("Fire emitter:", fire);\nconsole.log("Snow emitter:", snow);\nconsole.log("\\nFire rises, snow falls — same code, different physics!");',hint:'Try changing the gravity and wind values to create different effects!',check:'contains',expected:'Fire emitter'},
 quiz:[{q:'What properties does each particle need?',o:['Only position','Position velocity lifespan colour and size','Only colour and size'],a:1},{q:'What does applying a gravity force do to particles?',o:['Makes them spawn faster','Adds a downward acceleration to all particles each frame','Makes them disappear'],a:1},{q:'What does lerpColor() do?',o:['Randomly picks a colour','Smoothly interpolates between two colours based on a 0-1 value','Converts RGB to HSB'],a:2}]},
{id:'c8',title:'Final Art Piece',intro:'🎨 CREATIVE CODING GRADUATION! For your final project you will design a complete generative art piece that uses everything you have learned — drawing, animation, interaction, particles, sound-reactive elements, and mathematical patterns. This is your artistic and technical masterpiece!',
 slides:[{title:'Concept First!',text:'Great generative art starts with a concept, not a technical idea. "A visualization of social connection" or "The passage of time as patterns" or "Weather as colour." The concept guides every technical decision and gives your work meaning!',e:'💡'},{title:'Artistic Constraints!',text:'Constraints fuel creativity! Limit yourself to 3 colours. Only circles. Only one rule. The best generative artists often set tight constraints and explore them deeply. Constraints are not limitations — they are creative fuel!',e:'🔒'},{title:'Sharing Your Work!',text:'Share your p5.js sketches on the p5.js web editor (editor.p5js.org) or OpenProcessing. The creative coding community is incredibly welcoming. Every famous generative artist started by sharing imperfect work and getting feedback!',e:'🌍'}],
 game:{type:'build',title:'Design Your Art Piece!',inst:'Make the key creative and technical decisions for your generative art graduation piece!',cols:[{l:'CONCEPT 💡',items:['The flow of ocean currents 🌊','City noise patterns 🏙️','Growth of a living organism 🌱','Constellations connecting people ✨']},{l:'TECHNIQUES 🛠️',items:['Particles + Perlin noise + interaction','Recursion + colour mapping + mouse','Audio-reactive + FFT + particles','Grid-based automaton + rules']}      ,{l:'SHARING PLATFORM 🌍',items:['p5.js Web Editor (easiest) 💻','OpenProcessing community 🎨','GitHub Pages (full control) 🌐','Instagram/TikTok video export 📱']}]},
 quiz:[{q:'Why start a generative art piece with a concept?',o:['Concepts are not important','Concepts guide technical decisions and give the work meaning','Concepts slow you down'],a:1},{q:'How do artistic constraints help creativity?',o:['They limit output to simple work','Constraints focus creative energy and make deep exploration possible','Constraints are obstacles to avoid'],a:1},{q:'Where is the official p5.js online editor?',o:['p5.org/editor','editor.p5js.org','codepen.io'],a:1}]}

const AIML_TRACK=[
{id:'m1',title:'What is Machine Learning?',intro:'You learned the basics in Tier 4. Now you go DEEP into ML theory! Understanding the mathematics, limitations, and ethical implications of ML separates practitioners who deploy models responsibly from those who create systems that fail or cause harm!',
 slides:[{title:'The Bitter Lesson!',text:'Richard Sutton\'s Bitter Lesson: general methods that leverage computation always win over human-crafted features. More data plus more compute almost always beats clever engineering. This is why deep learning dominated — scale wins!',e:'💡'},{title:'No Free Lunch Theorem!',text:'There is no universally best algorithm. Every algorithm has trade-offs. Naive Bayes is fast but assumes feature independence. Neural networks are powerful but need lots of data and compute. Choose based on YOUR data and constraints!',e:'🍽️'},{title:'Evaluation Pitfalls!',text:'Accuracy is a misleading metric on imbalanced data! 99% of emails are not spam. A model that says "not spam" always has 99% accuracy but catches zero spam. Always use precision, recall and F1 score for imbalanced classes!',e:'⚠️'}],
 game:{type:'pick',title:'ML Theory Deep Dive!',inst:'Apply your deep ML knowledge!',items:[{q:'What does the No Free Lunch Theorem state?',o:['Free ML tools are inferior','No algorithm is best for all problems — every has trade-offs','Neural nets always win'],a:1},{q:'Why is accuracy misleading on imbalanced data?',o:['It is never misleading','A model predicting the majority class always gets high accuracy while missing the minority','Accuracy is always the best metric'],a:1},{q:'When does more data beat clever feature engineering?',o:['Never','Always','Usually when you have general compute-scalable methods'],a:2}]},
 quiz:[{q:'What is the Bitter Lesson in ML?',o:['ML is too complex','More data and compute usually beats hand-crafted approaches','Deep learning always wins'],a:1},{q:'What is the F1 score?',o:['A grading scale','The harmonic mean of precision and recall','Model accuracy on the test set'],a:1},{q:'When should you choose Naive Bayes over neural networks?',o:['Never','When data is limited and training speed matters','Only for text classification'],a:2}]},
{id:'m2',title:'Supervised Learning Deep Dive',intro:'Supervised learning powers most of the ML products you interact with daily! From Gmail\'s spam filter to Spotify\'s recommendations to credit card fraud detection — all supervised. Today you go beyond the basics to understand regularization, cross-validation, and the bias-variance trade-off!',
 slides:[{title:'Bias-Variance Trade-off!',text:'High bias = underfitting (model too simple, misses patterns). High variance = overfitting (model too complex, memorises noise). The sweet spot generalises to new data. Regularisation (L1/L2) penalises complexity to reduce variance!',e:'⚖️'},{title:'Cross-Validation!',text:'k-Fold CV splits data into k parts, trains on k-1 and tests on 1, repeats k times. Average the k scores. This gives a much more reliable estimate of real-world performance than a single train/test split. Standard practice!',e:'🔀'},{title:'Hyperparameter Tuning!',text:'Model parameters are learned from data. Hyperparameters are set before training: learning rate, tree depth, regularisation strength. Grid search tries all combinations. Random search samples randomly — faster and often just as good!',e:'🎛️'}],
 game:{type:'pycode',title:'Cross-Validation Simulation!',inst:'Run this k-fold cross-validation simulation!',starter:'import random\n\ndef k_fold_cv(data, k=5):\n    """Simulate k-fold cross-validation"""\n    random.shuffle(data)\n    fold_size = len(data) // k\n    scores = []\n    \n    for fold in range(k):\n        test_start = fold * fold_size\n        test_end = test_start + fold_size\n        test_set = data[test_start:test_end]\n        train_set = data[:test_start] + data[test_end:]\n        \n        # Simulate a model: predict mean of training labels\n        train_labels = [d["label"] for d in train_set]\n        train_mean = sum(train_labels) / len(train_labels)\n        \n        # Calculate MAE on test set\n        test_errors = [abs(d["label"] - train_mean) for d in test_set]\n        mae = sum(test_errors) / len(test_errors)\n        scores.append(mae)\n        print(f"Fold {fold+1}: test_size={len(test_set)}, MAE={mae:.3f}")\n    \n    print(f"\\nMean MAE: {sum(scores)/len(scores):.3f}")\n    print(f"Std Dev:  {(sum((s-sum(scores)/len(scores))**2 for s in scores)/len(scores))**0.5:.3f}")\n    return scores\n\n# Simulate a regression dataset\nrandom.seed(42)\ndataset = [{"feature": i/100, "label": i/10 + random.gauss(0,1)} for i in range(100)]\nprint("=== 5-Fold Cross-Validation ===")\nk_fold_cv(dataset, k=5)',hint:'Try changing k from 5 to 10 (10-fold CV) and see how scores change!',check:'contains',expected:'5-Fold Cross-Validation'},
 quiz:[{q:'What is overfitting?',o:['Model too simple to learn','Model memorises training data fails on new data','Training took too long'],a:1},{q:'What does k-Fold cross-validation give you?',o:['More training data','A more reliable performance estimate by averaging k test scores','A way to tune hyperparameters'],a:1},{q:'What is the difference between parameters and hyperparameters?',o:['They are the same','Parameters are learned from data hyperparameters are set before training','Hyperparameters are always more important'],a:1}]},
{id:'m3',title:'Neural Networks In Depth',intro:'Neural networks went from academic curiosity to dominating AI in a decade! But WHY do they work so well? Understanding backpropagation, activation functions, batch normalisation and dropout gives you the intuition to debug and improve any deep learning model!',
 slides:[{title:'Backpropagation!',text:'Backprop calculates the gradient of the loss with respect to every weight using the chain rule. It flows errors backward from output to input. Conceptually: how much did each weight contribute to the error? Adjust weights proportionally!',e:'↩️'},{title:'Batch Normalisation!',text:'BatchNorm normalises layer inputs to have mean 0 and variance 1. This dramatically speeds training, allows higher learning rates, and acts as regularisation. Almost every modern deep network uses BatchNorm — it was transformative!',e:'📊'},{title:'Dropout!',text:'During training, randomly zero out 20-50% of neuron activations. This forces the network to learn redundant representations. At test time use all neurons. Dropout is a form of model ensembling and dramatically reduces overfitting!',e:'🎲'}],
 game:{type:'pycode',title:'Neural Network Forward Pass!',inst:'Run this neural network forward pass from scratch!',starter:'import math\n\ndef relu(x):\n    return max(0, x)\n\ndef sigmoid(x):\n    return 1 / (1 + math.exp(-x))\n\ndef forward_pass(inputs, weights_h, bias_h, weights_o, bias_o):\n    """2-layer neural network forward pass"""\n    # Hidden layer\n    hidden = []\n    for j in range(len(weights_h[0])):\n        z = sum(inputs[i] * weights_h[i][j] for i in range(len(inputs))) + bias_h[j]\n        hidden.append(relu(z))\n    \n    # Output layer\n    z_out = sum(hidden[j] * weights_o[j] for j in range(len(hidden))) + bias_o\n    output = sigmoid(z_out)\n    return hidden, output\n\n# Tiny network: 2 inputs → 3 hidden → 1 output\nimport random\nrandom.seed(99)\nW_h = [[random.uniform(-1,1) for _ in range(3)] for _ in range(2)]\nb_h = [random.uniform(-0.5,0.5) for _ in range(3)]\nW_o = [random.uniform(-1,1) for _ in range(3)]\nb_o = random.uniform(-0.5,0.5)\n\ntest_inputs = [[0,0],[0,1],[1,0],[1,1]]\nprint("=== XOR Neural Network Forward Pass ===")\nfor inp in test_inputs:\n    hidden, output = forward_pass(inp, W_h, b_h, W_o, b_o)\n    print(f"Input {inp}: hidden={[round(h,3) for h in hidden]}, output={output:.4f}")',hint:'These weights are random so it will not solve XOR yet — training via backpropagation would fix that!',check:'contains',expected:'XOR Neural Network'},
 quiz:[{q:'What does backpropagation calculate?',o:['The forward pass','The gradient of loss with respect to each weight','The model accuracy'],a:1},{q:'What does Batch Normalisation do?',o:['Normalises the input data before training','Normalises layer activations to mean 0 variance 1 during training','Reduces model size'],a:1},{q:'What does Dropout do during training?',o:['Removes entire layers','Randomly zeros out some neuron activations to prevent overfitting','Speeds up inference'],a:1}]},
{id:'m4',title:'Decision Trees Deep Dive',intro:'Decision trees are the most interpretable ML models — you can actually see the rules they learned! But individual trees are weak. Ensemble methods like Random Forest and XGBoost combine hundreds of trees into world-class models that win most tabular data competitions!',
 slides:[{title:'How Decision Trees Work!',text:'At each node the tree picks the feature and threshold that best splits the data. Best = most information gain (reduces uncertainty most). The tree grows until leaves are pure or a stopping criterion is met. Simple, interpretable, but prone to overfitting!',e:'🌳'},{title:'Random Forest!',text:'Train 100+ trees each on a random subset of data and features. Predict by majority vote (classification) or mean (regression). Bagging (bootstrap aggregating) reduces variance. Feature randomness ensures trees are diverse. Hard to overfit!',e:'🌲'},{title:'XGBoost & Gradient Boosting!',text:'Boosting builds trees SEQUENTIALLY — each tree corrects errors of the previous. XGBoost implements gradient boosting with regularisation and parallelisation. It wins Kaggle competitions constantly. On tabular data XGBoost often beats neural networks!',e:'🚀'}],
 game:{type:'pycode',title:'Decision Tree from Scratch!',inst:'Run this decision tree implementation!',starter:'def gini(labels):\n    """Gini impurity - measure of disorder"""\n    if not labels: return 0\n    total = len(labels)\n    counts = {}\n    for l in labels:\n        counts[l] = counts.get(l, 0) + 1\n    return 1 - sum((c/total)**2 for c in counts.values())\n\ndef best_split(data, labels):\n    """Find best feature and threshold to split on"""\n    best_gain, best_feat, best_thresh = 0, None, None\n    parent_gini = gini(labels)\n    \n    for feat in range(len(data[0])):\n        thresholds = set(row[feat] for row in data)\n        for thresh in thresholds:\n            left_labels = [labels[i] for i,row in enumerate(data) if row[feat] <= thresh]\n            right_labels = [labels[i] for i,row in enumerate(data) if row[feat] > thresh]\n            if not left_labels or not right_labels: continue\n            n = len(labels)\n            gain = parent_gini - (len(left_labels)/n * gini(left_labels) +\n                                   len(right_labels)/n * gini(right_labels))\n            if gain > best_gain:\n                best_gain, best_feat, best_thresh = gain, feat, thresh\n    return best_feat, best_thresh, best_gain\n\n# Dataset: [hours_studied, attended_class], label: pass=1 fail=0\ndata = [[2,0],[1,0],[5,1],[6,1],[3,1],[4,1],[1,1],[2,0],[7,1],[0,0]]\nlabels = [0,0,1,1,0,1,0,0,1,0]\n\nfeat, thresh, gain = best_split(data, labels)\nfeatures = ["hours_studied", "attended_class"]\nprint(f"Best split: {features[feat]} <= {thresh}")\nprint(f"Information gain: {gain:.4f}")',hint:'Try changing the dataset and labels to see how the tree finds different splits!',check:'contains',expected:'Best split'},
 quiz:[{q:'What is information gain in a decision tree?',o:['The accuracy improvement','The reduction in impurity (uncertainty) from a split','The number of features used'],a:1},{q:'How does Random Forest reduce overfitting?',o:['By using fewer features','By combining many trees trained on random subsets of data','By simplifying each tree'],a:1},{q:'When does XGBoost usually beat neural networks?',o:['On image data','Never','On tabular structured data'],a:2}]},
{id:'m5',title:'Natural Language Processing',intro:'NLP — Natural Language Processing — is how computers understand human language! Sentiment analysis, translation, summarisation, question answering, chatbots — all NLP. The transformer architecture that powers ChatGPT and Claude emerged from NLP research and changed everything!',
 slides:[{title:'Text as Numbers!',text:'ML models work with numbers not words. Tokenisation splits text into tokens. One-hot encoding or word embeddings (Word2Vec, GloVe) convert tokens to vectors. Modern LLMs use subword tokenisation — byte-pair encoding (BPE) handles any language!',e:'🔢'},{title:'Transformers!',text:'The transformer architecture (2017) uses self-attention to process all tokens in parallel. Attention lets each token attend to every other token. This replaced recurrent networks and enabled massive parallelisation. GPT-4 and Claude are transformers!',e:'🤖'},{title:'Fine-tuning!',text:'Start with a pre-trained model (BERT, Llama, GPT). Fine-tune on your specific task with a small dataset. You get a specialised model without training from scratch. Fine-tuning a 7B parameter model for sentiment costs $10-100. Training from scratch costs millions!',e:'🎯'}],
 game:{type:'pycode',title:'Text Preprocessing Pipeline!',inst:'Run this NLP text preprocessing pipeline!',starter:'import re\n\ndef preprocess(text):\n    """Standard NLP text preprocessing pipeline"""\n    steps = []\n    \n    original = text\n    steps.append(("Original", text))\n    \n    # Lowercase\n    text = text.lower()\n    steps.append(("Lowercase", text))\n    \n    # Remove special chars\n    text = re.sub(r"[^a-z0-9\\s]", "", text)\n    steps.append(("Remove special", text))\n    \n    # Tokenise\n    tokens = text.split()\n    steps.append(("Tokens", str(tokens)))\n    \n    # Remove stopwords\n    stopwords = {"the","a","an","is","it","in","on","at","to","for","of","and","or"}\n    tokens = [t for t in tokens if t not in stopwords]\n    steps.append(("Remove stops", str(tokens)))\n    \n    # Simple stemming (just for demo)\n    stems = [t.rstrip("ing").rstrip("ed").rstrip("s") for t in tokens]\n    steps.append(("Stemmed", str(stems)))\n    \n    return steps\n\nreview = "The Machine Learning course was Amazing! I Loved every lesson and learned so much!"\nprint("=== NLP Preprocessing Pipeline ===")\nfor step, result in preprocess(review):\n    print(f"{step:15}: {result[:80]}")',hint:'Try processing different text and see how each step transforms it!',check:'contains',expected:'NLP Preprocessing'},
 quiz:[{q:'What is tokenisation in NLP?',o:['Encrypting text','Splitting text into tokens (words or subwords) for processing','Translating text'],a:1},{q:'What architecture powers modern LLMs like GPT and Claude?',o:['Recurrent Neural Network','Convolutional Neural Network','Transformer with self-attention'],a:2},{q:'What is fine-tuning an LLM?',o:['Training a new model from scratch','Updating a pre-trained model on your specific task','Making a model smaller'],a:1}]},
{id:'m6',title:'Computer Vision Basics',intro:'Computer vision lets machines see and understand images! From medical imaging to self-driving cars to facial recognition to content moderation — CV is one of the most impactful ML fields. Convolutional Neural Networks were the breakthrough that made modern CV possible!',
 slides:[{title:'Images as Data!',text:'A greyscale image is a 2D array of pixel values (0-255). A colour image has 3 channels (RGB) — a 3D array. A 224×224 RGB image is 224×224×3 = 150,528 numbers. The CNN learns which patterns of numbers correspond to which objects!',e:'🖼️'},{title:'Convolutional Layers!',text:'A convolution filter slides over the image and detects patterns. Early layers detect edges. Middle layers detect shapes. Deep layers detect objects. Pooling layers reduce spatial size. Stacking these creates a hierarchy of pattern detection!',e:'🔍'},{title:'Transfer Learning!',text:'Training a CNN on ImageNet (1.2M images, 1000 classes) creates a powerful feature extractor. Fine-tune the last layer on YOUR small dataset. A model trained on 100 photos beats one trained from scratch on 100,000. Transfer learning is indispensable!',e:'🔄'}],

{id:'m7',title:'Build a Classifier',intro:'Time to BUILD! You will design and implement a complete classification pipeline from data collection through model evaluation. This is the actual workflow used by ML engineers at every company from a 5-person startup to Google. By the end you will have designed a real ML system!',
 slides:[{title:'Data Collection Strategy!',text:'Garbage in, garbage out. Define what you need before collecting. How many samples? What class balance? What augmentations? For images: rotate, flip, zoom, colour jitter. For text: synonym replacement, back-translation. Good data engineering beats clever modelling!',e:'📦'},{title:'Model Selection!',text:'Start simple! Logistic regression as baseline. Then Random Forest. Then XGBoost. Then a small neural network. Only go to large models if simpler ones fail. The simplest model that meets your accuracy requirement is always the right choice!',e:'🎯'},{title:'Error Analysis!',text:'After training look at what the model got WRONG. Are errors clustered? On certain classes? From certain data sources? Error analysis reveals exactly what data or feature engineering would most improve your model. This is how professionals iterate!',e:'🔍'}],

{id:'m8',title:'Model Evaluation',intro:'A model is only as good as your ability to measure it! Accuracy, precision, recall, F1, ROC-AUC, confusion matrices, calibration curves — each metric tells a different story about your model. Knowing which metric to use and how to interpret it is the difference between trustworthy and dangerous AI!',
 slides:[{title:'The Confusion Matrix!',text:'A confusion matrix shows True Positives, True Negatives, False Positives, and False Negatives. For a cancer screening model: False Negatives (missed cancers) are far more dangerous than False Positives (unnecessary biopsies). Your metric must match your real-world cost!',e:'📊'},{title:'Precision vs Recall!',text:'Precision = of things I flagged as positive how many were actually positive? Recall = of all actual positives how many did I catch? Spam filter: high precision (no good email goes to spam). Medical screening: high recall (catch every case even at the cost of false alarms)!',e:'⚖️'},{title:'ROC-AUC!',text:'The ROC curve plots True Positive Rate vs False Positive Rate at all decision thresholds. AUC (Area Under Curve) of 1.0 = perfect model. 0.5 = random. 0.9+ = excellent. AUC is threshold-independent and gives an overall quality measure!',e:'📈'}],
 game:{type:'pycode',title:'Confusion Matrix Analysis!',inst:'Run this confusion matrix calculator!',starter:'def confusion_matrix_stats(tp, fp, fn, tn):\n    total = tp + fp + fn + tn\n    accuracy = (tp + tn) / total\n    precision = tp / (tp + fp) if (tp + fp) > 0 else 0\n    recall = tp / (tp + fn) if (tp + fn) > 0 else 0\n    f1 = 2 * (precision * recall) / (precision + recall) if (precision + recall) > 0 else 0\n    specificity = tn / (tn + fp) if (tn + fp) > 0 else 0\n    \n    return {\'accuracy\': round(accuracy,4), \'precision\': round(precision,4),\n            \'recall\': round(recall,4), \'f1\': round(f1,4), \'specificity\': round(specificity,4)}\n\ndef print_stats(name, tp, fp, fn, tn):\n    stats = confusion_matrix_stats(tp, fp, fn, tn)\n    print(f"\\n=== {name} ===")\n    print(f"Matrix: TP={tp} FP={fp} FN={fn} TN={tn}")\n    for k, v in stats.items():\n        bar = "█" * int(v * 20)\n        print(f"  {k:12}: {v:.4f} {bar}")\n\n# Spam filter: high precision important\nprint_stats("Spam Filter", tp=850, fp=50, fn=150, tn=4950)\n\n# Cancer screening: high recall critical  \nprint_stats("Cancer Screen", tp=90, fp=200, fn=10, tn=9700)',hint:'Try changing the TP/FP/FN/TN values to see how different trade-offs affect each metric!',check:'contains',expected:'Spam Filter'},
 quiz:[{q:'What does a False Negative mean in cancer screening?',o:['A false positive test result','A cancer that was MISSED by the model','A healthy person flagged as sick'],a:1},{q:'When should you optimise for high recall over precision?',o:['When false alarms are very costly','When missing true positives is very costly (like cancer screening)','Always optimise for recall'],a:1},{q:'What does an ROC-AUC of 0.5 mean?',o:['Perfect model','The model performs like random guessing','Good model needs improvement'],a:1}]},
{id:'m9',title:'Deploy Your AI',intro:'Building an ML model is 20% of the work — deploying it reliably to production is the other 80%! Model serving, versioning, monitoring, retraining triggers, A/B testing, rollback strategies — MLOps (ML Operations) is a full discipline and companies are desperately hiring for it!',

// ║  1. supabase.com → New project                           ║
// ║  2. SQL Editor → run supabase_setup.sql                  ║

const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_PUBLIC_KEY';
const _db = (typeof supabase !== 'undefined' && SUPABASE_URL.indexOf('YOUR_PROJECT') === -1)
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
  : null;

// ── LOCAL CACHE helpers (keeps UI instant; DB is source-of-truth) ──
function getCurrentUser(){try{const e=localStorage.getItem('ssa_currentUser');return e?JSON.parse(e):null;}catch{return null;}}
function saveCurrentUser(u){try{localStorage.setItem('ssa_currentUser',u?JSON.stringify(u):null);}catch{}}
function _cacheUD(email,data){try{localStorage.setItem('ssa_ud_'+btoa(email),JSON.stringify(data));}catch{}}
function _readCache(email){try{const d=localStorage.getItem('ssa_ud_'+btoa(email));return d?JSON.parse(d):{completed:[],stars:{},badges:[]};}catch{return{completed:[],stars:{},badges:[]};}}
function getUserData(email){return _readCache(email);}

// ── SUPABASE DB HELPERS ─────────────────────────────────
async function dbGetUser(email){
  if(!_db)return null;
  const {data}=await _db.from('ssa_users').select('*').eq('email',email.toLowerCase().trim()).maybeSingle();
  return data;
}
async function dbCreateUser(u){
  if(!_db)return;
  await _db.from('ssa_users').upsert({
    email:u.email.toLowerCase().trim(),password:u.password,username:u.username||u.email,
    sparky_name:u.sparkyName||'Sparky',sparky_color_id:u.sparkyColorId||'blue',
    sparky_bot_type:u.sparkyBotType||'sparky',voice_gender:u.voiceGender||'female',
    joined_at:u.joinedAt||Date.now()
  },{onConflict:'email'});
  await _db.from('ssa_progress').upsert(
    {email:u.email.toLowerCase().trim(),completed:[],badges:[],stars:{}},
    {onConflict:'email'}
  );
}
async function dbSyncDown(email){
  // After login: pull latest data from Supabase into local cache
  if(!_db)return null;
  const {data}=await _db.from('ssa_progress').select('*').eq('email',email.toLowerCase().trim()).maybeSingle();
  if(data){
    const prog={completed:data.completed||[],badges:data.badges||[],stars:data.stars||{}};
    _cacheUD(email,prog);
    return prog;
  }
  return null;
}
async function dbSaveProgress(email,data){
  // Write to local cache first (instant), then sync to DB
  _cacheUD(email,data);
  if(!_db)return;
  const totalStars=Object.values(data.stars||{}).reduce((a,v)=>a+v,0);
  const lessonsD=(data.completed||[]).length;
  const badgesD=(data.badges||[]).length;
  const score=totalStars*10+lessonsD*5+badgesD*50;
  const user=getCurrentUser();
  const name=(user&&(user.username||user.email))||email;
  await Promise.all([
    _db.from('ssa_progress').upsert(
      {email:email.toLowerCase().trim(),completed:data.completed||[],badges:data.badges||[],stars:data.stars||{},updated_at:new Date().toISOString()},
      {onConflict:'email'}
    ),
    _db.from('ssa_leaderboard').upsert(
      {email:email.toLowerCase().trim(),name,total_stars:totalStars,lessons_done:lessonsD,badges_count:badgesD,score,
       sparky_bot_type:(getCurrentUser()?.sparkyBotType||'sparky'),
       sparky_color_id:(getCurrentUser()?.sparkyColorId||'blue'),
       updated_at:new Date().toISOString()},
      {onConflict:'email'}
    )
  ]);
}
async function getLeaderboardDB(){
  if(!_db){
    const u=getCurrentUser();if(!u)return[];
    const d=getUserData(u.email);
    const ts=Object.values(d.stars||{}).reduce((a,v)=>a+v,0);
    const ld=(d.completed||[]).length,bd=(d.badges||[]).length;
    return[{name:u.username||u.email,email:u.email,totalStars:ts,lessonsD:ld,badgesD:bd,score:ts*10+ld*5+bd*50}];
  }
  const {data}=await _db.from('ssa_leaderboard').select('*').order('score',{ascending:false}).limit(50);
  return(data||[]).map(r=>({...r,name:r.name,totalStars:r.total_stars,lessonsD:r.lessons_done,badgesD:r.badges_count,sparkyBotType:r.sparky_bot_type||'sparky',sparkyColorId:r.sparky_color_id||'blue'}));
}
// Sync-only legacy stub (for profile saves)
function saveUserData(email,data){_cacheUD(email,data);}
function getLeaderboard(){const u=getCurrentUser();if(!u)return[];const d=getUserData(u.email);const ts=Object.values(d.stars||{}).reduce((a,v)=>a+v,0);const ld=(d.completed||[]).length,bd=(d.badges||[]).length;return[{...u,name:u.username||u.email,totalStars:ts,lessonsD:ld,badgesD:bd,score:ts*10+ld*5+bd*50}];}
